<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Ejecutivo — EQSolutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --azul:#1A3756;--tq:#0684C6;--fondo:#F4F6F9;
      --blanco:#FFFFFF;--borde:#E0E8F0;--grisMed:#6B87A8;
      --grisLight:#EEF3F8;--verde:#16A97A;--amarillo:#D4A012;
      --rojo:#E03355;--tqGlow:rgba(6,132,198,0.12);
    }
    *{box-sizing:border-box}
    body{background:var(--fondo);font-family:'Open Sans',sans-serif;color:var(--azul);min-height:100vh}
    @keyframes spin   {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes fadeIn {from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes loadBar{0%{width:0%}60%{width:80%}100%{width:100%}}

    /* LOADING */
    #loading-screen{position:fixed;inset:0;background:var(--blanco);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px}
    .loading-bar{width:280px;height:3px;background:var(--grisLight);border-radius:2px;overflow:hidden}
    .loading-fill{height:100%;background:var(--tq);animation:loadBar 2s ease-in-out infinite}
    .loading-text{font-size:11px;color:var(--grisMed);letter-spacing:.1em;text-transform:uppercase}

    /* LOGIN */
    #login-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--azul) 0%,#0d2040 60%,#05142D 100%);display:flex;align-items:center;justify-content:center;z-index:999}
    .login-card{background:var(--blanco);border-radius:12px;padding:48px 44px;width:420px;box-shadow:0 24px 64px rgba(0,0,0,.3);animation:slideUp .5s ease}
    .login-logo{text-align:center;margin-bottom:32px}
    .login-divider{height:1px;background:var(--borde);margin:0 -44px 28px}
    .login-title{font-family:'Raleway',sans-serif;font-size:15px;font-weight:700;color:var(--azul);margin-bottom:4px}
    .login-sub{font-size:11px;color:var(--grisMed);margin-bottom:24px}
    .form-group{margin-bottom:16px}
    .form-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--grisMed);margin-bottom:6px}
    .form-input{width:100%;padding:11px 14px;border:1.5px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;color:var(--azul);outline:none;transition:border-color .2s;background:var(--blanco)}
    .form-input:focus{border-color:var(--tq)}
    .form-input.error{border-color:var(--rojo)}
    .form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;color:var(--azul);outline:none;resize:vertical;min-height:80px;transition:border-color .2s}
    .form-textarea:focus{border-color:var(--tq)}
    .form-select{width:100%;padding:11px 14px;border:1.5px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;color:var(--azul);outline:none;cursor:pointer;background:var(--blanco)}
    .form-select:focus{border-color:var(--tq)}
    .form-hint{font-size:10px;color:var(--grisMed);margin-top:4px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .login-btn{width:100%;padding:13px;background:var(--tq);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
    .login-btn:hover{background:var(--azul)}
    .login-btn:disabled{opacity:.6;cursor:not-allowed}
    .login-error{background:#FFF0F3;border:1px solid var(--rojo);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--rojo);margin-bottom:16px;display:none}
    .login-footer{text-align:center;margin-top:24px;font-size:10px;color:var(--grisMed)}
    .pw-wrap{position:relative}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:var(--grisMed)}
    .pwd-strength{height:3px;border-radius:2px;margin-top:6px;transition:all .3s;background:var(--grisLight)}

    /* HEADER */
    #header{background:var(--blanco);border-top:4px solid var(--tq);border-bottom:1px solid var(--borde);padding:0 32px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(26,55,86,.08)}
    #header-top{display:flex;justify-content:space-between;align-items:center;height:64px}
    .logo-wrap{display:flex;align-items:center;gap:12px}
    .header-sep{width:1px;height:32px;background:var(--borde);margin:0 6px}

    /* FILTROS GLOBALES en header */
    .filtros-globales{display:flex;align-items:center;gap:8px;background:var(--grisLight);border:1px solid var(--borde);border-radius:8px;padding:5px 10px}
    .filtro-label{font-size:9px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
    .filtro-select{background:transparent;border:none;outline:none;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;color:var(--azul);cursor:pointer;padding:0 2px}
    .filtro-sep{color:var(--borde);font-size:14px}

    .empresa-dot{width:8px;height:8px;border-radius:50%;background:var(--tq)}
    .user-badge{display:flex;align-items:center;gap:10px;background:var(--grisLight);border:1px solid var(--borde);border-radius:6px;padding:5px 12px}
    .user-avatar{width:26px;height:26px;border-radius:50%;background:var(--tq);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
    .user-name{font-weight:700;color:var(--azul);font-size:12px;white-space:nowrap}
    .user-rol{font-size:10px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.06em}
    .logout-btn{background:none;border:1px solid var(--borde);border-radius:4px;padding:3px 9px;font-size:11px;color:var(--grisMed);cursor:pointer;transition:all .2s;white-space:nowrap}
    .logout-btn:hover{border-color:var(--rojo);color:var(--rojo)}

    /* NAV */
    #nav{display:flex;overflow-x:auto}
    .nav-btn{padding:10px 16px;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--grisMed);font-family:'Open Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
    .nav-btn:hover{color:var(--azul)}
    .nav-btn.active{color:var(--tq);border-bottom-color:var(--tq);font-weight:700}
    .nav-btn.admin-tab.active{color:var(--azul);border-bottom-color:var(--azul)}
    .nav-btn.data-tab.active{color:var(--verde);border-bottom-color:var(--verde)}

    /* FILTROS POR ÁREA */
    .area-filtros{display:flex;align-items:center;gap:10px;background:var(--blanco);border:1px solid var(--borde);border-radius:8px;padding:10px 16px;margin-bottom:20px;box-shadow:0 1px 4px rgba(26,55,86,.05)}
    .area-filtro-group{display:flex;align-items:center;gap:8px}
    .area-filtro-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--grisMed)}
    .area-filtro-sel{padding:6px 12px;border:1.5px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;color:var(--azul);font-weight:600;outline:none;cursor:pointer;background:var(--blanco);transition:border-color .2s}
    .area-filtro-sel:focus{border-color:var(--tq)}
    .filtro-aplicar{padding:7px 16px;background:var(--tq);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
    .filtro-aplicar:hover{background:var(--azul)}
    .filtro-periodo-badge{background:var(--tqGlow);border:1px solid var(--tq);border-radius:4px;padding:4px 10px;font-size:11px;color:var(--tq);font-weight:700}

    /* BANNERS */
    .banner{padding:8px 32px;display:flex;align-items:center;gap:10px;font-size:12px}
    .banner-error  {background:#FFF0F3;border-bottom:1px solid var(--rojo);color:var(--rojo);justify-content:space-between}
    .banner-success{background:#F0FAF6;border-bottom:1px solid var(--verde);color:var(--verde)}
    .banner-error button{background:none;border:none;color:var(--rojo);cursor:pointer;font-size:15px}

    /* CONTENT */
    #content{padding:22px 32px;animation:fadeIn .3s ease}

    /* CARDS */
    .card{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:20px 24px;box-shadow:0 1px 4px rgba(26,55,86,.05)}

    /* METRICS */
    .metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .metric-card{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:18px 22px;border-left:4px solid var(--tq);box-shadow:0 1px 4px rgba(26,55,86,.05)}
    .metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--grisMed);margin-bottom:6px}
    .metric-value{font-size:42px;font-weight:800;font-family:'Raleway',sans-serif;line-height:1}

    /* SALUD */
    .salud-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:2px}
    .salud-legend{display:flex;gap:20px;margin-top:10px;font-size:12px}

    /* AREAS */
    .areas-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
    .area-card{background:var(--blanco);border:1px solid var(--borde);border-top:3px solid var(--tq);border-radius:6px;padding:16px;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(26,55,86,.05)}
    .area-card:hover{border-top-color:var(--azul);box-shadow:0 4px 16px rgba(26,55,86,.12);transform:translateY(-2px)}
    .area-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .area-name{display:flex;align-items:center;gap:6px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--azul)}
    .area-pct{font-family:'Raleway',sans-serif;font-size:20px;font-weight:800}
    .area-bars{display:flex;gap:3px;margin-bottom:10px}
    .area-bar{flex:1;height:4px;border-radius:2px}
    .area-stats{display:flex;gap:10px;font-size:10px}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
    .kpi-card{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:18px 20px;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(26,55,86,.05);transition:all .25s}
    .kpi-card:hover{border-color:var(--tq);transform:translateY(-2px);box-shadow:0 6px 20px var(--tqGlow)}
    .kpi-stripe{position:absolute;top:0;left:0;width:100%;height:3px}
    .kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;padding-top:5px}
    .kpi-desc{font-size:9px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.06em;line-height:1.5;max-width:65%}
    .kpi-badge{font-size:8px;font-weight:700;padding:3px 8px;border-radius:3px;white-space:nowrap}
    .kpi-nombre{font-size:13px;font-weight:700;color:var(--azul);margin-bottom:8px;font-family:'Raleway',sans-serif}
    .kpi-valor-row{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
    .kpi-valor{font-size:28px;font-weight:800;font-family:'Raleway',sans-serif;line-height:1}
    .kpi-meta{font-size:11px;color:var(--grisMed)}
    .kpi-bar-bg{height:4px;background:var(--grisLight);border-radius:2px;overflow:hidden}
    .kpi-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
    .kpi-pct{font-size:10px;color:var(--grisMed);margin-top:4px;margin-bottom:6px}
    .kpi-chart{height:44px}
    /* Botón rápido registrar en KPI */
    .kpi-reg-btn{
      display:flex;align-items:center;gap:4px;
      background:none;border:1px dashed var(--borde);border-radius:4px;
      padding:4px 9px;font-size:10px;color:var(--grisMed);
      cursor:pointer;font-family:'Open Sans',sans-serif;
      transition:all .2s;margin-top:8px;width:100%;justify-content:center;
    }
    .kpi-reg-btn:hover{border-color:var(--tq);color:var(--tq);background:var(--tqGlow)}

    /* AREA VIEW */
    .area-view-header{display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--tq);padding-bottom:14px;margin-bottom:18px}
    .area-icon-box{width:46px;height:46px;border:2px solid var(--tq);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--tqGlow)}
    .area-view-title{font-size:19px;font-weight:800;color:var(--azul);font-family:'Raleway',sans-serif}
    .area-view-sub{font-size:11px;color:var(--grisMed)}
    .area-counters{margin-left:auto;display:flex;gap:20px}
    .area-counter{text-align:center}
    .area-counter-val{font-size:26px;font-weight:800;font-family:'Raleway',sans-serif}
    .area-counter-lbl{font-size:9px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.1em}

    /* TABLA */
    .tabla-detalle{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
    .tabla-detalle th{background:var(--grisLight);color:var(--azul);font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:10px;padding:9px 12px;text-align:left;border-bottom:2px solid var(--borde)}
    .tabla-detalle td{padding:9px 12px;border-bottom:1px solid var(--borde);color:var(--azul);vertical-align:middle}
    .tabla-detalle tr:hover td{background:var(--grisLight)}
    .estado-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700}
    .estado-ok  {background:#16A97A22;color:#16A97A}
    .estado-warn{background:#D4A01222;color:#D4A012}
    .estado-bad {background:#E0335522;color:#E03355}

    /* INGRESO DE DATOS */
    .ingreso-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .ingreso-title{font-family:'Raleway',sans-serif;font-size:18px;font-weight:800;color:var(--azul)}
    .ingreso-sub{font-size:11px;color:var(--grisMed);margin-top:2px}
    .ingreso-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
    .ingreso-tab{padding:9px 18px;background:var(--blanco);border:1.5px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--grisMed)}
    .ingreso-tab:hover{border-color:var(--tq);color:var(--tq)}
    .ingreso-tab.active{background:var(--tq);border-color:var(--tq);color:#fff}
    .ingreso-form{background:var(--blanco);border:1px solid var(--borde);border-radius:8px;padding:28px 32px;box-shadow:0 1px 4px rgba(26,55,86,.05);animation:fadeIn .25s ease}
    .ingreso-form-title{font-family:'Raleway',sans-serif;font-size:15px;font-weight:800;color:var(--azul);margin-bottom:4px}
    .ingreso-form-sub{font-size:11px;color:var(--grisMed);margin-bottom:22px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .form-full{grid-column:1/-1}
    .submit-btn{padding:12px 32px;background:var(--tq);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
    .submit-btn:hover{background:var(--azul)}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed}
    .ingreso-recientes{margin-top:28px}
    .reciente-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--grisLight);border-radius:6px;margin-bottom:6px;font-size:12px}
    .reciente-icon{font-size:16px;flex-shrink:0}
    .reciente-texto{flex:1;color:var(--azul);font-weight:600}
    .reciente-fecha{color:var(--grisMed);font-size:10px;white-space:nowrap}
    .reciente-empresa{font-size:10px;color:var(--tq);font-weight:700;background:var(--tqGlow);padding:2px 8px;border-radius:3px}

    /* ADMIN */
    .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .admin-title{font-family:'Raleway',sans-serif;font-size:18px;font-weight:800;color:var(--azul)}
    .admin-sub{font-size:11px;color:var(--grisMed);margin-top:2px}
    .admin-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .admin-stat{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:14px 18px;text-align:center;box-shadow:0 1px 4px rgba(26,55,86,.05)}
    .admin-stat-val{font-size:30px;font-weight:800;font-family:'Raleway',sans-serif}
    .admin-stat-lbl{font-size:10px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
    .rol-badge{display:inline-block;padding:3px 10px;border-radius:3px;font-size:10px;font-weight:700}
    .rol-admin {background:#1A375622;color:var(--azul)}
    .rol-lider {background:#0684C622;color:var(--tq)}
    .rol-cliente{background:#6ECE8E22;color:#16A97A}
    .action-btn{background:none;border:1px solid var(--borde);border-radius:4px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:'Open Sans',sans-serif;transition:all .15s;margin-right:3px}
    .action-btn:hover{background:var(--grisLight)}
    .action-btn.danger:hover{border-color:var(--rojo);color:var(--rojo)}
    .action-btn.primary{background:var(--tq);color:#fff;border-color:var(--tq)}
    .action-btn.primary:hover{background:var(--azul);border-color:var(--azul)}
    .log-accion{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700}
    .log-ok  {background:#16A97A18;color:var(--verde)}
    .log-fail{background:#E0335518;color:var(--rojo)}
    .log-admin{background:#0684C618;color:var(--tq)}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(5,20,45,.55);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
    .modal-box{background:var(--blanco);border-radius:10px;padding:32px 36px;width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:slideUp .3s ease;position:relative}
    .modal-box.wide{width:600px}
    .modal-title{font-family:'Raleway',sans-serif;font-size:16px;font-weight:800;color:var(--azul);margin-bottom:4px}
    .modal-sub{font-size:11px;color:var(--grisMed);margin-bottom:20px}
    .modal-close{position:absolute;top:14px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--grisMed);line-height:1}
    .modal-close:hover{color:var(--rojo)}
    .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:14px;border-top:1px solid var(--borde)}
    .btn-cancel{padding:9px 18px;background:none;border:1px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;cursor:pointer;color:var(--grisMed)}
    .btn-cancel:hover{border-color:var(--azul);color:var(--azul)}
    .btn-save{padding:9px 22px;background:var(--tq);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
    .btn-save:hover{background:var(--azul)}
    .btn-danger{padding:9px 22px;background:var(--rojo);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer}

    /* MISC */
    .chart-wrap{height:200px;position:relative}
    .section-title{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--grisMed);margin-bottom:12px;font-weight:600}
    .section-title span{color:var(--tq)}
    #footer{border-top:1px solid var(--borde);padding:10px 32px;display:flex;justify-content:space-between;align-items:center;background:var(--blanco);margin-top:12px}
    .gap-16{margin-bottom:16px}
    .hidden{display:none!important}
    .spinning{animation:spin 1s linear infinite;display:inline-block}
  </style>
</head>

// Función central de consulta a Supabase REST API
async function sbQuery(table, params){
  // params: {select, eq, order, limit}
  let url = SUPA_URL+"/rest/v1/"+table+"?";
  if(params.select) url += "select="+encodeURIComponent(params.select)+"&";
  if(params.eq)     Object.entries(params.eq).forEach(([k,v])=>{ url += k+"=eq."+encodeURIComponent(v)+"&"; });
  if(params.gte)    Object.entries(params.gte).forEach(([k,v])=>{ url += k+"=gte."+encodeURIComponent(v)+"&"; });
  if(params.lte)    Object.entries(params.lte).forEach(([k,v])=>{ url += k+"=lte."+encodeURIComponent(v)+"&"; });
  if(params.order)  url += "order="+encodeURIComponent(params.order)+"&";
  if(params.limit)  url += "limit="+params.limit+"&";
  url = url.replace(/&$/, "");
  const resp = await fetch(url, {headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json"}});
  if(!resp.ok) throw new Error("Supabase error "+resp.status+": "+await resp.text());
  return resp.json();
}

async function sbUpsert(table, data, onConflict){

}

// Cache local para reducir llamadas repetidas
const CACHE = {};
const CACHE_TTL = 30000; // 30 segundos
async function sbCached(key, fn){
  const now = Date.now();
  if(CACHE[key] && (now - CACHE[key].ts) < CACHE_TTL) return CACHE[key].data;
  const data = await fn();
  CACHE[key] = {data, ts:now};
  return data;
}
function invalidateCache(pattern){
  Object.keys(CACHE).forEach(k=>{ if(k.includes(pattern)) delete CACHE[k]; });
}

async function supaGet(table, params){

function queryAll(sql, params){
  // Lee del cache local (cargado desde Supabase al iniciar)
  if(!window._sbCache) return [];
  const cache = window._sbCache;
  
  // Detectar tabla principal
  const fromMatch = sql.match(/FROM\s+(\w+)/i);
  if(!fromMatch) return [];
  const table = fromMatch[1].toLowerCase();
  if(!cache[table]) return [];
  
  // JOIN básico: resolver id_empresa via empresas
  let rows = cache[table].map(row=>({...row}));
  
  // Enriquecer con joins comunes
  if(table === "kpi_mensual"){
    rows = rows.map(r=>{
      const ind = cache.indicadores?.find(i=>i.id===r.id_indicador)||{};
      const area = cache.areas?.find(a=>a.id===ind.id_area)||{};
      const emp  = cache.empresas?.find(e=>e.id===r.id_empresa)||{};
      return {...r, kpi_codigo:ind.codigo, nombre:ind.nombre, unidad:ind.unidad,
              descripcion:ind.descripcion, tipo_meta:ind.tipo_meta,
              area_codigo:area.codigo, empresa_codigo:emp.codigo};
    });
  }
  if(table === "solicitudes_tic" || table === "actividades_tic" || table === "eventos_internet" || table === "rendimiento_internet" || table === "pagos_proveedores" || table === "cuentas_por_pagar"){
    rows = rows.map(r=>{
      const emp = cache.empresas?.find(e=>e.id===r.id_empresa)||{};
      return {...r, empresa_codigo:emp.codigo, empresa_nombre:emp.nombre};
    });
  }
  if(table === "usuarios"){
    rows = rows.map(r=>{
      const emp = cache.empresas?.find(e=>e.id===r.id_empresa)||{};
      return {...r, empresa_codigo:emp.codigo, empresa_nombre:emp.nombre};
    });
  }
  if(table === "log_accesos"){
    rows = rows.map(r=>{
      const usr = cache.usuarios?.find(u=>u.id===r.id_usuario)||{};
      return {...r, ...usr};
    });
  }
  
  // Aplicar filtros WHERE básicos
  if(params && params.length > 0){
    rows = filtrarRows(rows, sql, params);
  }
  
  // Agregar funciones COUNT/SUM si aplica
  if(/SELECT\s+COUNT\(\*\)\s+AS\s+c/i.test(sql)){
    return [{c: rows.length}];
  }
  if(/SELECT\s+SUM\(([\w_]+)\)\s+AS\s+t/i.test(sql)){
    const colMatch = sql.match(/SUM\(([\w_]+)\)/i);
    const col = colMatch?colMatch[1]:null;
    const total = col ? rows.reduce((s,r)=>s+(parseFloat(r[col])||0),0) : 0;
    return [{t: total}];
  }
  if(/SELECT\s+MAX\(([\w_]+)\)\s+AS/i.test(sql)){
    const colMatch = sql.match(/MAX\(([\w_]+)\)\s+AS\s+(\w+)/i);
    const col = colMatch?colMatch[1]:null; const alias = colMatch?colMatch[2]:"n";
    const maxVal = col ? Math.max(...rows.map(r=>parseFloat(r[col])||0)) : 0;
    return [{[alias]: isFinite(maxVal)?maxVal:0}];
  }

  // ORDER
  if(/ORDER BY/i.test(sql)){
    const orderMatch = sql.match(/ORDER BY\s+(\w+)\s+(ASC|DESC)?/i);
    if(orderMatch){
      const col=orderMatch[1].toLowerCase(), dir=orderMatch[2]?.toUpperCase();
      rows.sort((a,b)=>{
        const av=a[col]??0, bv=b[col]??0;
        return dir==="DESC"?(bv>av?1:-1):(av>bv?1:-1);
      });
    }
  }
  
  // LIMIT
  const limitMatch = sql.match(/LIMIT\s+(\d+)/i);
  if(limitMatch) rows = rows.slice(0, parseInt(limitMatch[1]));

  return rows;
}

function filtrarRows(rows, sql, params){
  const whereMatch = sql.match(/WHERE\s+(.+?)(?:\s+GROUP|\s+ORDER|\s+LIMIT|\s+HAVING|$)/is);
  if(!whereMatch) return rows;
  let cond = whereMatch[1];
  let pIdx = 0;
  const condFinal = cond.replace(/\?/g, ()=>{
    const v = params[pIdx++];
    if(v === null || v === undefined) return "NULL";
    if(typeof v === "string") return "'"+v.replace(/'/g,"''")+"'";
    return String(v);
  });
  
  return rows.filter(row=>{
    try {
      const parts = condFinal.split(/\s+AND\s+/i);
      return parts.every(part=>{
        part = part.trim();
        // col=val
        const eqM = part.match(/^([\w.]+)\s*=\s*'?([^']*)'?$/i);
        if(eqM){
          const col=eqM[1].split(".").pop().toLowerCase();
          const val=eqM[2].trim().replace(/^'|'$/g,"");
          return String(row[col]??"") === String(val);
        }
        // col!=val
        const neqM = part.match(/^([\w.]+)\s*!=\s*'?([^']*)'?$/i);
        if(neqM){
          const col=neqM[1].split(".").pop().toLowerCase();
          const val=neqM[2].trim().replace(/^'|'$/g,"");
          return String(row[col]??"") !== String(val);
        }
        // col<=val
        const lteM = part.match(/^([\w.]+)\s*<=\s*'?([^']*)'?$/i);
        if(lteM){
          const col=lteM[1].split(".").pop().toLowerCase();
          const val=lteM[2].trim().replace(/^'|'$/g,"");
          return String(row[col]??"") <= String(val);
        }
        // col>=val
        const gteM = part.match(/^([\w.]+)\s*>=\s*'?([^']*)'?$/i);
        if(gteM){
          const col=gteM[1].split(".").pop().toLowerCase();
          const val=gteM[2].trim().replace(/^'|'$/g,"");
          return String(row[col]??"") >= String(val);
        }
        return true; // condición no reconocida: no filtrar
      });
    } catch(e){ return true; }
  });
}

function applyFilters(rows, sql, params, cols){
  let result = rows;
  let pi = 0; // índice de parámetros

  // Filtro por id_empresa via subquery codigo
  const empMatch = sql.match(/id_empresa=\(SELECT id FROM empresas WHERE codigo=\?\)/);
  if(empMatch && params[pi]!==undefined){
    const codigo = params[pi++];
    const emp = (window._sbCache.empresas||[]).find(e=>e.codigo===codigo);
    if(emp) result = result.filter(r=>r.id_empresa===emp.id);
    else return [];
  }

  // Filtros simples: campo=?
  const whereMatch = sql.match(/WHERE\s+(.+?)(?:\s+ORDER|\s+GROUP|\s+LIMIT|$)/i);
  if(whereMatch){
    const conditions = whereMatch[1];
    // anio=?
    if(conditions.includes("anio=?") && params[pi]!==undefined){
      const v = params[pi++];
      if(v>0) result = result.filter(r=>r.anio==v);
    }
    // mes=?
    if(conditions.includes("mes=?") && params[pi]!==undefined){
      const v = params[pi++];
      if(v>0) result = result.filter(r=>r.mes==v||r.mes===v);
    }
    // estado=?
    if(conditions.includes("estado=?") && params[pi]!==undefined){
      const v = params[pi++];
      result = result.filter(r=>r.estado===v);
    }
    // email=? (usuarios)
    if(conditions.includes("LOWER(u.email)=?") || conditions.includes("email=?")){
      if(params[pi]!==undefined){
        const v = params[pi++];
        result = result.filter(r=>(r.email||"").toLowerCase()===v.toLowerCase());
      }
    }
    // password_hash
    if(conditions.includes("password_hash=?") && params[pi]!==undefined){
      const v = params[pi++];
      result = result.filter(r=>r.password_hash===v);
    }
    // activo
    if(conditions.includes("activo=1") || conditions.includes("activo=true")){
      result = result.filter(r=>r.activo===true||r.activo===1);
    }
  }

  // ORDER BY creado_en DESC
  if(sql.includes("ORDER") && sql.includes("DESC")){
    result = result.sort((a,b)=>(b.creado_en||"").localeCompare(a.creado_en||""));
  }

  // LIMIT
  const limitMatch = sql.match(/LIMIT\s+(\d+)/i);
  if(limitMatch) result = result.slice(0, parseInt(limitMatch[1]));

  // COUNT(*)
  if(sql.includes("COUNT(*)")){
    let cnt = result.length;
    // Filtros adicionales inline
    if(sql.includes("estado='Atendido'"))    cnt = result.filter(r=>r.estado==="Atendido").length;
    if(sql.includes("estado='En progreso'")) cnt = result.filter(r=>r.estado==="En progreso").length;
    if(sql.includes("estado='Pendiente'"))   cnt = result.filter(r=>r.estado==="Pendiente").length;
    if(sql.includes("estado='Completada'"))  cnt = result.filter(r=>r.estado==="Completada").length;
    return [{c: cnt}];
  }

  // SUM(horas_desconexion)
  if(sql.includes("SUM(horas_desconexion)")){
    const tot = result.reduce((s,r)=>s+(r.horas_desconexion||0),0);
    return [{t: tot}];
  }

  // MAX
  if(sql.includes("MAX(numero)")){
    const max = result.reduce((m,r)=>Math.max(m,r.numero||0),0);
    return [{n: max}];
  }

  // GROUP BY estado_cartera (para donut cartera)
  if(sql.includes("GROUP BY estado_cartera")){
    const counts = {};
    result.forEach(r=>{ const k=r.estado_cartera||"?"; counts[k]=(counts[k]||0)+1; });
    const order = {"POR VENCER":1,"1-30":2,"30-60":3,"60-90":4,">90":5};
    return Object.entries(counts)
      .map(([k,v])=>({estado_cartera:k,c:v}))
      .sort((a,b)=>(order[a.estado_cartera]||9)-(order[b.estado_cartera]||9));
  }

  // GROUP BY proveedor (top proveedores)
  if(sql.includes("GROUP BY proveedor") && sql.includes("estado_cartera!=")){
    const vencidas = result.filter(r=>r.estado_cartera!=="POR VENCER");
    const counts = {};
    vencidas.forEach(r=>{
      const k=r.proveedor||"?";
      if(!counts[k]) counts[k]={c:0,max_dias:0};
      counts[k].c++;
      counts[k].max_dias=Math.max(counts[k].max_dias,r.dias_vencidos||0);
    });
    return Object.entries(counts)
      .map(([k,v])=>({proveedor:k,...v}))
      .sort((a,b)=>b.c-a.c)
      .slice(0,8);
  }

  // JOIN con indicadores (kpi_mensual)
  if(sql.includes("JOIN indicadores") && sql.includes("JOIN areas")){
    return result.map(k=>{
      const ind = (window._sbCache.indicadores||[]).find(i=>i.id===k.id_indicador);
      const area = ind?(window._sbCache.areas||[]).find(a=>a.id===ind.id_area):null;
      return {
        ...k,
        kpi_codigo:   ind?.codigo,
        nombre:       ind?.nombre,
        unidad:       ind?.unidad,
        descripcion:  ind?.descripcion,
        tipo_meta:    ind?.tipo_meta,
        area_codigo:  area?.codigo,
        trend: getTrend(ind?.codigo)
      };
    }).filter(k=>k.kpi_codigo);
  }

  return result;
}

async function sha256(t){
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

  if(i.type==="password"){i.type="text";b.textContent="🙈";}

}

async function doLogin(){
  const email = document.getElementById("login-email").value.trim().toLowerCase();
  const pwd   = document.getElementById("login-pwd").value;
  const errEl = document.getElementById("login-error");
  const btn   = document.getElementById("login-btn");
  errEl.style.display="none";
  if(!email||!pwd){errEl.textContent="Completa todos los campos.";errEl.style.display="block";return;}
  btn.disabled=true; btn.textContent="Verificando...";
  const hash = await sha256(pwd);
  const rows = queryAll(
    "SELECT u.*,e.codigo AS empresa_codigo FROM usuarios u LEFT JOIN empresas e ON e.id=u.id_empresa WHERE LOWER(u.email)=? AND u.password_hash=? AND u.activo=1",
    [email,hash]
  );
  if(!rows.length){
    errEl.textContent="Correo o contraseña incorrectos.";
    errEl.style.display="block";
    document.getElementById("login-pwd").classList.add("error");
    btn.disabled=false; btn.textContent="Ingresar"; return;
  }
  const u = rows[0];
  sesion = {email:u.email, nombre:u.nombre, rol:u.rol, id_empresa:u.id_empresa, id:u.id, empresa_codigo:u.empresa_codigo};
  const defaultEmp = queryAll("SELECT codigo FROM empresas WHERE codigo!='EQSOLUTIONS' AND activo=1 LIMIT 1")[0];
  filtros.empresa = u.rol==="cliente" ? u.empresa_codigo : (defaultEmp?.codigo||"LUKMAR");
  inicializarFiltros();
  mostrarApp();
}

function getKPIResumen(){
  let where="e.codigo=?", params=[filtros.empresa];
  if(filtroPeriodo.anio>0){where+=" AND k.anio=?"; params.push(filtroPeriodo.anio);}
  if(filtroPeriodo.mes>0){where+=" AND k.mes=?";  params.push(filtroPeriodo.mes);}
  const rows = queryAll(
    "SELECT a.codigo AS area_codigo,i.codigo AS kpi_codigo,i.nombre,i.unidad,i.descripcion," +
    "k.valor,k.meta,k.semaforo,k.anio,k.mes " +
    "FROM kpi_mensual k JOIN empresas e ON e.id=k.id_empresa " +
    "JOIN indicadores i ON i.id=k.id_indicador JOIN areas a ON a.id=i.id_area " +
    "WHERE "+where+" GROUP BY i.codigo HAVING k.anio=MAX(k.anio) AND k.mes=MAX(k.mes) " +
    "ORDER BY a.codigo,i.codigo", params
  );
  const res={};
  rows.forEach(r=>{
    if(!res[r.area_codigo]) res[r.area_codigo]=[];
    res[r.area_codigo].push({...r, trend:getTrend(r.kpi_codigo)});
  });
  return res;
}

function getTrend(kpiCodigo){
  let where="i.codigo=? AND e.codigo=?", params=[kpiCodigo,filtros.empresa];
  if(filtroPeriodo.anio>0){where+=" AND k.anio=?"; params.push(filtroPeriodo.anio);}
  return queryAll(
    "SELECT k.mes,k.valor FROM kpi_mensual k " +
    "JOIN indicadores i ON i.id=k.id_indicador JOIN empresas e ON e.id=k.id_empresa " +
    "WHERE "+where+" ORDER BY k.anio ASC,k.mes ASC LIMIT 12", params
  ).map(r=>({label:MESES_C[r.mes]||"",valor:r.valor}));
}

  html += '<div class="metrics-grid gap-16">';

    html += '<div class="metric-card"><div class="metric-label">'+m.l+'</div><div class="metric-value" style="color:'+m.c+'">'+m.val+'</div></div>';

    '<div class="salud-bar"><div style="flex:'+v+';background:var(--verde)"></div><div style="flex:'+a+';background:var(--amarillo)"></div><div style="flex:'+r+';background:var(--rojo)"></div></div>' +
    '<div class="salud-legend"><span style="color:var(--verde)">■ Meta '+Math.round(v/total*100)+'%</span><span style="color:var(--amarillo)">■ Alerta '+Math.round(a/total*100)+'%</span><span style="color:var(--rojo)">■ Crítico '+Math.round(r/total*100)+'%</span></div>' +
    '</div>';

  html += '<div style="margin-bottom:16px"><div class="section-title">Por Área — <span>clic para detalle</span></div><div class="areas-grid">';
  AREAS.filter(x=>x!=="Gerencial").forEach(area=>{
    const ak=kpis[area]||[];
    const av=ak.filter(k=>k.semaforo==="verde").length, aa=ak.filter(k=>k.semaforo==="amarillo").length, ar=ak.filter(k=>k.semaforo==="rojo").length;
    const pct=ak.length?Math.round(av/ak.length*100):0;
    const pc=pct>=70?"var(--verde)":pct>=40?"var(--amarillo)":"var(--rojo)";
    const barras=ak.map(k=>'<div class="area-bar" style="background:'+sc(k.semaforo)+'"></div>').join("")||'<div style="font-size:10px;color:var(--grisMed)">Sin datos</div>';

// ═══════════════════════════════════════════════════════════════
function renderArea(area){
  const kpis=getKPIResumen(), ak=kpis[area]||[];
  const v=ak.filter(k=>k.semaforo==="verde").length, a=ak.filter(k=>k.semaforo==="amarillo").length, r=ak.filter(k=>k.semaforo==="rojo").length;
  const puedeIngr = ["eq_admin","eq_lider"].includes(sesion?.rol);
  const anioF = filtroPeriodo.anio>0?filtroPeriodo.anio:2026;
  const mesF  = filtroPeriodo.mes>0?filtroPeriodo.mes:0;
  const pLabel= filtroPeriodo.anio===0?"todos los períodos":(filtroPeriodo.mes===0?"año "+filtroPeriodo.anio:MESES_N[filtroPeriodo.mes]+" "+filtroPeriodo.anio);

  // Pre-calcular datos TICs
  let sol=[], evt=[], act=[], resumenSol={}, totalAnio=0, hrsDesc=0, actComp=0, actProg=0;
  if(area==="TICs"){
    MESES_N.slice(1).forEach(mes=>{
      const base = [filtros.empresa,anioF,mes];
      const at = queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=? AND mes=? AND estado='Atendido'",base)[0]?.c||0;
      const pr = queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=? AND mes=? AND estado='En progreso'",base)[0]?.c||0;
      const pe = queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=? AND mes=? AND estado='Pendiente'",base)[0]?.c||0;
      resumenSol[mes]={at,pr,pe,total:at+pr+pe};
    });
    totalAnio = queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=?",[filtros.empresa,anioF])[0]?.c||0;
    hrsDesc   = queryAll("SELECT SUM(horas_desconexion) AS t FROM eventos_internet WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=?",[filtros.empresa,anioF])[0]?.t||0;
    sol = queryAll("SELECT numero,mes,fecha_solicitud,descripcion,solicitante,area_solicitante,estado,tipo_servicio FROM solicitudes_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=? ORDER BY fecha_solicitud DESC LIMIT 30",[filtros.empresa,anioF]);
    evt = queryAll("SELECT fecha_evento,semana,horas_desconexion,descripcion,causa FROM eventos_internet WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=? ORDER BY fecha_evento DESC LIMIT 20",[filtros.empresa,anioF]);
    const finMes = anioF+"-"+String(mesF>0?mesF:12).padStart(2,"0")+"-31";
    const iniMes = anioF+"-"+String(mesF>0?mesF:1).padStart(2,"0")+"-01";
    act = queryAll(
      "SELECT id,prioridad,tema,descripcion,estado,ROUND(avance_pct*100) AS avance,fecha_inicio,fecha_fin,trimestre " +
      "FROM actividades_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) " +
      "AND fecha_inicio<=? AND (fecha_fin IS NULL OR fecha_fin>=? OR estado!='Completada') " +
      "ORDER BY CASE estado WHEN 'En progreso' THEN 1 WHEN 'Pendiente' THEN 2 WHEN 'Atrasado' THEN 3 ELSE 4 END," +
      "CASE prioridad WHEN 'A' THEN 1 WHEN 'B' THEN 2 ELSE 3 END,fecha_inicio DESC",
      [filtros.empresa,finMes,iniMes]
    );
    actComp = act.filter(x=>x.estado==="Completada").length;
    actProg = act.filter(x=>x.estado==="En progreso").length;
  }

  let html = buildPeriodoUI();

  // Header área
  html += '<div class="area-view-header">' +
    '<div class="area-icon-box" style="font-size:22px">'+(area==="TICs"?"⚙️":area==="Contabilidad"?"📒":area==="Abastecimiento"?"📦":area==="RRHH"?"👥":"⬜")+'</div>' +
    '<div><div class="area-view-title">'+area+'</div><div class="area-view-sub">'+ak.length+' indicadores · '+pLabel+'</div></div>' +
    '<div class="area-counters">' +
    '<div class="area-counter"><div class="area-counter-val" style="color:var(--verde)">'+v+'</div><div class="area-counter-lbl">OK</div></div>' +
    '<div class="area-counter"><div class="area-counter-val" style="color:var(--amarillo)">'+a+'</div><div class="area-counter-lbl">Alerta</div></div>' +
    '<div class="area-counter"><div class="area-counter-val" style="color:var(--rojo)">'+r+'</div><div class="area-counter-lbl">Crítico</div></div>' +
    '</div></div>';

  // KPI cards
  if(ak.length){
    html += '<div class="kpi-grid" style="margin-bottom:24px">';
    ak.forEach(k=>{
      const c=sc(k.semaforo||"rojo"), pct=k.meta?Math.min(Math.round(Math.abs(k.valor/k.meta)*100),100):0;
      const lbl=k.semaforo==="verde"?"✓ EN META":k.semaforo==="amarillo"?"⚡ ALERTA":"✕ CRÍTICO";
      html += '<div class="kpi-card">' +
        '<div class="kpi-stripe" style="background:'+c+'"></div>' +
        '<div class="kpi-top"><span class="kpi-desc">'+esc(k.descripcion||"")+'</span><span class="kpi-badge" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'40">'+lbl+'</span></div>' +
        '<div class="kpi-nombre">'+esc(k.nombre)+'</div>' +
        '<div class="kpi-valor-row"><span class="kpi-valor" style="color:'+c+'">'+fv(k.valor,k.unidad)+'</span><span class="kpi-meta">meta: '+fv(k.meta,k.unidad)+'</span></div>' +
        '<div><div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:'+pct+'%;background:'+c+'"></div></div>' +
        '<div class="kpi-pct">'+pct+'% · '+(MESES_C[k.mes]||"—")+' '+(k.anio||"")+'</div></div>' +
        '<div class="kpi-chart"><canvas id="ch-'+k.kpi_codigo+'"></canvas></div>' +
        (puedeIngr&&area==="TICs"?'<button class="kpi-reg-btn" data-kpi="'+k.kpi_codigo+'" onclick="abrirRegistroRapido(this.dataset.kpi)">＋ Registrar nuevo dato</button>':"") +
        '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="card" style="text-align:center;padding:36px;margin-bottom:16px"><div style="font-size:24px;margin-bottom:8px">📊</div><div style="font-weight:700">'+area+' — Sin datos en el período</div></div>';
  }

  // Detalle TICs
  if(area==="TICs"){
    // Tabla resumen solicitudes
    const mesesList = MESES_N.slice(1);
    let tblHeader = '<th style="background:var(--azul);color:#fff;padding:7px 10px;text-align:left;border:1px solid var(--borde);font-size:10px">Solicitudes</th>';
    mesesList.forEach(m=>{ tblHeader += '<th style="background:var(--azul);color:#fff;padding:7px 6px;text-align:center;border:1px solid var(--borde);font-size:10px">'+m.slice(0,3)+'</th>'; });

    const estadosDef = [{k:"Pendiente",fld:"pe",bg:"#fafafa",col:"var(--grisMed)"},{k:"En progreso",fld:"pr",bg:"#fffbea",col:"var(--amarillo)"},{k:"Atendido",fld:"at",bg:"#f0faf6",col:"var(--verde)"}];
    let tblRows="";
    estadosDef.forEach(ed=>{
      let celdas="";
      mesesList.forEach(mes=>{ const val=resumenSol[mes]?.[ed.fld]||0; celdas+='<td style="padding:6px 6px;border:1px solid var(--borde);text-align:center;background:'+ed.bg+';color:'+(val>0?ed.col:"var(--grisMed)")+'">'+val+'</td>'; });
      tblRows+='<tr><td style="padding:6px 10px;border:1px solid var(--borde);font-weight:600;color:'+ed.col+';background:'+ed.bg+'">'+ed.k+'</td>'+celdas+'</tr>';
    });
    // Total
    let totCeldas="";
    mesesList.forEach(mes=>{ totCeldas+='<td style="padding:7px 6px;border:1px solid var(--borde);text-align:center;font-weight:800;background:var(--azul);color:#fff">'+(resumenSol[mes]?.total||0)+'</td>'; });
    tblRows+='<tr><td style="padding:7px 10px;border:1px solid var(--borde);font-weight:800;background:var(--azul);color:#fff">Total</td>'+totCeldas+'</tr>';
    // %
    let pctCeldas="";
    mesesList.forEach(mes=>{
      const t=resumenSol[mes]?.total||0, at=resumenSol[mes]?.at||0;
      const pct=t>0?Math.round(at/t*100):null;
      const col=pct===100?"var(--verde)":pct>=85?"var(--amarillo)":pct!==null?"var(--rojo)":"var(--grisMed)";
      pctCeldas+='<td style="padding:5px 6px;border:1px solid var(--borde);text-align:center;font-weight:700;color:'+col+';background:#EBF6FB;font-size:10px">'+(pct!==null?pct+"%":"")+'</td>';
    });
    tblRows+='<tr><td style="padding:5px 10px;border:1px solid var(--borde);background:#EBF6FB"></td>'+pctCeldas+'</tr>';

    html += '<div style="display:grid;grid-template-columns:1fr 300px;gap:16px;margin-bottom:16px">' +
      '<div class="card"><div class="section-title">Resumen de Solicitudes de Usuario</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr>'+tblHeader+'</tr></thead><tbody>'+tblRows+'</tbody></table>' +
      '<div style="display:inline-flex;margin-top:10px;border:1px solid var(--borde);border-radius:4px;overflow:hidden;font-size:11px"><div style="background:var(--azul);color:#fff;padding:5px 12px;font-weight:700">Acumulado '+anioF+'</div><div style="background:var(--grisLight);padding:5px 16px;font-weight:800;color:var(--tq)">'+totalAnio+' solicitudes</div></div>' +
      '</div></div>' +
      '<div class="card" style="display:flex;flex-direction:column;align-items:center">' +
      '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--azul);text-align:center;margin-bottom:4px">Solicitudes — '+(mesF>0?MESES_N[mesF].toUpperCase():"AÑO "+anioF)+'</div>' +
      '<div style="position:relative;width:200px;height:200px;margin:8px auto"><canvas id="pie-solicitudes"></canvas></div>' +
      '<div style="font-size:10px;color:var(--grisMed);margin-top:4px;text-align:center" id="pie-sol-legend"></div>' +
      '</div></div>';

    html += '<div class="card gap-16" style="margin-bottom:16px"><div class="section-title">Solicitudes de Usuarios Mensuales — <span>'+anioF+'</span></div><div style="height:240px;position:relative"><canvas id="bar-solicitudes"></canvas></div></div>';

    // Bitácora
    html += '<div class="card gap-16" style="margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:space-between"><div class="section-title" style="margin:0">Bitácora de Solicitudes <span style="color:var(--grisMed)">('+sol.length+')</span></div>';
    if(puedeIngr){ html += '<button class="action-btn primary" onclick="irAIngreso(\'ticket\')">＋ Nueva Solicitud</button>'; }
    html += '</div><div style="overflow-x:auto"><table class="tabla-detalle"><thead><tr><th>#</th><th>Fecha</th><th>Descripción</th><th>Solicitante</th><th>Área</th><th>Servicio</th><th>Estado</th></tr></thead><tbody>';
    if(sol.length){
      sol.forEach(s=>{
        const eClass=s.estado==="Atendido"?"estado-ok":s.estado==="En progreso"?"estado-warn":"estado-bad";
        html += '<tr><td>'+(s.numero||"—")+'</td><td>'+(s.fecha_solicitud||"—")+'</td>' +
          '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(s.descripcion||"")+'">'+esc(s.descripcion||"—")+'</td>' +
          '<td>'+esc(s.solicitante||"—")+'</td><td>'+esc(s.area_solicitante||"—")+'</td><td>'+esc(s.tipo_servicio||"—")+'</td>' +
          '<td><span class="estado-badge '+eClass+'">'+(s.estado||"—")+'</span></td></tr>';
      });
    } else {
      html += '<tr><td colspan="7" style="text-align:center;color:var(--grisMed);padding:16px">Sin registros en el período</td></tr>';
    }
    html += '</tbody></table></div></div>';

    // Eventos
    html += '<div class="card gap-16" style="margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:space-between"><div class="section-title" style="margin:0">Eventos de Conectividad <span style="color:var(--grisMed)">('+evt.length+')</span> ';
    html += hrsDesc>0?'<span style="color:var(--rojo);font-weight:700;margin-left:8px">· '+hrsDesc+'h desconexión</span>':'<span style="color:var(--verde);font-weight:700;margin-left:8px">· Sin desconexiones</span>';
    html += '</div>';
    if(puedeIngr){ html += '<button class="action-btn primary" onclick="irAIngreso(\'evento\')">＋ Nuevo Evento</button>'; }
    html += '</div><div style="overflow-x:auto"><table class="tabla-detalle"><thead><tr><th>Fecha</th><th>Semana</th><th>Descripción</th><th>Hrs</th><th>Causa</th></tr></thead><tbody>';
    if(evt.length){
      evt.forEach(e=>{
        const hc=e.horas_desconexion>5?"var(--rojo)":e.horas_desconexion>2?"var(--amarillo)":"var(--verde)";
        html += '<tr><td>'+(e.fecha_evento||"—")+'</td><td>'+(e.semana||"—")+'</td>' +
          '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(e.descripcion||"—")+'</td>' +
          '<td><span style="font-weight:700;color:'+hc+'">'+e.horas_desconexion+'h</span></td>' +
          '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(e.causa||"—")+'</td></tr>';
      });
    } else {
      html += '<tr><td colspan="5" style="text-align:center;padding:16px"><span style="color:var(--verde);font-weight:700">✓ Sin eventos de desconexión — Servicio al 100%</span></td></tr>';
    }
    html += '</tbody></table></div></div>';

    // Actividades
    html += '<div class="card"><div style="display:flex;align-items:center;justify-content:space-between"><div class="section-title" style="margin:0">Proyectos y Actividades TIC <span style="color:var(--grisMed)">('+act.length+')</span> <span style="color:var(--verde);font-weight:700;margin-left:8px">· '+actComp+' completadas</span><span style="color:var(--amarillo);font-weight:700;margin-left:8px">· '+actProg+' en progreso</span></div>';
    if(puedeIngr){ html += '<button class="action-btn primary" onclick="irAIngreso(\'actividad\')">＋ Nueva Actividad</button>'; }
    html += '</div><div style="overflow-x:auto"><table class="tabla-detalle"><thead><tr><th>Prio.</th><th>Tema</th><th>Descripción</th><th>Inicio</th><th>Fin</th><th>Avance</th><th>Estado</th><th></th></tr></thead><tbody>';
    if(act.length){
      act.forEach(a=>{
        const hoy=new Date().toISOString().slice(0,10);
        const vencida=a.fecha_fin&&a.fecha_fin<hoy&&a.estado!=="Completada";
        const cBarra=a.estado==="Completada"?"var(--verde)":a.estado==="Standby"?"var(--grisMed)":"var(--tq)";
        const cPrio=a.prioridad==="A"?"var(--rojo)":a.prioridad==="B"?"var(--amarillo)":"var(--tq)";
        const eClass=a.estado==="Completada"?"estado-ok":a.estado==="En progreso"?"estado-warn":"estado-bad";
        html += '<tr style="'+(vencida?"background:#FFF8F8":"")+'">' +
          '<td><span style="font-weight:700;color:'+cPrio+'">'+(a.prioridad||"—")+'</span></td>' +
          '<td style="font-size:10px;color:var(--grisMed)">'+esc(a.trimestre||"—")+'</td>' +
          '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(a.descripcion||"")+'">'+esc(a.descripcion||"—")+'</td>' +
          '<td>'+(a.fecha_inicio||"—")+'</td>' +
          '<td style="color:'+(vencida?"var(--rojo)":"inherit")+'">'+(a.fecha_fin||"—")+'</td>' +
          '<td><div style="display:flex;align-items:center;gap:6px"><div style="width:56px;height:5px;background:var(--grisLight);border-radius:3px;overflow:hidden"><div style="width:'+(a.avance||0)+'%;height:100%;background:'+cBarra+'"></div></div><span style="font-size:11px;font-weight:700">'+(a.avance||0)+'%</span></div></td>' +
          '<td><span class="estado-badge '+eClass+'">'+(a.estado||"—")+'</span></td>' +
          '<td>';
        if(puedeIngr){
          html += '<button class="action-btn" style="font-size:10px;padding:3px 8px" ' +
            'data-id="'+(a.id||0)+'" data-av="'+(a.avance||0)+'" data-est="'+esc(a.estado||"En progreso")+'" data-desc="'+esc((a.descripcion||"").substring(0,50))+'" ' +
            'onclick="abrirEditorAvance(this)">✏ Avance</button>';
        }
        html += '</td></tr>';
      });
    } else {
      html += '<tr><td colspan="8" style="text-align:center;color:var(--grisMed);padding:16px">Sin actividades en el período</td></tr>';
    }
    html += '</tbody></table></div></div>';
  }

  return html;
}

function initChartsKPI(area){
  (getKPIResumen()[area]||[]).forEach(k=>{
    const ctx=document.getElementById("ch-"+k.kpi_codigo);
    if(!ctx||!k.trend?.length) return;
    const c=sc(k.semaforo||"rojo");
    charts[k.kpi_codigo]=new Chart(ctx,{type:"line",data:{labels:k.trend.map(t=>t.label),datasets:[{data:k.trend.map(t=>t.valor),borderColor:c,borderWidth:2,pointRadius:0,tension:.4,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{ticks:{color:"#6B87A8",font:{size:9}},grid:{display:false}},y:{display:false}}}});
  });
  if(area==="TICs") setTimeout(()=>initChartsTICs(),80);
}

function initChartsTICs(){
  const anioF=filtroPeriodo.anio>0?filtroPeriodo.anio:2025;
  const mesF =filtroPeriodo.mes>0?filtroPeriodo.mes:0;
  const emp  =filtros.empresa;
  const base =[emp,anioF];

  const ctxPie=document.getElementById("pie-solicitudes");
  if(ctxPie){
    let where="id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=?", params=[emp,anioF];
    if(mesF>0){where+=" AND mes=?"; params.push(MESES_N[mesF]);}
    const at=queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE "+where+" AND estado='Atendido'",params)[0]?.c||0;
    const pr=queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE "+where+" AND estado='En progreso'",params)[0]?.c||0;
    const pe=queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE "+where+" AND estado='Pendiente'",params)[0]?.c||0;
    const tot=at+pr+pe;
    charts["pie-sol"]=new Chart(ctxPie,{type:"doughnut",data:{labels:["Atendido","En progreso","Pendiente"],datasets:[{data:[at,pr,pe],backgroundColor:["#16A97A","#D4A012","#6B87A8"],borderWidth:2,borderColor:"#fff"}]},options:{responsive:true,maintainAspectRatio:true,cutout:"55%",plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+": "+ctx.raw+(tot?" ("+Math.round(ctx.raw/tot*100)+"%)":"")}}}}});
    const leg=document.getElementById("pie-sol-legend");
    if(leg){
      const data=[{l:"Atendido",v:at,c:"#16A97A"},{l:"En progreso",v:pr,c:"#D4A012"},{l:"Pendiente",v:pe,c:"#6B87A8"}];
      leg.innerHTML=data.map(d=>'<div style="display:inline-flex;align-items:center;gap:5px;margin:3px 8px"><div style="width:10px;height:10px;border-radius:50%;background:'+d.c+'"></div><span style="font-weight:700;color:'+d.c+'">'+d.l+' '+d.v+'</span><span style="color:var(--grisMed)">'+(tot?Math.round(d.v/tot*100):0)+'%</span></div>').join("");
    }
  }

  const ctxBar=document.getElementById("bar-solicitudes");
  if(ctxBar){
    const meses=MESES_N.slice(1);
    const dataAt=[],dataPr=[],dataPe=[],dataTotal=[];
    meses.forEach(mes=>{
      const b=[emp,anioF,mes];
      const at=queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=? AND mes=? AND estado='Atendido'",b)[0]?.c||0;
      const pr=queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=? AND mes=? AND estado='En progreso'",b)[0]?.c||0;
      const pe=queryAll("SELECT COUNT(*) AS c FROM solicitudes_tic WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=? AND mes=? AND estado='Pendiente'",b)[0]?.c||0;
      dataAt.push(at); dataPr.push(pr); dataPe.push(pe); dataTotal.push(at+pr+pe);
    });
    charts["bar-sol"]=new Chart(ctxBar,{type:"bar",data:{labels:meses,datasets:[{label:"Pendiente",data:dataPe,backgroundColor:"#6B87A8",stack:"s",borderRadius:2},{label:"En progreso",data:dataPr,backgroundColor:"#D4A012",stack:"s",borderRadius:2},{label:"Atendido",data:dataAt,backgroundColor:"#16A97A",stack:"s",borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{color:"#6B87A8",font:{family:"Open Sans",size:11},boxWidth:12,padding:16}}},scales:{x:{ticks:{color:"#6B87A8",font:{size:10}},grid:{display:false}},y:{ticks:{color:"#6B87A8",stepSize:5},grid:{color:"#E0E8F0"},beginAtZero:true}}},plugins:[{id:"totalLbl",afterDatasetsDraw(chart){const{ctx}=chart;ctx.save();chart.data.labels.forEach((_,i)=>{const sum=dataTotal[i];if(!sum)return;const bar=chart.getDatasetMeta(chart.data.datasets.length-1).data[i];ctx.font="bold 11px 'Open Sans'";ctx.fillStyle="#1A3756";ctx.textAlign="center";ctx.fillText(sum,bar.x,bar.y-5);});ctx.restore();}}]});
  }
}

// FINANZAS
// ═══════════════════════════════════════════════════════════════
function renderFinanzas(){
  const anioF=filtroPeriodo.anio>0?filtroPeriodo.anio:2025;
  const mesF =filtroPeriodo.mes>0?filtroPeriodo.mes:0;
  const emp  =filtros.empresa;

  let whereKPI="id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND id_indicador=(SELECT id FROM indicadores WHERE codigo='FIN-001') AND anio=?";
  let paramsKPI=[emp,anioF];

    '<div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--grisMed);margin-bottom:6px">TES-IND-001</div>' +

    '<div style="font-size:12px;color:var(--grisMed);margin:8px 0">meta: '+meta+'%</div>' +
    '<div style="height:6px;background:var(--grisLight);border-radius:3px;overflow:hidden;margin:8px 0">' +
    '<div style="width:'+Math.min(valor/meta*100,100)+'%;height:100%;background:'+c+'"></div></div>' +
    '<span class="kpi-badge" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'40;font-size:11px;padding:4px 12px">'+(sem==="verde"?"✓ EN META":sem==="amarillo"?"⚡ ALERTA":"✕ CRÍTICO")+'</span>' +
    '</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">';
  [{l:"Total Transacciones",v:totalTxn.toLocaleString(),c:"var(--tq)"},{l:"Cumplieron",v:totalCumpl.toLocaleString(),c:"var(--verde)"},{l:"No Cumplieron",v:totalNoCumpl.toLocaleString(),c:"var(--rojo)"},{l:"Facturas en Cartera",v:totalCuentas.toLocaleString(),c:"var(--azul)"},{l:"Facturas Vencidas",v:cuentasVenc.toLocaleString(),c:"var(--rojo)"},{l:"Por Vencer",v:(totalCuentas-cuentasVenc).toLocaleString(),c:"var(--verde)"}].forEach(m=>{
    html += '<div class="metric-card" style="padding:14px 18px"><div class="metric-label">'+m.l+'</div><div style="font-size:26px;font-weight:800;font-family:\'Raleway\',sans-serif;color:'+m.c+'">'+m.v+'</div></div>';
  });
  html += '</div></div>';

  // Tabla + barras
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">';
  html += '<div class="card"><div class="section-title">Total de Transacciones por Período</div><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>';
  ["Período","Cumplió","No Cumplió","Total","% Cumpl.","Objetivo"].forEach(h=>{
    html += '<th style="background:var(--azul);color:#fff;padding:7px 8px;text-align:center;font-size:10px;white-space:nowrap">'+h+'</th>';
  });
  html += '</tr></thead><tbody>';
  if(pagos.length){
    pagos.forEach((r,i)=>{
      const bg=i%2===0?"var(--blanco)":"var(--grisLight)";
      const cp=r.pct_cumplimiento>=95?"var(--verde)":r.pct_cumplimiento>=80?"var(--amarillo)":"var(--rojo)";

        '<td style="padding:7px 8px;text-align:center;background:'+bg+';font-weight:800;color:'+cp+'">'+(r.pct_cumplimiento||0).toFixed(1)+'%</td>' +
        '<td style="padding:7px 8px;text-align:center;background:'+bg+';color:var(--grisMed)">95%</td></tr>';
    });
    html += '<tr style="background:var(--azul)"><td style="padding:7px 8px;color:#fff;font-weight:800;text-align:center">TOTAL</td>' +
      '<td style="padding:7px 8px;color:#6ECE8E;font-weight:800;text-align:center">'+totalCumpl.toLocaleString()+'</td>' +
      '<td style="padding:7px 8px;color:#ff9999;font-weight:800;text-align:center">'+totalNoCumpl.toLocaleString()+'</td>' +
      '<td style="padding:7px 8px;color:#fff;font-weight:800;text-align:center">'+totalTxn.toLocaleString()+'</td>' +
      '<td style="padding:7px 8px;color:'+c+';font-weight:800;text-align:center">'+valor.toFixed(1)+'%</td>' +
      '<td style="padding:7px 8px;color:#aad4ff;text-align:center">95%</td></tr>';
  } else {
    html += '<tr><td colspan="6" style="text-align:center;color:var(--grisMed);padding:20px">Sin datos en el período</td></tr>';
  }
  html += '</tbody></table></div>';
  html += '<div class="card"><div class="section-title">Distribución — Cumplió / No Cumplió</div><div style="height:280px;position:relative"><canvas id="bar-pagos"></canvas></div></div>';
  html += '</div>';

  // Cartera + top proveedores
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">';
  html += '<div class="card"><div class="section-title">Cartera por Antigüedad — '+totalCuentas.toLocaleString()+' facturas</div>' +
    '<div style="display:grid;grid-template-columns:180px 1fr;gap:16px;align-items:center">' +
    '<div style="position:relative;height:180px"><canvas id="donut-cartera"></canvas></div><div>';
  cartera.forEach(r=>{
    const pct=totalCuentas?Math.round(r.c/totalCuentas*100):0;
    const cCol=cMap[r.estado_cartera]||"#999";

  html += '<div class="card"><div class="section-title">Top Proveedores con Facturas Vencidas</div>' +

    html += '<th style="background:var(--grisLight);color:var(--azul);padding:7px 10px;text-align:left;font-size:10px;font-weight:700;border-bottom:2px solid var(--borde)">'+hh+'</th>';
  });
  html += '</tr></thead><tbody>';
  if(topProv.length){
    topProv.forEach((r,i)=>{
      const bg=i%2===0?"var(--blanco)":"var(--grisLight)";
      const cd=r.max_dias>90?"var(--rojo)":r.max_dias>60?"#F07000":r.max_dias>30?"var(--amarillo)":"var(--verde)";
      html += '<tr><td style="padding:7px 10px;background:'+bg+';max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.proveedor||"—")+'</td>' +
        '<td style="padding:7px 10px;background:'+bg+';text-align:center;font-weight:700;color:var(--rojo)">'+r.c+'</td>' +
        '<td style="padding:7px 10px;background:'+bg+';text-align:center;font-weight:700;color:'+cd+'">'+r.max_dias+'d</td></tr>';
    });
  } else {
    html += '<tr><td colspan="3" style="text-align:center;color:var(--grisMed);padding:16px">Sin datos</td></tr>';
  }
  html += '</tbody></table></div></div>';

  html += '<div class="card" style="background:var(--grisLight);border:1px dashed var(--tq)">' +
    '<div style="display:flex;align-items:center;gap:14px"><span style="font-size:24px">🔗</span>' +
    '<div><div style="font-weight:700;color:var(--azul);font-size:13px">Conexión directa con ERP ACOSUX</div>' +
    '<div style="font-size:11px;color:var(--grisMed);margin-top:2px">Este indicador se alimenta desde el módulo de Cuentas por Pagar de ACOSUX. La integración vía API (en desarrollo al 75%) permitirá actualización automática en tiempo real.</div></div>' +
    '<div style="margin-left:auto;text-align:center;flex-shrink:0"><div style="font-size:22px;font-weight:800;color:var(--tq)">75%</div><div style="font-size:10px;color:var(--grisMed)">API en desarrollo</div></div>' +
    '</div></div>';
  return html;
}

function initChartsFinanzas(){
  const anioF=filtroPeriodo.anio>0?filtroPeriodo.anio:2025;
  const mesF =filtroPeriodo.mes>0?filtroPeriodo.mes:0;
  const emp  =filtros.empresa;
  let wherePP="id_empresa=(SELECT id FROM empresas WHERE codigo=?) AND anio=?";
  let paramsPP=[emp,anioF];
  if(mesF>0){wherePP+=" AND mes=?"; paramsPP.push(mesF);}
  const pagos=queryAll("SELECT periodo_label,cumplieron,no_cumplieron,total,pct_cumplimiento FROM pagos_proveedores WHERE "+wherePP+" ORDER BY semana ASC",paramsPP);

  const ctxBar=document.getElementById("bar-pagos");
  if(ctxBar&&pagos.length){
    charts["bar-pagos"]=new Chart(ctxBar,{type:"bar",data:{labels:pagos.map(r=>r.periodo_label),datasets:[{label:"No Cumplió",data:pagos.map(r=>r.no_cumplieron||0),backgroundColor:"#E87A2A",stack:"s",borderRadius:2},{label:"Cumplió",data:pagos.map(r=>r.cumplieron||0),backgroundColor:"#1A6FCF",stack:"s",borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"top",labels:{color:"#6B87A8",font:{family:"Open Sans",size:11},boxWidth:12}},tooltip:{callbacks:{afterTitle:items=>"Total: "+(pagos[items[0].dataIndex]?.total||0).toLocaleString()+" | "+((pagos[items[0].dataIndex]?.pct_cumplimiento)||0).toFixed(1)+"%"}}},scales:{x:{ticks:{color:"#6B87A8",font:{size:11}},grid:{display:false}},y:{ticks:{color:"#6B87A8"},grid:{color:"#E0E8F0"},beginAtZero:true}}},plugins:[{id:"pctLbl",afterDatasetsDraw(chart){const{ctx}=chart;ctx.save();chart.data.labels.forEach((_,i)=>{const pct=pagos[i]?.pct_cumplimiento||0;const bar=chart.getDatasetMeta(0).data[i];if(bar){ctx.font="bold 10px 'Open Sans'";ctx.fillStyle="#fff";ctx.textAlign="center";ctx.fillText(Math.round(pct)+"%",bar.x,bar.y+12);}});ctx.restore();}}]});
  }

  const ctxDonut=document.getElementById("donut-cartera");
  if(ctxDonut){
    const cartera=queryAll("SELECT estado_cartera, COUNT(*) c FROM cuentas_por_pagar WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?) GROUP BY estado_cartera ORDER BY CASE estado_cartera WHEN 'POR VENCER' THEN 1 WHEN '1-30' THEN 2 WHEN '30-60' THEN 3 WHEN '60-90' THEN 4 ELSE 5 END",[emp]);
    const cMap={"POR VENCER":"#16A97A","1-30":"#D4A012","30-60":"#F07000","60-90":"#E03355",">90":"#8B0000"};
    charts["donut-cartera"]=new Chart(ctxDonut,{type:"doughnut",data:{labels:cartera.map(r=>r.estado_cartera),datasets:[{data:cartera.map(r=>r.c),backgroundColor:cartera.map(r=>cMap[r.estado_cartera]||"#aaa"),borderWidth:2,borderColor:"#fff"}]},options:{responsive:true,maintainAspectRatio:false,cutout:"60%",plugins:{legend:{display:false}}}});
  }
}

function gId(id){ return document.getElementById(id); }
function gVal(id){ return gId(id)?.value||""; }

async function guardarEvento(){
  const empId=parseInt(gVal("ie-empresa")), fecha=gVal("ie-fecha"), desc=gVal("ie-desc").trim();
  if(!fecha||!desc){showError("Fecha y descripcion son obligatorios.");return;}
  const mes=parseInt(gVal("ie-mes")), anio=parseInt(gVal("ie-anio")||"2025"), horas=parseFloat(gVal("ie-horas")||"0");
  try{
    const data={id_empresa:empId,semana:gVal("ie-semana"),mes:MESES_N[mes],anio,fecha_evento:fecha,
      descripcion:desc,informante:gVal("ie-informa"),horas_desconexion:horas,
      responsable:gVal("ie-responsable")||"Lider TIC",causa:gVal("ie-causa")};
    const row=await sbInsert("eventos_internet",data);
    if(Array.isArray(row)&&row.length)(window._sbCache.eventos_internet=window._sbCache.eventos_internet||[]).unshift(row[0]);
    else window._sbCache.eventos_internet.unshift({...data,id:Date.now()});
    await recalcularKPIInternet(empId,anio,mes);
    showSuccess("Evento de desconexion registrado");
    ["ie-desc","ie-semana","ie-horas","ie-informa","ie-causa"].forEach(id=>{const el=gId(id);if(el)el.value="";});
    renderContent();
  }catch(e){showError("Error: "+e.message);}
}

async function guardarTicket(){
  const empId=parseInt(gVal("it-empresa")), fecha=gVal("it-fecha"), desc=gVal("it-desc").trim(), solic=gVal("it-solicitante").trim();

  const mes=parseInt(gVal("it-mes")), anio=parseInt(gVal("it-anio")||"2025");

  const sols=(window._sbCache?.solicitudes_tic||[]);

  try{
    const data={id_empresa:empId,numero:numAct+1,mes:mesNom,anio,fecha_solicitud:fecha,descripcion:desc,
      solicitante:solic,area_solicitante:gVal("it-area"),responsable:gVal("it-responsable")||"Lider TIC",

    else window._sbCache.solicitudes_tic.unshift({...data,id:Date.now()});

async function guardarActividad(){
  const empId=parseInt(gVal("ia-empresa")), desc=gVal("ia-desc").trim(), inicio=gVal("ia-inicio");
  if(!desc||!inicio){showError("Descripcion y fecha de inicio son obligatorios.");return;}

      estado:gVal("ia-estado"),avance_pct:avance,observaciones:gVal("ia-obs")};

async function recalcularKPIInternet(empId,anio,mes){
  const evts=(window._sbCache?.eventos_internet||[]).filter(e=>e.id_empresa===empId&&e.anio===anio&&e.mes===MESES_N[mes]);
  const horas=evts.reduce((s,e)=>s+(parseFloat(e.horas_desconexion)||0),0);
  const efec=Math.round(((720-horas)/720)*1000)/10;
  const sem=efec>=99?"verde":efec>=98?"amarillo":"rojo";
  const ind=(window._sbCache?.indicadores||[]).find(i=>i.codigo==="TIC-003");
  if(!ind) return;
  const data={id_empresa:empId,id_indicador:ind.id,anio,mes,valor:efec,meta:99.5,semaforo:sem};
  try{ await sbUpsert("kpi_mensual",data,"id_empresa,id_indicador,anio,mes"); }catch(e){ console.warn("upsert kpi:",e.message); }
  const cache=window._sbCache.kpi_mensual=window._sbCache.kpi_mensual||[];
  const ki=cache.findIndex(k=>k.id_empresa===empId&&k.id_indicador===ind.id&&k.anio===anio&&k.mes===mes);
  if(ki>=0) cache[ki]={...cache[ki],...data}; else cache.push(data);
}

async function recalcularKPIAtencion(empId,anio,mes){
  const mesNom=MESES_N[mes];
  const sols=(window._sbCache?.solicitudes_tic||[]).filter(s=>s.id_empresa===empId&&s.anio===anio&&s.mes===mesNom);
  const total=sols.length; const atend=sols.filter(s=>s.estado==="Atendido").length;
  if(!total) return;
  const pct=Math.round(atend/total*1000)/10;
  const sem=pct>=95?"verde":pct>=85?"amarillo":"rojo";
  const ind=(window._sbCache?.indicadores||[]).find(i=>i.codigo==="TIC-002");
  if(!ind) return;
  const data={id_empresa:empId,id_indicador:ind.id,anio,mes,valor:pct,meta:90.0,semaforo:sem};
  try{ await sbUpsert("kpi_mensual",data,"id_empresa,id_indicador,anio,mes"); }catch(e){ console.warn("upsert kpi:",e.message); }
  const cache=window._sbCache.kpi_mensual=window._sbCache.kpi_mensual||[];
  const ki=cache.findIndex(k=>k.id_empresa===empId&&k.id_indicador===ind.id&&k.anio===anio&&k.mes===mes);
  if(ki>=0) cache[ki]={...cache[ki],...data}; else cache.push(data);
}

async function recalcularKPIActividades(empId,anio,mes){
  const acts=(window._sbCache?.actividades_tic||[]).filter(a=>a.id_empresa===empId&&String(a.fecha_inicio||"").startsWith(String(anio)));
  const total=acts.filter(a=>a.estado!=="Standby").length;
  const comp=acts.filter(a=>a.estado==="Completada").length;
  if(!total) return;
  const pct=Math.round(comp/total*1000)/10;
  const sem=pct>=95?"verde":pct>=85?"amarillo":"rojo";
  const ind=(window._sbCache?.indicadores||[]).find(i=>i.codigo==="TIC-001");
  if(!ind) return;
  const data={id_empresa:empId,id_indicador:ind.id,anio,mes,valor:pct,meta:95.0,semaforo:sem};
  try{ await sbUpsert("kpi_mensual",data,"id_empresa,id_indicador,anio,mes"); }catch(e){ console.warn("upsert kpi:",e.message); }
  const cache=window._sbCache.kpi_mensual=window._sbCache.kpi_mensual||[];
  const ki=cache.findIndex(k=>k.id_empresa===empId&&k.id_indicador===ind.id&&k.anio===anio&&k.mes===mes);
  if(ki>=0) cache[ki]={...cache[ki],...data}; else cache.push(data);
}

async function guardarAvance(id){
  const avance=parseInt(gId("av-range")?.value||"0")/100;
  const estado=gVal("av-estado")||"En progreso";
  const obs=gVal("av-obs")||"";
  const ts=new Date().toISOString();
  try{
    await sbUpdate("actividades_tic",{avance_pct:avance,estado,observaciones:obs,ultima_actualizacion:ts},"id",id);
    const act=(window._sbCache?.actividades_tic||[]).find(a=>a.id===id);
    if(act){act.avance_pct=avance;act.estado=estado;act.observaciones=obs;}
    closeModal();
    showSuccess("Avance actualizado a "+Math.round(avance*100)+"% — "+estado);
    renderContent();
  }catch(e){showError("Error actualizando: "+e.message);}
}

    '<div class="form-group"><label class="form-label">Correo electrónico</label><input type="email" id="m-email" class="form-input" placeholder="usuario@empresa.com"/></div>' +
    '<div class="form-group"><label class="form-label">Rol</label><select id="m-rol" class="form-select" onchange="onRolChange()"><option value="eq_admin">Administrador EQ</option><option value="eq_lider">Líder EQ</option><option value="cliente" selected>Cliente</option></select></div>' +
    '<div class="form-group" id="m-emp-grp"><label class="form-label">Empresa cliente</label><select id="m-empresa" class="form-select">'+emps.map(e=>'<option value="'+e.id+'">'+esc(e.nombre)+' ('+esc(e.codigo)+')</option>').join("")+'</select></div>' +
    '<div class="form-group"><label class="form-label">Contraseña temporal</label>' +
    '<div class="pw-wrap"><input type="password" id="m-pwd" class="form-input" placeholder="Mín. 8 caracteres" oninput="checkPwdStrength()"/><button class="pw-toggle" onclick="togglePwdModal()">👁</button></div>' +
    '<div class="pwd-strength" id="m-str"></div></div>' +
    '<div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="guardarNuevoUsuario()">Crear</button></div></div>');
}

function onRolChange(){ const r=gVal("m-rol"),g=gId("m-emp-grp"); if(g)g.style.display=r==="cliente"?"block":"none"; }
function togglePwdModal(){ const i=gId("m-pwd"); if(i)i.type=i.type==="password"?"text":"password"; }
function checkPwdStrength(){
  const v=gVal("m-pwd"), b=gId("m-str"); if(!b) return;
  const s=[v.length>=8,/[A-Z]/.test(v),/[0-9]/.test(v),/[^A-Za-z0-9]/.test(v)].filter(Boolean).length;
  b.style.width=(s*25)+"%"; b.style.background=["var(--rojo)","var(--rojo)","var(--amarillo)","var(--verde)","var(--verde)"][s];
}

async function guardarNuevoUsuario(){
  const nombre=gVal("m-nombre").trim(), email=gVal("m-email").trim().toLowerCase(), rol=gVal("m-rol"), pwd=gVal("m-pwd");
  const empId=rol==="cliente"?parseInt(gVal("m-empresa")):null;
  if(!nombre||!email||!pwd){showError("Completa todos los campos.");return;}
  if(pwd.length<8){showError("Mínimo 8 caracteres.");return;}
  if(queryAll("SELECT id FROM usuarios WHERE email=?",[email]).length){showError("Email ya registrado.");return;}
  const hash=await sha256(pwd);
  await supaPost("usuarios",{nombre,email,rol,id_empresa:empId,password_hash:hash,activo:true,creado_por:sesion.email});
  await supaPost("log_accesos",{email:sesion.email,accion:"user_created",detalle:"Creó "+email});
  window._sbCache.usuarios = await supaGet("usuarios","select=id,email,nombre,rol,id_empresa,activo,password_hash,ultimo_acceso");
  window._sbCache.log_accesos = await supaGet("log_accesos","select=*&order=creado_en.desc&limit=30");
  closeModal(); showSuccess("✓ Usuario "+nombre+" creado"); renderContent();
}

function modalEditarUsuario(id){
  const u=queryAll("SELECT * FROM usuarios WHERE id=?",[id])[0]; if(!u) return;
  const emps=getEmps();
  openModal('<div class="modal-box"><button class="modal-close" onclick="closeModal()">✕</button>' +
    '<div class="modal-title">✏ Editar Usuario</div><div class="modal-sub">'+esc(u.email)+'</div>' +
    '<div class="form-group"><label class="form-label">Nombre</label><input type="text" id="e-nombre" class="form-input" value="'+esc(u.nombre||"")+'"/></div>' +
    '<div class="form-group"><label class="form-label">Rol</label><select id="e-rol" class="form-select" onchange="onRolChangeEdit()">' +
    ['eq_admin','eq_lider','cliente'].map(r=>'<option value="'+r+'"'+(u.rol===r?" selected":"")+'>'+( r==="eq_admin"?"Administrador EQ":r==="eq_lider"?"Líder EQ":"Cliente")+'</option>').join("")+'</select></div>' +
    '<div class="form-group" id="e-emp-grp" style="display:'+(u.rol==="cliente"?"block":"none")+'"><label class="form-label">Empresa</label><select id="e-empresa" class="form-select">'+emps.map(e=>'<option value="'+e.id+'"'+(u.id_empresa===e.id?" selected":"")+'>'+esc(e.nombre)+' ('+esc(e.codigo)+')</option>').join("")+'</select></div>' +
    '<div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="guardarEdicion('+id+')">Guardar</button></div></div>');
}

function onRolChangeEdit(){ const r=gVal("e-rol"),g=gId("e-emp-grp"); if(g)g.style.display=r==="cliente"?"block":"none"; }

async function guardarEdicion(id){
  const nombre=gVal("e-nombre").trim(), rol=gVal("e-rol");
  const empId=rol==="cliente"?parseInt(gVal("e-empresa")):null;
  if(!nombre){showError("El nombre es obligatorio.");return;}
  await supaPatch("usuarios","id=eq."+id,{nombre,rol,id_empresa:empId});
  await supaPost("log_accesos",{email:sesion.email,accion:"user_edited",detalle:"Editó usuario id "+id});
  window._sbCache.usuarios = await supaGet("usuarios","select=id,email,nombre,rol,id_empresa,activo,password_hash,ultimo_acceso");
  closeModal(); showSuccess("✓ Usuario actualizado"); renderContent();
}

function modalResetPwd(id,email){
  openModal('<div class="modal-box"><button class="modal-close" onclick="closeModal()">✕</button>' +
    '<div class="modal-title">🔑 Reset Contraseña</div><div class="modal-sub">'+esc(email)+'</div>' +
    '<div class="form-group"><label class="form-label">Nueva contraseña</label>' +
    '<div class="pw-wrap"><input type="password" id="r-pwd" class="form-input" placeholder="Mín. 8 caracteres"/><button class="pw-toggle" onclick="this.previousElementSibling.type=this.previousElementSibling.type===\'password\'?\'text\':\'password\'">👁</button></div>' +
    '<div class="pwd-strength" id="r-str"></div></div>' +
    '<div class="form-group"><label class="form-label">Confirmar</label><input type="password" id="r-pwd2" class="form-input" placeholder="Repite la contraseña"/></div>' +
    '<div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="guardarResetPwd('+id+',\''+esc(email)+'\')">Restablecer</button></div></div>');
}

async function guardarResetPwd(id,email){
  const pwd=gVal("r-pwd"),pwd2=gVal("r-pwd2");
  if(!pwd||pwd.length<8){showError("Mínimo 8 caracteres.");return;}
  if(pwd!==pwd2){showError("Las contraseñas no coinciden.");return;}
  const hash=await sha256(pwd);
  await supaPatch("usuarios","id=eq."+id,{password_hash:hash});
  await supaPost("log_accesos",{email:sesion.email,accion:"pwd_reset",detalle:"Reset: "+email});
  window._sbCache.usuarios = await supaGet("usuarios","select=id,email,nombre,rol,id_empresa,activo,password_hash,ultimo_acceso");
  closeModal(); showSuccess("✓ Contraseña restablecida para "+email);
}

function toggleUsuario(id,activo,nombre){
  openModal('<div class="modal-box" style="width:400px"><button class="modal-close" onclick="closeModal()">✕</button>' +
    '<div class="modal-title">'+(activo?"⊘ Desactivar":"✓ Activar")+'</div>' +
    '<div style="font-size:13px;color:var(--azul);margin:12px 0">¿Confirmas <strong>'+(activo?"desactivar":"activar")+'</strong> a <strong>'+esc(nombre)+'</strong>?</div>' +
    '<div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancelar</button>' +
    '<button class="'+(activo?"btn-danger":"btn-save")+'" data-id="'+id+'" data-act="'+activo+'" data-nom="'+esc(nombre)+'" onclick="confirmarToggle(parseInt(this.dataset.id),parseInt(this.dataset.act),this.dataset.nom)">'+(activo?"Desactivar":"Activar")+'</button>' +
    '</div></div>');
}

async function confirmarToggle(id,activo,nombre){
  const nuevo=activo?0:1;
  await supaPatch("usuarios","id=eq."+id,{activo:nuevo===1});
  await supaPost("log_accesos",{email:sesion.email,accion:"user_edited",detalle:(nuevo===1?"Activó":"Desactivó")+": "+nombre});
  window._sbCache.usuarios = await supaGet("usuarios","select=id,email,nombre,rol,id_empresa,activo,password_hash,ultimo_acceso");
  closeModal(); showSuccess("✓ Usuario "+(nuevo?"activado":"desactivado")); renderContent();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init(){
  try {
    const ok = await cargarDB();
    hideLoading();
    document.getElementById("login-screen").classList.remove("hidden");
    if(!ok){
      document.getElementById("login-error").textContent="⚠ Error al conectar con la base de datos.";
      document.getElementById("login-error").style.display="block";
    }
  } catch(e){
    console.error("Init error:", e);
    hideLoading();
    document.getElementById("login-screen").classList.remove("hidden");
    document.getElementById("login-error").textContent="⚠ Error de inicio: "+e.message;
    document.getElementById("login-error").style.display="block";
  }
}
init();

</script>
