<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Ejecutivo — EQSolutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- sql.js: SQLite compilado a WebAssembly, corre en el navegador -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --azul:     #1A3756;
      --tq:       #0684C6;
      --fondo:    #F4F6F9;
      --blanco:   #FFFFFF;
      --borde:    #E0E8F0;
      --grisMed:  #6B87A8;
      --grisLight:#EEF3F8;
      --verde:    #16A97A;
      --amarillo: #D4A012;
      --rojo:     #E03355;
      --tqGlow:   rgba(6,132,198,0.12);
    }
    body { background:var(--fondo); font-family:'Open Sans',sans-serif; color:var(--azul); }
    @keyframes spin   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* ── HEADER ── */
    #header {
      background:var(--blanco); border-top:4px solid var(--tq);
      border-bottom:1px solid var(--borde); padding:0 36px;
      position:sticky; top:0; z-index:100;
      box-shadow:0 2px 12px rgba(26,55,86,0.08);
    }
    #header-top { display:flex; justify-content:space-between; align-items:center; height:68px; }
    .logo-wrap  { display:flex; align-items:center; gap:14px; }
    .logo-name  { font-family:'Raleway',sans-serif; font-size:19px; line-height:1.1; color:var(--azul); }
    .logo-name .eq  { font-weight:300; }
    .logo-name .sol { font-weight:800; }
    .logo-sub   { font-size:8px; color:var(--grisMed); text-transform:uppercase; letter-spacing:.22em; margin-top:2px; }
    .header-sep { width:1px; height:36px; background:var(--borde); margin:0 8px; }

    /* ── SELECTOR EMPRESA ── */
    #empresa-selector {
      display:flex; align-items:center; gap:10px;
      background:var(--grisLight); border:1px solid var(--borde);
      border-radius:8px; padding:6px 14px;
      font-size:12px; color:var(--azul); font-weight:600;
    }
    #empresa-selector select {
      background:transparent; border:none; outline:none;
      font-family:'Open Sans',sans-serif; font-size:12px;
      color:var(--azul); font-weight:700; cursor:pointer;
    }
    .empresa-dot { width:8px; height:8px; border-radius:50%; background:var(--tq); }

    /* ── NAV ── */
    #nav { display:flex; }
    .nav-btn {
      padding:12px 18px; background:transparent; border:none;
      border-bottom:3px solid transparent; color:var(--grisMed);
      font-family:'Open Sans',sans-serif; font-size:12px; font-weight:600;
      letter-spacing:.04em; text-transform:uppercase;
      cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:6px;
    }
    .nav-btn:hover  { color:var(--azul); }
    .nav-btn.active { color:var(--tq); border-bottom-color:var(--tq); font-weight:700; }

    /* ── BANNERS ── */
    .banner { padding:9px 36px; display:flex; align-items:center; gap:10px; font-size:12px; }
    .banner-demo  { background:#FFFBEA; border-bottom:1px solid #F0D060; color:#7A5C00; }
    .banner-sync  { background:#EBF6FB; border-bottom:1px solid var(--tq); color:var(--azul); }
    .banner-error { background:#FFF0F3; border-bottom:1px solid var(--rojo); color:var(--rojo); justify-content:space-between; }
    .banner-error button { background:none; border:none; color:var(--rojo); cursor:pointer; font-size:15px; }

    /* ── LOADING SCREEN ── */
    #loading-screen {
      position:fixed; inset:0; background:var(--blanco);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:999; gap:20px;
    }
    .loading-logo { opacity:.9; }
    .loading-bar  { width:280px; height:4px; background:var(--grisLight); border-radius:2px; overflow:hidden; }
    .loading-fill { height:100%; background:var(--tq); border-radius:2px; animation:loading 2s ease-in-out infinite; }
    @keyframes loading { 0%{width:0%} 60%{width:80%} 100%{width:100%} }
    .loading-text { font-size:12px; color:var(--grisMed); letter-spacing:.08em; text-transform:uppercase; }

    /* ── CONTENT ── */
    #content { padding:26px 36px; animation:fadeIn .3s ease; }

    /* ── CARDS ── */
    .card { background:var(--blanco); border:1px solid var(--borde); border-radius:6px; padding:22px 26px; box-shadow:0 1px 4px rgba(26,55,86,0.05); }

    /* ── METRICS GRID ── */
    .metrics-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:18px; }
    .metric-card {
      background:var(--blanco); border:1px solid var(--borde);
      border-radius:6px; padding:20px 24px;
      border-left:4px solid var(--tq);
      box-shadow:0 1px 4px rgba(26,55,86,0.05);
    }
    .metric-label { font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--grisMed); margin-bottom:8px; }
    .metric-value { font-size:46px; font-weight:800; font-family:'Raleway',sans-serif; line-height:1; }

    /* ── SALUD ── */
    .salud-bar    { display:flex; height:10px; border-radius:5px; overflow:hidden; gap:2px; }
    .salud-legend { display:flex; gap:24px; margin-top:10px; font-size:12px; }

    /* ── AREAS GRID ── */
    .areas-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
    .area-card {
      background:var(--blanco); border:1px solid var(--borde);
      border-top:3px solid var(--tq); border-radius:6px;
      padding:18px; cursor:pointer; transition:all .2s;
      box-shadow:0 1px 4px rgba(26,55,86,0.05);
    }
    .area-card:hover { border-top-color:var(--azul); box-shadow:0 4px 16px rgba(26,55,86,0.12); transform:translateY(-2px); }
    .area-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .area-name   { display:flex; align-items:center; gap:7px; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--azul); }
    .area-pct    { font-family:'Raleway',sans-serif; font-size:22px; font-weight:800; }
    .area-bars   { display:flex; gap:3px; margin-bottom:10px; }
    .area-bar    { flex:1; height:4px; border-radius:2px; }
    .area-stats  { display:flex; gap:12px; font-size:10px; }

    /* ── KPI GRID ── */
    .kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .kpi-card {
      background:var(--blanco); border:1px solid var(--borde);
      border-radius:6px; padding:20px 22px;
      position:relative; overflow:hidden;
      box-shadow:0 1px 4px rgba(26,55,86,0.05); transition:all .25s;
    }
    .kpi-card:hover { border-color:var(--tq); transform:translateY(-2px); box-shadow:0 6px 20px var(--tqGlow); }
    .kpi-stripe  { position:absolute; top:0; left:0; width:100%; height:3px; }
    .kpi-top     { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; padding-top:6px; }
    .kpi-desc    { font-size:9px; color:var(--grisMed); text-transform:uppercase; letter-spacing:.07em; line-height:1.5; max-width:68%; }
    .kpi-badge   { font-size:8.5px; font-weight:700; padding:3px 9px; border-radius:3px; white-space:nowrap; letter-spacing:.05em; }
    .kpi-nombre  { font-size:14px; font-weight:700; color:var(--azul); margin-bottom:10px; font-family:'Raleway',sans-serif; }
    .kpi-valor-row { display:flex; align-items:baseline; gap:10px; margin-bottom:10px; }
    .kpi-valor   { font-size:30px; font-weight:800; font-family:'Raleway',sans-serif; line-height:1; }
    .kpi-meta    { font-size:11px; color:var(--grisMed); }
    .kpi-bar-bg  { height:4px; background:var(--grisLight); border-radius:2px; overflow:hidden; }
    .kpi-bar-fill{ height:100%; border-radius:2px; transition:width .6s ease; }
    .kpi-pct     { font-size:10px; color:var(--grisMed); margin-top:4px; margin-bottom:8px; }
    .kpi-chart   { height:48px; }

    /* ── AREA VIEW ── */
    .area-view-header {
      display:flex; align-items:center; gap:16px;
      border-bottom:2px solid var(--tq); padding-bottom:16px; margin-bottom:22px;
    }
    .area-icon-box { width:50px; height:50px; border:2px solid var(--tq); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:24px; background:var(--tqGlow); }
    .area-view-title { font-size:20px; font-weight:800; color:var(--azul); font-family:'Raleway',sans-serif; }
    .area-view-sub   { font-size:11px; color:var(--grisMed); }
    .area-counters   { margin-left:auto; display:flex; gap:24px; }
    .area-counter    { text-align:center; }
    .area-counter-val{ font-size:28px; font-weight:800; font-family:'Raleway',sans-serif; }
    .area-counter-lbl{ font-size:9px; color:var(--grisMed); text-transform:uppercase; letter-spacing:.1em; }

    /* ── TABLA DETALLE ── */
    .tabla-detalle { width:100%; border-collapse:collapse; font-size:12px; margin-top:16px; }
    .tabla-detalle th {
      background:var(--grisLight); color:var(--azul); font-weight:700;
      text-transform:uppercase; letter-spacing:.06em; font-size:10px;
      padding:10px 14px; text-align:left; border-bottom:2px solid var(--borde);
    }
    .tabla-detalle td { padding:10px 14px; border-bottom:1px solid var(--borde); color:var(--azul); vertical-align:middle; }
    .tabla-detalle tr:hover td { background:var(--grisLight); }
    .estado-badge { display:inline-block; padding:3px 8px; border-radius:3px; font-size:10px; font-weight:700; }
    .estado-atendido  { background:#16A97A22; color:#16A97A; }
    .estado-progreso  { background:#D4A01222; color:#D4A012; }
    .estado-pendiente { background:#E0335522; color:#E03355; }

    /* ── CHART ── */
    .chart-wrap { height:220px; position:relative; }

    /* ── CONNECT BTN ── */
    .connect-btn {
      display:flex; align-items:center; gap:8px;
      background:var(--tq); color:#fff; border:none; border-radius:4px;
      padding:9px 18px; font-size:11px; font-weight:700; letter-spacing:.08em;
      cursor:pointer; font-family:'Open Sans',sans-serif; text-transform:uppercase;
      box-shadow:0 2px 8px var(--tqGlow); transition:all .2s;
    }
    .connect-btn:hover { background:var(--azul); }
    .sync-info .lbl { font-size:9px; color:var(--grisMed); text-transform:uppercase; letter-spacing:.08em; }
    .sync-info .val { font-size:12px; font-weight:700; color:var(--tq); }
    .connected-badge { display:flex; align-items:center; gap:10px; }
    .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
    .dot-green  { background:var(--verde); box-shadow:0 0 5px var(--verde); }
    .dot-yellow { background:var(--amarillo); animation:pulse 1s infinite; }
    .logout-btn { font-size:11px; color:var(--grisMed); background:none; border:1px solid var(--borde); border-radius:4px; padding:3px 10px; cursor:pointer; }
    .refresh-btn { background:none; border:1px solid var(--borde); border-radius:4px; padding:6px 10px; cursor:pointer; color:var(--grisMed); font-size:17px; }

    /* ── SECTION TITLE ── */
    .section-title { font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:var(--grisMed); margin-bottom:14px; font-weight:600; }
    .section-title span { color:var(--tq); }

    /* ── FOOTER ── */
    #footer { border-top:1px solid var(--borde); padding:12px 36px; display:flex; justify-content:space-between; align-items:center; background:var(--blanco); margin-top:12px; }
    .footer-info { font-size:10px; color:var(--grisMed); }
    .footer-right { font-size:10px; color:var(--tq); font-weight:700; text-transform:uppercase; letter-spacing:.1em; }

    .gap-18 { margin-bottom:18px; }
    .hidden { display:none !important; }
    .spinning { animation:spin 1s linear infinite; display:inline-block; }
  </style>
</head>
<body>

<!-- ── LOADING SCREEN ── -->
<div id="loading-screen">
  <div class="loading-logo">
    <img src="Manual%20de%20marca/Logo%20EQ%20Horizontal-Color.png" height="48" alt="EQSolutions"/>
  </div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-text" id="loading-text">Iniciando Dashboard...</div>
</div>

<!-- ── HEADER ── -->
<div id="header">
  <div id="header-top">
    <div class="logo-wrap">
      <img src="Manual%20de%20marca/Logo%20EQ%20Horizontal-Color.png" height="46" alt="EQSolutions"/>
      <div class="header-sep"></div>
      <div style="font-size:9px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.2em;">Dashboard Ejecutivo de Indicadores</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <!-- Selector de empresa (visible solo para eq_admin) -->
      <div id="empresa-selector" class="hidden">
        <div class="empresa-dot"></div>
        <span style="font-size:10px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.08em;">Cliente:</span>
        <select id="empresa-select" onchange="cambiarEmpresa(this.value)"></select>
      </div>

      <button id="refresh-btn" class="refresh-btn hidden" title="Actualizar">↻</button>

      <div id="auth-area"></div>

  <div id="nav"></div>
</div>

<!-- ── BANNERS ── -->
<div id="banner-demo" class="banner banner-demo hidden">
  <span>⚡</span><span><strong>Modo demo</strong> — Conecta OneDrive para sincronizar datos reales.</span>
</div>
<div id="banner-sync" class="banner banner-sync hidden">
  <span class="spinning">↻</span><span id="sync-msg">Cargando base de datos...</span>
</div>

  <span id="error-text"></span>

</div>

<!-- ── CONTENT ── -->
<div id="content"></div>

<!-- ── FOOTER ── -->
<div id="footer">
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="Manual%20de%20marca/Logo%20EQ%20Horizontal-Color.png" height="22" alt="EQSolutions"/>
    <span class="footer-info">© 2025 EQSolutions — Información confidencial</span>
  </div>
  <span class="footer-right" id="footer-right">Cargando...</span>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════════════
const GITHUB = {
  owner: "oramirez-eq",
  repo:  "dashboard-eqsoluciones",
  db:    "data/eqsolutions_v2.db",
  branch:"main"
};
const MSAL = {
  clientId:    "f364c631-d024-4931-9146-e169268edfa8",
  tenantId:    "18417441-40a1-41fb-a1a1-13ceadd73586",
  redirectUri: "https://oramirez-eq.github.io",
  scopes:      "Files.Read.All Sites.Read.All User.Read"
};
const GRAPH       = "https://graph.microsoft.com/v1.0";
const DRIVE_OWNER = "fscavone@eqsoluciones.com";
const AREA_PATHS  = {
  TICs: "/Documents/9. TIC/V. Acompañamiento/Lukmar/Indicadores",
};

// ════════════════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ════════════════════════════════════════════════════════════════════
let DB         = null;  // instancia sql.js
let SQL        = null;  // motor sql.js
let MSToken    = null;  // token Microsoft
let MSUsuario  = "";
let empresaActual = "LUKMAR";
let rolActual     = "eq_admin"; // eq_admin | cliente
let areaActual    = "Gerencial";
let charts        = {};

const AREAS  = ["Gerencial","TICs","Contabilidad","Finanzas","Abastecimiento","RRHH"];
const ICONOS = {TICs:"⚙️",Contabilidad:"📒",Finanzas:"💰",Abastecimiento:"📦",RRHH:"👥"};
const MESES  = ["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

const sc = s => s==="verde"?"#16A97A":s==="amarillo"?"#D4A012":"#E03355";
const fv = (v,u) => {
  if(!v && v!==0) return "—";
  if(u==="$") return "$"+(v>=1e6?(v/1e6).toFixed(1)+"M":(v/1e3).toFixed(0)+"K");
  if(u==="#") return ""+Math.round(v);
  if(u==="d") return v.toFixed(1)+"d";
  return v.toFixed(1)+u;
};

// ════════════════════════════════════════════════════════════════════
// CARGAR BD DESDE GITHUB
// ════════════════════════════════════════════════════════════════════
async function cargarDB() {
  setLoading("Cargando base de datos desde GitHub...");
  try {
    // Obtener URL de descarga del archivo via API GitHub
    const apiUrl = `https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.db}?ref=${GITHUB.branch}`;
    const meta   = await fetch(apiUrl).then(r => r.json());
    if (!meta.download_url) throw new Error("No se pudo obtener la URL de descarga");

    setLoading("Descargando base de datos...");
    const buf = await fetch(meta.download_url).then(r => r.arrayBuffer());

    setLoading("Inicializando motor SQL...");
    SQL = await initSqlJs({
      locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`
    });
    DB = new SQL.Database(new Uint8Array(buf));

    // Cargar empresas en el selector
    cargarSelectorEmpresas();
    return true;
  } catch(e) {
    showError("Error cargando la base de datos: " + e.message);
    return false;
  }
}

function cargarSelectorEmpresas() {
  if (!DB) return;
  const rows = DB.exec("SELECT codigo, nombre FROM empresas WHERE activo=1 AND codigo != 'EQSOLUTIONS'");
  if (!rows.length) return;
  const sel = document.getElementById("empresa-select");
  sel.innerHTML = rows[0].values.map(([c,n]) =>
    `<option value="${c}" ${c===empresaActual?"selected":""}>${n}</option>`
  ).join("");
  if (rolActual === "eq_admin") {
    document.getElementById("empresa-selector").classList.remove("hidden");
  }
}

function cambiarEmpresa(codigo) {
  empresaActual = codigo;
  areaActual = "Gerencial";
  renderNav();
  renderContent();
}

// ════════════════════════════════════════════════════════════════════
// QUERIES A LA BD
// ════════════════════════════════════════════════════════════════════
function queryAll(sql, params=[]) {
  if (!DB) return [];
  try {
    const res = DB.exec(sql, params);
    if (!res.length) return [];
    const cols = res[0].columns;
    return res[0].values.map(row => {
      const obj = {};
      cols.forEach((c,i) => obj[c] = row[i]);
      return obj;
    });
  } catch(e) { console.error("SQL Error:", e, sql); return []; }
}

function getKPIsEmpresa() {
  return queryAll(`
    SELECT
      a.codigo  AS area_codigo, a.nombre AS area_nombre, a.icono AS area_icono,
      i.codigo  AS kpi_codigo, i.nombre AS kpi_nombre,
      i.unidad, i.tipo_meta, i.descripcion,
      k.anio, k.mes, k.valor, k.meta, k.semaforo, k.observaciones
    FROM kpi_mensual k
    JOIN empresas    e ON e.id = k.id_empresa
    JOIN indicadores i ON i.id = k.id_indicador
    JOIN areas       a ON a.id = i.id_area
    WHERE e.codigo = ?
    ORDER BY k.anio DESC, k.mes DESC
  `, [empresaActual]);
}

function getKPIResumen() {
  // Último valor por indicador
  const rows = getKPIsEmpresa();
  const seen = {};
  const result = {};
  rows.forEach(r => {
    const key = r.kpi_codigo;
    if (!seen[key]) {
      seen[key] = true;
      if (!result[r.area_codigo]) result[r.area_codigo] = [];
      result[r.area_codigo].push({
        codigo: r.kpi_codigo, nombre: r.kpi_nombre,
        unidad: r.unidad, desc: r.descripcion,
        valor: r.valor, meta: r.meta, semaforo: r.semaforo,
        icono: r.area_icono, area: r.area_codigo,
        trend: getTrend(r.kpi_codigo)
      });
    }
  });
  return result;
}

function getTrend(kpiCodigo) {
  const rows = queryAll(`
    SELECT k.mes, k.anio, k.valor
    FROM kpi_mensual k
    JOIN indicadores i ON i.id = k.id_indicador
    JOIN empresas    e ON e.id = k.id_empresa
    WHERE i.codigo = ? AND e.codigo = ?
    ORDER BY k.anio ASC, k.mes ASC
    LIMIT 12
  `, [kpiCodigo, empresaActual]);
  return rows.map(r => ({ label: MESES[r.mes], valor: r.valor }));
}

function getSolicitudesResumen() {
  return queryAll(`
    SELECT anio, mes, total, atendidas, en_progreso, pendientes, pct_atencion
    FROM v_solicitudes_resumen
    WHERE empresa_codigo = ?
    ORDER BY anio DESC, mes DESC
    LIMIT 12
  `, [empresaActual]);
}

function getSolicitudesDetalle(limite=50) {
  return queryAll(`
    SELECT numero, mes, anio, fecha_solicitud, descripcion,
           solicitante, area_solicitante, estado, tipo_servicio, observacion
    FROM solicitudes_tic
    WHERE id_empresa = (SELECT id FROM empresas WHERE codigo=?)
    ORDER BY fecha_solicitud DESC LIMIT ?
  `, [empresaActual, limite]);
}

function getEventosInternet() {
  return queryAll(`
    SELECT fecha_evento, semana, horas_desconexion, descripcion, causa, informante
    FROM eventos_internet
    WHERE id_empresa = (SELECT id FROM empresas WHERE codigo=?)
    ORDER BY fecha_evento DESC LIMIT 30
  `, [empresaActual]);
}

function getActividades() {
  return queryAll(`
    SELECT numero, mes_registro, prioridad, tema, descripcion,
           estado, avance_pct, fecha_inicio, fecha_fin, observaciones
    FROM actividades_tic
    WHERE id_empresa = (SELECT id FROM empresas WHERE codigo=?)
    ORDER BY fecha_inicio DESC LIMIT 50
  `, [empresaActual]);
}

// ════════════════════════════════════════════════════════════════════
// AUTH MICROSOFT (para sincronizar con OneDrive)
// ════════════════════════════════════════════════════════════════════
async function msLogin() {
  const url = `https://login.microsoftonline.com/${MSAL.tenantId}/oauth2/v2.0/authorize`
    +`?client_id=${MSAL.clientId}&response_type=token`
    +`&redirect_uri=${encodeURIComponent(MSAL.redirectUri)}`
    +`&scope=${encodeURIComponent(MSAL.scopes)}`
    +`&response_mode=fragment&nonce=${Math.random().toString(36).slice(2)}`;
  return new Promise((res,rej) => {
    const pop = window.open(url,"msalLogin","width=520,height=660");
    const t = setInterval(()=>{
      try {
        if(pop.closed){clearInterval(t);rej(new Error("Ventana cerrada"));return;}
        const h=pop.location.hash;
        if(h&&h.includes("access_token")){clearInterval(t);pop.close();res(new URLSearchParams(h.slice(1)).get("access_token"));}
      }catch(_){}
    },400);
  });
}

async function handleLogin() {
  renderAuth("loading");
  try {
    const tok = await msLogin();
    const me  = await fetch(`${GRAPH}/me`,{headers:{Authorization:`Bearer ${tok}`}}).then(r=>r.json());
    MSToken   = tok;
    MSUsuario = me.displayName||me.userPrincipalName||"Usuario";
    renderAuth("connected");
    // Aquí se puede disparar sincronización con OneDrive
  } catch(e){ renderAuth("disconnected"); showError("Error: "+e.message); }
}

function handleLogout() {
  MSToken=null; MSUsuario="";
  renderAuth("disconnected");
}

// UI HELPERS
// ════════════════════════════════════════════════════════════════════
function setLoading(msg) {
  document.getElementById("loading-text").textContent = msg;
}
function hideLoading() {
  const el = document.getElementById("loading-screen");
  el.style.opacity="0"; el.style.transition="opacity .4s";
  setTimeout(()=>el.classList.add("hidden"),400);
}
function showError(m){ document.getElementById("error-text").textContent=m; document.getElementById("banner-error").classList.remove("hidden"); }
function hideError()  { document.getElementById("banner-error").classList.add("hidden"); }

function renderAuth(s) {
  const el = document.getElementById("auth-area");
  if(s==="loading") el.innerHTML=`<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--grisMed)"><div class="dot dot-yellow"></div>Conectando...</div>`;
  else if(s==="connected") el.innerHTML=`<div class="connected-badge"><div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--verde)"><div class="dot dot-green"></div>OneDrive</div><span style="font-size:12px;color:var(--grisMed)">${MSUsuario}</span><button class="logout-btn" onclick="handleLogout()">Salir</button></div>`;
  else el.innerHTML=`<button class="connect-btn" onclick="handleLogin()">☁️ Sincronizar OneDrive</button>`;
}

// ════════════════════════════════════════════════════════════════════
// NAV
// ════════════════════════════════════════════════════════════════════
function renderNav() {
  // Mostrar solo áreas con datos para esta empresa
  const kpis = getKPIResumen();
  const areasConDatos = ["Gerencial", ...Object.keys(kpis)];
  // Completar con todas las áreas (sin datos = demo)
  const areasNav = AREAS.filter(a => a==="Gerencial" || areasConDatos.includes(a) || true);
  document.getElementById("nav").innerHTML = areasNav.map(a =>
    `<button class="nav-btn ${areaActual===a?"active":""}" onclick="setArea('${a}')">
      ${a!=="Gerencial"?ICONOS[a]:""} ${a}
    </button>`
  ).join("");
}

function setArea(a) { areaActual=a; renderNav(); renderContent(); }

// ════════════════════════════════════════════════════════════════════
// RENDER PRINCIPAL
// ════════════════════════════════════════════════════════════════════
function render() { renderNav(); renderContent(); }

function renderContent() {
  Object.values(charts).forEach(c=>c.destroy&&c.destroy()); charts={};
  document.getElementById("content").innerHTML =
    areaActual==="Gerencial" ? renderGerencial() : renderArea(areaActual);
  if(areaActual==="Gerencial") initChartBar();
  else initChartsKPI(areaActual);
}

// ── VISTA GERENCIAL ───────────────────────────────────────────────
function renderGerencial() {

    <div style="font-size:32px;margin-bottom:12px">📊</div>
    <div style="font-size:16px;font-weight:700;color:var(--azul)">Sin datos para ${empresaActual}</div>

  </div>`;

  const v = all.filter(k=>k.semaforo==="verde").length;
  const a = all.filter(k=>k.semaforo==="amarillo").length;
  const r = all.filter(k=>k.semaforo==="rojo").length;

  // Empresa info
  const emp = queryAll("SELECT nombre,ciudad FROM empresas WHERE codigo=?", [empresaActual])[0];

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <div>
      <div style="font-size:18px;font-weight:800;font-family:'Raleway',sans-serif;color:var(--azul)">${emp?.nombre||empresaActual}</div>
      <div style="font-size:11px;color:var(--grisMed)">${emp?.ciudad||""} · Vista ejecutiva de indicadores</div>
    </div>
    <div style="font-size:10px;color:var(--grisMed);text-align:right">
      Última actualización<br><span style="color:var(--tq);font-weight:700">${new Date().toLocaleDateString('es-EC')}</span>
    </div>
  </div>

  <div class="metrics-grid gap-18">
    ${[{l:"Total KPIs",val:total,c:"var(--tq)"},{l:"En Meta",val:v,c:"var(--verde)"},{l:"En Alerta",val:a,c:"var(--amarillo)"},{l:"Críticos",val:r,c:"var(--rojo)"}].map(m=>`
      <div class="metric-card">
        <div class="metric-label">${m.l}</div>
        <div class="metric-value" style="color:${m.c}">${m.val}</div>
      </div>`).join("")}
  </div>

  <div class="card gap-18" style="margin-bottom:18px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span class="section-title" style="margin:0">Salud Global del Negocio</span>
      <span style="color:var(--tq);font-size:12px;font-weight:700">${total?Math.round(v/total*100):0}% en meta</span>
    </div>
    <div class="salud-bar">
      <div style="flex:${v||0};background:var(--verde)"></div>
      <div style="flex:${a||0};background:var(--amarillo)"></div>
      <div style="flex:${r||0};background:var(--rojo)"></div>
    </div>
    <div class="salud-legend">
      <span style="color:var(--verde)">■ En Meta ${total?Math.round(v/total*100):0}%</span>
      <span style="color:var(--amarillo)">■ Alerta ${total?Math.round(a/total*100):0}%</span>
      <span style="color:var(--rojo)">■ Crítico ${total?Math.round(r/total*100):0}%</span>
    </div>
  </div>

  <div style="margin-bottom:18px">
    <div class="section-title">Resumen por Área — <span>clic para ver detalle</span></div>
    <div class="areas-grid">
      ${AREAS.filter(a=>a!=="Gerencial").map(area => {
        const ak = kpis[area] || [];
        const av=ak.filter(k=>k.semaforo==="verde").length;
        const aa=ak.filter(k=>k.semaforo==="amarillo").length;
        const ar=ak.filter(k=>k.semaforo==="rojo").length;
        const pct=ak.length?Math.round(av/ak.length*100):0;
        const pc=pct>=70?"var(--verde)":pct>=40?"var(--amarillo)":"var(--rojo)";
        return `<div class="area-card" onclick="setArea('${area}')">
          <div class="area-header">
            <div class="area-name">${ICONOS[area]} ${area}</div>
            <span class="area-pct" style="color:${pc}">${ak.length?pct+"%":"—"}</span>
          </div>
          <div class="area-bars">${ak.map(k=>`<div class="area-bar" style="background:${sc(k.semaforo)}"></div>`).join("")||`<div style="font-size:10px;color:var(--grisMed)">Sin datos</div>`}</div>
          <div class="area-stats">
            <span style="color:var(--verde)">✓ ${av}</span>
            <span style="color:var(--amarillo)">⚡ ${aa}</span>

function initChartBar() {
  const kpis = getKPIResumen();
  const areas = AREAS.filter(a=>a!=="Gerencial");
  const ctx   = document.getElementById("bar-chart");
  if(!ctx) return;
  charts["bar"] = new Chart(ctx, {
    type:"bar",
    data:{
      labels: areas,
      datasets:[
        {label:"En Meta",  data:areas.map(a=>(kpis[a]||[]).filter(k=>k.semaforo==="verde").length),   backgroundColor:"#16A97A",borderRadius:3},
        {label:"Alerta",   data:areas.map(a=>(kpis[a]||[]).filter(k=>k.semaforo==="amarillo").length), backgroundColor:"#D4A012",borderRadius:3},
        {label:"Crítico",  data:areas.map(a=>(kpis[a]||[]).filter(k=>k.semaforo==="rojo").length),    backgroundColor:"#E03355",borderRadius:3},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:"#6B87A8",font:{family:"Open Sans",size:11}}}},
      scales:{
        x:{ticks:{color:"#6B87A8"},grid:{display:false}},
        y:{ticks:{color:"#6B87A8",stepSize:1},grid:{color:"#E0E8F0"}}
      }
    }
  });
}

// ── VISTA POR ÁREA ────────────────────────────────────────────────
function renderArea(area) {
  const kpis = getKPIResumen();
  const ak   = kpis[area] || [];
  const v=ak.filter(k=>k.semaforo==="verde").length;
  const a=ak.filter(k=>k.semaforo==="amarillo").length;
  const r=ak.filter(k=>k.semaforo==="rojo").length;

  let detalle = "";
  if(area==="TICs") detalle = renderDetalleTICs();

  return `
  <div class="area-view-header">
    <div class="area-icon-box">${ICONOS[area]}</div>
    <div>
      <div class="area-view-title">${area}</div>
      <div class="area-view-sub">${ak.length} indicadores · ${ak.length?"datos reales desde BD":"sin datos aún"}</div>
    </div>
    <div class="area-counters">
      ${[{l:"OK",val:v,c:"var(--verde)"},{l:"Alerta",val:a,c:"var(--amarillo)"},{l:"Crítico",val:r,c:"var(--rojo)"}].map(m=>`
        <div class="area-counter">
          <div class="area-counter-val" style="color:${m.c}">${m.val}</div>
          <div class="area-counter-lbl">${m.l}</div>
        </div>`).join("")}
    </div>
  </div>

  ${ak.length ? `
  <div class="kpi-grid" style="margin-bottom:28px">
    ${ak.map(k => {
      const c   = sc(k.semaforo||"rojo");
      const pct = k.meta ? Math.min(Math.round(Math.abs(k.valor/k.meta)*100),100) : 0;
      const lbl = k.semaforo==="verde"?"✓ EN META":k.semaforo==="amarillo"?"⚡ ALERTA":"✕ CRÍTICO";
      return `<div class="kpi-card">
        <div class="kpi-stripe" style="background:${c}"></div>
        <div class="kpi-top">
          <span class="kpi-desc">${k.desc||""}</span>
          <span class="kpi-badge" style="background:${c}18;color:${c};border:1px solid ${c}40">${lbl}</span>
        </div>
        <div class="kpi-nombre">${k.nombre}</div>
        <div class="kpi-valor-row">
          <span class="kpi-valor" style="color:${c}">${fv(k.valor,k.unidad)}</span>
          <span class="kpi-meta">meta: ${fv(k.meta,k.unidad)}</span>
        </div>
        <div>
          <div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:${pct}%;background:${c}"></div></div>
          <div class="kpi-pct">${pct}% de la meta</div>
        </div>
        <div class="kpi-chart"><canvas id="ch-${k.codigo}"></canvas></div>
      </div>`;
    }).join("")}
  </div>` : `
  <div class="card" style="text-align:center;padding:40px;margin-bottom:20px">
    <div style="font-size:24px;margin-bottom:8px">${ICONOS[area]}</div>
    <div style="font-weight:700;margin-bottom:4px">${area} — Sin datos aún</div>
    <div style="font-size:12px;color:var(--grisMed)">Conecta OneDrive para cargar los indicadores de esta área.</div>
  </div>`}

  ${detalle}`;
}

function initChartsKPI(area) {
  const kpis = getKPIResumen()[area] || [];
  kpis.forEach(k => {
    const ctx = document.getElementById(`ch-${k.codigo}`);
    if(!ctx || !k.trend?.length) return;
    const c = sc(k.semaforo||"rojo");
    charts[k.codigo] = new Chart(ctx, {
      type:"line",
      data:{
        labels: k.trend.map(t=>t.label),
        datasets:[{data:k.trend.map(t=>t.valor), borderColor:c, borderWidth:2, pointRadius:0, tension:.4, fill:false}]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{enabled:false}},
        scales:{
          x:{ticks:{color:"#6B87A8",font:{size:9}},grid:{display:false}},
          y:{display:false}
        }
      }
    });
  });
}

document.getElementById("refresh-btn").addEventListener("click", render);

  const ok = await cargarDB();
  hideLoading();
  if(ok) {
    const total = queryAll("SELECT COUNT(*) AS c FROM kpi_mensual WHERE id_empresa=(SELECT id FROM empresas WHERE codigo=?)",[empresaActual])[0]?.c || 0;
    document.getElementById("footer-right").textContent =
      `${total} KPIs · ${empresaActual} · Base de Datos GitHub`;
    renderAuth("disconnected");
    render();
  } else {
    document.getElementById("banner-demo").classList.remove("hidden");
    renderAuth("disconnected");
  }
}

init();
