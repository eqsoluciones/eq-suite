let _semanaSelFin = null; // semana seleccionada en el selector

function renderEfectividadCobro(){
  const cache   = window._sbCache || {};
  const empObj  = (cache.empresas||[]).find(e=>e.codigo===filtros.empresa);
  const anioF   = filtroPeriodo.anio>0 ? filtroPeriodo.anio : 2026;
  const puedeImportar = sesion?.rol==="eq_admin" || sesion?.rol==="eq_lider";

  // Cargar semanas disponibles para esta empresa/año
  const semanas = (cache.fin_cartera_semanal||[])
    .filter(r=>r.id_empresa===empObj?.id && parseInt(r.anio)===anioF)
    .sort((a,b)=>parseInt(b.semana)-parseInt(a.semana));

  // Determinar semana activa (la más reciente si no hay selección)
  if(!_semanaSelFin && semanas.length) _semanaSelFin = semanas[0].semana;
  const semActual = semanas.find(s=>parseInt(s.semana)===parseInt(_semanaSelFin)) || semanas[0];

  // KPI principal
  const efect   = semActual ? parseFloat(semActual.efectividad_total||0)*100 : 0;
  const subtEf  = semActual ? parseFloat(semActual.subtotal_efectividad||0)*100 : 0;
  const totRec  = semActual ? parseFloat(semActual.total_recuperado||0) : 0;
  const totPlan = semActual ? parseFloat(semActual.total_planificado||0) : 0;
  const sem     = semActual?.semaforo || "rojo";
  const semC    = sem==="verde"?"#16A97A":sem==="amarillo"?"#D4A012":"#E05050";

  const fmt = v => "$"+parseFloat(v||0).toLocaleString("es-EC",{minimumFractionDigits:2,maximumFractionDigits:2});
  const pct = v => (parseFloat(v||0)*100).toFixed(1)+"%";

  let html = buildPeriodoUI();
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  html += '<div><div style="font-size:18px;font-weight:800;font-family:\'Raleway\',sans-serif">💳 Efectividad de Cobro</div>';
  html += '<div style="font-size:11px;color:var(--grisMed)">FIN-IND-004 · Recuperación de cartera semanal · '+anioF+'</div></div>';

  // Botón importar + selector de semana
  html += '<div style="display:flex;align-items:center;gap:10px">';
  if(puedeImportar){
    html += '<button class="submit-btn" style="padding:8px 14px;font-size:11px" onclick="abrirImportadorCartera()">📂 Importar Excel</button>';
  }
  if(semanas.length){
    html += '<select class="form-select" style="font-size:11px;padding:6px 10px" onchange="seleccionarSemanaFin(this.value)">';
    semanas.forEach(s=>{
      html += '<option value="'+s.semana+'"'+(parseInt(s.semana)===parseInt(_semanaSelFin)?' selected':'')+'>Semana '+s.semana+' — '+esc(s.fecha_corte||'')+' ('+pct(s.efectividad_total)+')</option>';
    });
    html += '</select>';
  }
  html += '</div></div>';

  if(!semanas.length){
    html += '<div class="card" style="padding:48px;text-align:center">';
    html += '<div style="font-size:40px;margin-bottom:12px">📂</div>';
    html += '<div style="font-weight:700;color:var(--azul);font-size:16px;margin-bottom:8px">Sin datos de cartera</div>';
    html += '<div style="font-size:12px;color:var(--grisMed);margin-bottom:20px">Importa el Excel de Análisis de Cartera Gerencial para comenzar a visualizar FIN-IND-004.</div>';
    if(puedeImportar) html += '<button class="submit-btn" onclick="abrirImportadorCartera()">📂 Importar primer Excel</button>';
    html += '</div>';
    return html;
  }

  // ── KPIs principales ────────────────────────────────────────
  html += '<div style="display:grid;grid-template-columns:220px 1fr;gap:16px;margin-bottom:16px">';

  // KPI card principal
  html += '<div class="card" style="border-left:4px solid '+semC+';text-align:center;padding:24px 16px">';
  html += '<div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--grisMed);margin-bottom:4px">FIN-IND-004</div>';
  html += '<div style="font-size:12px;font-weight:700;color:var(--azul);margin-bottom:10px">Efectividad de Cobro<br><span style="font-size:10px;color:var(--grisMed)">Semana '+((semActual?.semana)||'—')+'</span></div>';
  html += '<div style="font-size:46px;font-weight:800;font-family:\'Raleway\',sans-serif;color:'+semC+';line-height:1">'+efect.toFixed(1)+'%</div>';
  html += '<div style="font-size:10px;color:var(--grisMed);margin-top:6px">Corriente: '+subtEf.toFixed(1)+'% · Meta: ≥80%</div>';
  html += '<div style="margin-top:10px;padding:6px 10px;border-radius:6px;background:'+semC+'22;color:'+semC+';font-size:11px;font-weight:700">'+sem.toUpperCase()+'</div>';
  html += '</div>';

  // Métricas rápidas
  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">';
  const metricCards = [
    {l:"Total Planificado",v:fmt(totPlan),sub:"corriente + legal",c:"var(--azul)"},
    {l:"Total Recuperado",v:fmt(totRec),sub:"semana "+((semActual?.semana)||''),c:"var(--verde)"},
    {l:"Cartera Legal",v:fmt(semActual?.legal_planificado||0),sub:"recuperado: "+fmt(semActual?.legal_recuperado||0),c:"var(--rojo)"},
  ];
  metricCards.forEach(m=>{
    html += '<div class="card" style="padding:16px;text-align:center">';
    html += '<div style="font-size:10px;color:var(--grisMed);margin-bottom:4px">'+m.l+'</div>';
    html += '<div style="font-size:20px;font-weight:800;font-family:\'Raleway\',sans-serif;color:'+m.c+'">'+m.v+'</div>';
    html += '<div style="font-size:10px;color:var(--grisMed);margin-top:2px">'+m.sub+'</div>';
    html += '</div>';
  });
  html += '</div></div>'; // close grid

  // ── Tabla por gestor ─────────────────────────────────────────
  html += '<div class="card gap-16" style="margin-bottom:16px">';
  html += '<div class="section-title">Efectividad por Segmento — Semana '+(semActual?.semana||'')+'</div>';
  html += '<div style="overflow-x:auto"><table class="tabla-detalle">';
  html += '<thead><tr><th>Segmento</th><th style="text-align:right">Planificado</th><th style="text-align:right">Recuperado</th><th style="text-align:right">Efectividad</th><th>Estado</th></tr></thead><tbody>';

  const segmentos = [
    {l:"Cartera Por Vencer",  plan:"corriente_planificado",  rec:"corriente_recuperado"},
    {l:"Asistente Cobranzas", plan:"asist_planificado",      rec:"asist_recuperado"},
    {l:"Gerente Comercial",   plan:"gerente_com_plan",       rec:"gerente_com_rec"},
    {l:"Líder Financiero",    plan:"lider_fin_plan",         rec:"lider_fin_rec"},
    {l:"Gerente General",     plan:"gerente_gral_plan",      rec:"gerente_gral_rec"},
    {l:"SUBTOTAL",            plan:"subtotal_planificado",   rec:"subtotal_recuperado", bold:true},
    {l:"Cartera Legal",       plan:"legal_planificado",      rec:"legal_recuperado"},
    {l:"TOTAL GENERAL",       plan:"total_planificado",      rec:"total_recuperado", bold:true},
  ];

  segmentos.forEach(sg=>{
    const planV = parseFloat(semActual?.[sg.plan]||0);
    const recV  = parseFloat(semActual?.[sg.rec]||0);
    const efV   = planV>0 ? (recV/planV*100) : 0;
    const efSem = efV>=80?"verde":efV>=60?"amarillo":"rojo";
    const efCol = efSem==="verde"?"#16A97A":efSem==="amarillo"?"#D4A012":"#E05050";
    const bold  = sg.bold ? "font-weight:700" : "";
    const rowBg = sg.bold ? "background:var(--grisLight)" : "";
    html += '<tr style="'+rowBg+'">';
    html += '<td style="'+bold+'">'+esc(sg.l)+'</td>';
    html += '<td style="text-align:right;'+bold+'">'+fmt(planV)+'</td>';
    html += '<td style="text-align:right;'+bold+'">'+fmt(recV)+'</td>';
    html += '<td style="text-align:right;font-weight:700;color:'+efCol+'">'+efV.toFixed(1)+'%</td>';
    html += '<td><span class="estado-badge" style="background:'+efCol+'22;color:'+efCol+'">'+efSem.toUpperCase()+'</span></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';

  // ── Gráfica tendencia semanal ─────────────────────────────────
  html += '<div class="card gap-16" style="margin-bottom:16px">';
  html += '<div class="section-title">Tendencia Semanal — Efectividad de Cobro '+anioF+'</div>';
  html += '<div style="height:240px;position:relative"><canvas id="bar-efectividad"></canvas></div>';
  html += '</div>';

  // ── Aging de cartera (detalle por cliente semana actual) ──────
  const detalle = empObj ? (cache.fin_cartera_detalle||[])
    .filter(d=>d.id_empresa===empObj.id && parseInt(d.semana)===parseInt(_semanaSelFin||0) && parseInt(d.anio)===anioF)
    .sort((a,b)=>parseFloat(b.total_general||0)-parseFloat(a.total_general||0))
    : [];

  if(detalle.length){
    html += '<div class="card gap-16">';
    html += '<div class="section-title">Aging de Cartera por Cliente — Semana '+(semActual?.semana||'')+' <span style="color:var(--grisMed)">('+detalle.length+' clientes)</span></div>';
    html += '<div style="overflow-x:auto"><table class="tabla-detalle"><thead><tr>';
    html += '<th>Cliente</th><th>Tipo</th><th style="text-align:right">Por Vencer</th>';
    html += '<th style="text-align:right">1-7d</th><th style="text-align:right">8-15d</th>';
    html += '<th style="text-align:right">16-30d</th><th style="text-align:right">31-45d</th>';
    html += '<th style="text-align:right">45-180d</th><th style="text-align:right">Legal</th>';
    html += '<th style="text-align:right">Total</th></tr></thead><tbody>';
    detalle.forEach(d=>{
      const eClass=d.clasificacion==="Legal"?"estado-bad":"estado-ok";
      html += '<tr>';
      html += '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(d.cliente||'')+'">'+esc(d.cliente||'—')+'</td>';
      html += '<td><span class="estado-badge '+eClass+'">'+esc(d.clasificacion)+'</span></td>';
      html += '<td style="text-align:right">'+fmt(d.por_vencer)+'</td>';
      html += '<td style="text-align:right">'+fmt(d.vencido_7)+'</td>';
      html += '<td style="text-align:right">'+fmt(d.vencido_15)+'</td>';
      html += '<td style="text-align:right">'+fmt(d.vencido_30)+'</td>';
      html += '<td style="text-align:right">'+fmt(d.vencido_45)+'</td>';
      html += '<td style="text-align:right">'+fmt(d.vencido_180)+'</td>';
      html += '<td style="text-align:right;color:var(--rojo);font-weight:700">'+fmt(d.total_legal)+'</td>';
      html += '<td style="text-align:right;font-weight:700">'+fmt(d.total_general)+'</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
  }


  return html;
}
window.seleccionarSemanaFin = function(val){ _semanaSelFin=parseInt(val); renderContent(); };

function abrirImportadorCartera(){
  _crearModalCartera();
  const m=document.getElementById("modal-cartera");
  if(!m) return;

  // Rellenar selector de empresas desde el cache
  const empSel=document.getElementById("imp-empresa");
  if(empSel){
    const cache=window._sbCache||{};
    empSel.innerHTML=(cache.empresas||[])
      .filter(e=>e.codigo!=="EQSOLUTIONS"&&e.activo)
      .map(e=>'<option value="'+e.id+'"'+(e.codigo===filtros.empresa?" selected":"")+'>'+esc(e.nombre)+'</option>')
      .join("");
  }
  // Año por defecto
  const anioSel=document.getElementById("imp-anio");
  if(anioSel){ const af=filtroPeriodo.anio>0?filtroPeriodo.anio:2026; anioSel.value=af; }
  // Limpiar preview y botón guardar
  const prev=document.getElementById("imp-preview");
  if(prev){ prev.style.display="none"; prev.innerHTML=""; }
  const btnG=document.getElementById("imp-btn-guardar");
  if(btnG) btnG.style.display="none";
  const fi=document.getElementById("imp-file");
  if(fi) fi.value="";
  _datosImportCartera=null;

  // Mostrar modal
  m.style.display="flex";
}

// Previsualizar el Excel cargado antes de importar
let _datosImportCartera = null;
window.previsualizarCartera = async function(input){
  const file=input.files[0]; if(!file) return;
  const previewEl=document.getElementById("imp-preview");
  previewEl.style.display="block";
  previewEl.innerHTML='<div style="color:var(--grisMed);font-size:12px">⏳ Leyendo Excel...</div>';

  try{
    if(!window.XLSX){
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
        s.onload=res; s.onerror=()=>rej(new Error("No se pudo cargar SheetJS"));
        document.head.appendChild(s);
      });
    }
    const buf = await file.arrayBuffer();
    const wb  = XLSX.read(buf, {type:"array"});

    // ── Normalizar clasificación al CHECK constraint de Supabase ──
    // Cualquier valor que NO sea explícitamente "legal" se mapea a "Corriente"
    function normClasif(v){
      const s=String(v||"").toLowerCase().trim();
      if(s==="legal"||s.includes("legal")) return "Legal";
      return "Corriente";
    }

    let parsed = { segmentos:{}, formato:"desconocido" };
    let detalleClientes = [];

    // ══ FORMATO A: CHM — tiene hoja "Efectividad de Cobro" ════════
    const sheetEf = wb.SheetNames.find(n=>n.toLowerCase().includes("efectividad"));
    if(sheetEf){
      parsed.formato = "CHM";
      const ws   = wb.Sheets[sheetEf];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
      for(let i=0;i<rows.length;i++){
        const r=rows[i]; if(!r||!r[1]) continue;
        const lbl=String(r[1]).toLowerCase().trim();
        const plan=parseFloat(r[2])||0, rec=parseFloat(r[3])||0;
        if(lbl.includes("vencer")&&!lbl.includes("total"))  parsed.segmentos.corriente={plan,rec};
        else if(lbl.includes("asistente"))  parsed.segmentos.asistente={plan,rec};
        else if(lbl.includes("comercial"))  parsed.segmentos.gerente_com={plan,rec};
        else if(lbl.includes("financiero")) parsed.segmentos.lider_fin={plan,rec};
        else if(lbl.includes("general")&&lbl.includes("gerente")) parsed.segmentos.gerente_gral={plan,rec};
        else if(lbl.includes("subtotal"))   parsed.segmentos.subtotal={plan,rec};
        else if(lbl.includes("legal"))      parsed.segmentos.legal={plan,rec};
        else if(lbl.includes("total")&&!lbl.includes("sub")) parsed.segmentos.total={plan,rec};
      }
      // Detalle desde "Analisis de Cartera Gerencial"
      const sheetACG = wb.SheetNames.find(n=>n.toLowerCase().replace(/\s/g,"").includes("analisis"));
      if(sheetACG){
        const wsACG  = wb.Sheets[sheetACG];
        const rowsACG= XLSX.utils.sheet_to_json(wsACG, {header:1, defval:null});
        let hdrIdx=-1;
        for(let i=0;i<rowsACG.length;i++){
          if(rowsACG[i]&&String(rowsACG[i][0]||"").toLowerCase().includes("cliente")){hdrIdx=i;break;}
        }
        if(hdrIdx>=0){
          const hdr=rowsACG[hdrIdx];
          const colOf=k=>hdr.findIndex(h=>String(h||"").toLowerCase().replace(/\s/g,"").includes(k));
          const cCli=0, cClas=colOf("clasif"), cPV=colOf("porvencer")||colOf("vencer"),
                cV7=colOf("1-7"),cV15=colOf("8-15"),cV30=colOf("16-30"),
                cV45=colOf("31"),cV180=colOf("45-180"),cV360=colOf("181"),
                cLeg=colOf("legal"),cTot=colOf("total");
          for(let i=hdrIdx+1;i<rowsACG.length;i++){
            const r2=rowsACG[i];
            if(!r2||!r2[cCli]) continue;
            const cli=String(r2[cCli]).trim();
            if(cli.toLowerCase().includes("total")||cli.startsWith("*")) continue;
            detalleClientes.push({
              cliente:cli,
              clasificacion:normClasif(r2[cClas]),
              por_vencer:parseFloat(r2[cPV])||0,
              vencido_7:parseFloat(r2[cV7])||0,
              vencido_15:parseFloat(r2[cV15])||0,
              vencido_30:parseFloat(r2[cV30])||0,
              vencido_45:parseFloat(r2[cV45])||0,
              vencido_180:parseFloat(r2[cV180])||0,
              vencido_360:parseFloat(r2[cV360])||0,
              vencido_mas361:0,
              total_legal:parseFloat(r2[cLeg])||0,
              total_general:parseFloat(r2[cTot])||0,
            });
          }
        }
      }
    }

    // ══ FORMATO B: LUKMAR — hojas "Acosux" y "Analisis CxC" ═══════
    // No tiene hoja de Efectividad → calculamos desde los datos de cartera
    else if(wb.SheetNames.some(n=>n.toLowerCase().includes("acosux")||n.toLowerCase().includes("analisis"))){
      parsed.formato = "LUKMAR";

      // Detalle desde "Analisis CxC" (aging completo por cliente)
      const sheetCxC = wb.SheetNames.find(n=>n.toLowerCase().replace(/\s/g,"").includes("cxc")||n.toLowerCase().includes("analisis"));
      if(sheetCxC){
        const wsCxC  = wb.Sheets[sheetCxC];
        const rowsCxC= XLSX.utils.sheet_to_json(wsCxC, {header:1, defval:null});
        // Buscar fila de encabezado con "Cliente" (puede estar en F10 o F11)
        let hdrIdx=-1;
        for(let i=0;i<rowsCxC.length;i++){
          if(rowsCxC[i]&&String(rowsCxC[i][0]||"").toLowerCase().includes("cliente")){hdrIdx=i;break;}
        }
        if(hdrIdx>=0){
          const hdr=rowsCxC[hdrIdx];
          // Los headers están en 2 filas (F10 es sub-header, F11 es col-header)
          // Mapear columnas por posición conocida del TES-ANX-004:
          // 0:Cliente 1:Clasif 2:Crédito 3:Cupo 4:%Util 5:PorVencer 6:TotalPorVencer 7:1-7 8:8-15 9:16-30 10:31-45 11:45-180
          const colOf=k=>hdr.findIndex(h=>String(h||"").toLowerCase().replace(/[\s\n]/g,"").includes(k));
          const cCli=0, cClas=colOf("clasif"), cPV=colOf("porvencer")||colOf("vencer"),
                cV7=colOf("1-7"),cV15=colOf("8-15"),cV30=colOf("16-30"),
                cV45=colOf("31"),cV180=colOf("45-180");
          // Buscar también columnas de rangos mayores en la siguiente fila si existe
          const hdr2 = rowsCxC[hdrIdx+1]||[];
          // Fila de datos reales comienza 2 filas después del header
          for(let i=hdrIdx+1;i<rowsCxC.length;i++){
            const r2=rowsCxC[i];
            if(!r2||!r2[cCli]) continue;
            const cli=String(r2[cCli]).trim();
            if(cli.toLowerCase().includes("total")||cli.startsWith("*")) continue;
            // Suma de todos los vencidos para calcular total_general
            const pv  =parseFloat(r2[cPV>=0?cPV:5])||0;
            const v7  =parseFloat(r2[cV7>=0?cV7:7])||0;
            const v15 =parseFloat(r2[cV15>=0?cV15:8])||0;
            const v30 =parseFloat(r2[cV30>=0?cV30:9])||0;
            const v45 =parseFloat(r2[cV45>=0?cV45:10])||0;
            const v180=parseFloat(r2[cV180>=0?cV180:11])||0;
            // Columnas 12+ son rangos mayores (181-360, +361)
            const v360=parseFloat(r2[12])||0;
            const vmas=parseFloat(r2[13])||0;
            const clasifRaw=String(r2[cClas>=0?cClas:1]||"Corriente");
            const clasif=normClasif(clasifRaw);
            const totGen=pv+v7+v15+v30+v45+v180+v360+vmas;
            detalleClientes.push({
              cliente:cli,
              clasificacion:clasif,
              por_vencer:pv,
              vencido_7:v7,
              vencido_15:v15,
              vencido_30:v30,
              vencido_45:v45,
              vencido_180:v180,
              vencido_360:v360,
              vencido_mas361:vmas,
              total_legal:clasif==="Legal"?totGen:0,
              total_general:totGen,
            });
          }
        }
      }

      // Calcular segmentos desde el detalle (LUKMAR no tiene hoja de Efectividad propia)
      // planificado = total cartera (vencida + por vencer) de clientes Corrientes
      // recuperado  = monto cobrado esa semana — se captura en el formulario de importación
      const corrientes=detalleClientes.filter(d=>d.clasificacion==="Corriente");
      const legales   =detalleClientes.filter(d=>d.clasificacion==="Legal");
      const sumTot    =arr=>arr.reduce((s,d)=>s+d.total_general,0);
      const corrPlan  =sumTot(corrientes);
      const legPlan   =sumTot(legales);
      // El recuperado se leerá del campo #imp-cobrado-lkm que se muestra solo para este formato
      const cobradoLKM=parseFloat(document.getElementById("imp-cobrado-lkm")?.value)||0;
      parsed.segmentos={
        // Un solo cobrador → todo va como "Asistente de Cobranzas" (igual al CHM)
        corriente: {plan:corrPlan, rec:cobradoLKM},
        asistente: {plan:corrPlan, rec:cobradoLKM},
        subtotal:  {plan:corrPlan, rec:cobradoLKM},
        legal:     {plan:legPlan,  rec:0},
        total:     {plan:corrPlan+legPlan, rec:cobradoLKM},
      };
      parsed._notaLUKMAR = true;
    }

    _datosImportCartera={...parsed, detalleClientes, archivo:file.name};

    // ── Preview ──────────────────────────────────────────────────
    const sg=parsed.segmentos;
    const subPlan=sg.subtotal?.plan||0, subRec=sg.subtotal?.rec||0;
    const totPlan=sg.total?.plan||0, totRec=sg.total?.rec||0;
    const subEf=(subPlan>0?subRec/subPlan:0)*100;
    const semF=subEf>=80?"🟢 VERDE":subEf>=60?"🟡 AMARILLO":"🔴 ROJO";

    let notaHtml="";
    if(parsed._notaLUKMAR){
      // Mostrar campo de cobro semanal en el formulario
      const campoCobro=document.getElementById("imp-cobrado-wrap");
      if(campoCobro) campoCobro.style.display="block";
      notaHtml='<div style="margin-top:8px;padding:8px;background:#E8F5E9;border-radius:6px;border-left:3px solid #16A97A;font-size:11px;color:#1B5E20">'+
        '✅ <b>Formato LUKMAR detectado:</b> Cobrador único → mapeado como <b>Asistente de Cobranzas</b>. '+
        'Ingresa el monto cobrado esta semana en el campo de arriba para calcular la efectividad.</div>';
    } else {
      const campoCobro=document.getElementById("imp-cobrado-wrap");
      if(campoCobro) campoCobro.style.display="none";
    }

    previewEl.innerHTML=
      '<div style="background:var(--grisLight);border-radius:8px;padding:14px;font-size:12px">' +
      '<div style="font-weight:700;color:var(--azul);margin-bottom:4px">📋 Vista previa — '+esc(file.name)+'</div>'+
      '<div style="font-size:10px;color:var(--grisMed);margin-bottom:10px">Formato detectado: <b>'+parsed.formato+'</b> · '+detalleClientes.length+' clientes</div>'+
      '<table style="width:100%;border-collapse:collapse;font-size:11px">'+
      '<tr style="color:var(--grisMed)"><th style="text-align:left;padding:2px 4px">Segmento</th><th style="text-align:right;padding:2px 4px">Planificado</th><th style="text-align:right;padding:2px 4px">Recuperado</th><th style="text-align:right;padding:2px 4px">Efectividad</th></tr>'+
      [["Cartera Por Vencer",sg.corriente],["Asistente Cobranzas",sg.asistente],["Gerente Comercial",sg.gerente_com],
       ["Líder Financiero",sg.lider_fin],["Gerente General",sg.gerente_gral],["SUBTOTAL",sg.subtotal],
       ["Cartera Legal",sg.legal],["TOTAL",sg.total]
      ].map(([l,v])=>{
        if(!v) return "";
        const ef=v.plan>0?(v.rec/v.plan*100):0;
        const bold=l.startsWith("SUB")||l==="TOTAL"?"font-weight:700;":"";
        return '<tr style="'+bold+'"><td style="padding:2px 4px">'+l+'</td>'+
               '<td style="text-align:right;padding:2px 4px">$'+v.plan.toLocaleString("es-EC",{maximumFractionDigits:0})+'</td>'+
               '<td style="text-align:right;padding:2px 4px">$'+v.rec.toLocaleString("es-EC",{maximumFractionDigits:0})+'</td>'+
               '<td style="text-align:right;padding:2px 4px;color:'+(ef>=80?"#16A97A":ef>=60?"#D4A012":"#6B87A8")+'">'+ef.toFixed(1)+'%</td></tr>';
      }).join("")+
      '</table>'+
      '<div style="margin-top:10px;padding:8px;background:#fff;border-radius:6px;border-left:3px solid '+(subEf>=80?"#16A97A":subEf>=60?"#D4A012":"#E05050")+'">' +
      'Semáforo corriente: <strong>'+semF+'</strong> ('+subEf.toFixed(1)+'%)</div>'+
      notaHtml+
      '</div>';

    document.getElementById("imp-btn-guardar").style.display="block";
  }catch(e){
    previewEl.innerHTML='<div style="color:var(--rojo);font-size:12px">⚠ Error al leer el Excel: '+esc(e.message)+'<br><small>'+e.stack?.slice(0,200)+'</small></div>';
    console.error("previsualizarCartera error:", e);
  }
};

window.recalcPrevLKM = function(){
  if(!_datosImportCartera||!_datosImportCartera._notaLUKMAR) return;
  const cobrado = parseFloat(document.getElementById("imp-cobrado-lkm")?.value)||0;
  // Actualizar segmentos en memoria
  const corrPlan = _datosImportCartera.segmentos?.corriente?.plan || 0;
  const legPlan  = _datosImportCartera.segmentos?.legal?.plan    || 0;
  _datosImportCartera.segmentos = {
    corriente: {plan:corrPlan, rec:cobrado},
    asistente: {plan:corrPlan, rec:cobrado},
    subtotal:  {plan:corrPlan, rec:cobrado},
    legal:     {plan:legPlan,  rec:0},
    total:     {plan:corrPlan+legPlan, rec:cobrado},
  };
  // Actualizar el preview sin releer el archivo
  const sg      = _datosImportCartera.segmentos;
  const subEf   = sg.subtotal.plan>0?(sg.subtotal.rec/sg.subtotal.plan)*100:0;
  const semF    = subEf>=80?"🟢 VERDE":subEf>=60?"🟡 AMARILLO":"🔴 ROJO";
  const semCol  = subEf>=80?"#16A97A":subEf>=60?"#D4A012":"#E05050";
  const fmt     = v=>"$"+parseFloat(v||0).toLocaleString("es-EC",{maximumFractionDigits:0});
  const pctFmt  = v=>(v||0).toFixed(1)+"%";

  const tbody = [
    ["Cartera / Por Vencer", sg.corriente],
    ["Asistente Cobranzas",  sg.asistente],
    ["SUBTOTAL",             sg.subtotal],
    ["Cartera Legal",        sg.legal],
    ["TOTAL",                sg.total],
  ].map(([l,v])=>{
    if(!v) return "";
    const ef=v.plan>0?(v.rec/v.plan*100):0;
    const bold=l.startsWith("SUB")||l==="TOTAL"?"font-weight:700;":"";
    return '<tr style="'+bold+'"><td style="padding:2px 4px">'+l+'</td>'+
           '<td style="text-align:right;padding:2px 4px">'+fmt(v.plan)+'</td>'+
           '<td style="text-align:right;padding:2px 4px">'+fmt(v.rec)+'</td>'+
           '<td style="text-align:right;padding:2px 4px;color:'+(ef>=80?"#16A97A":ef>=60?"#D4A012":"#6B87A8")+'">'+pctFmt(ef)+'</td></tr>';
  }).join("");

  const previewEl=document.getElementById("imp-preview");
  if(previewEl){
    previewEl.innerHTML=
      '<div style="background:var(--grisLight);border-radius:8px;padding:14px;font-size:12px">' +
      '<div style="font-weight:700;color:var(--azul);margin-bottom:4px">📋 Vista previa — '+esc(_datosImportCartera.archivo||"")+'</div>'+
      '<div style="font-size:10px;color:var(--grisMed);margin-bottom:10px">Formato: <b>LUKMAR</b> · Cobrador único → Asistente de Cobranzas · '+(_datosImportCartera.detalleClientes||[]).length+' clientes</div>'+
      '<table style="width:100%;border-collapse:collapse;font-size:11px">'+
      '<tr style="color:var(--grisMed)"><th style="text-align:left;padding:2px 4px">Segmento</th><th style="text-align:right;padding:2px 4px">Planificado</th><th style="text-align:right;padding:2px 4px">Cobrado</th><th style="text-align:right;padding:2px 4px">Efectividad</th></tr>'+
      tbody+
      '</table>'+
      '<div style="margin-top:8px;padding:8px;background:#fff;border-radius:6px;border-left:3px solid '+semCol+'">'+
      'Semáforo: <strong>'+semF+'</strong> ('+pctFmt(subEf)+')</div>'+
      '<div style="margin-top:6px;padding:8px;background:#E8F5E9;border-radius:6px;border-left:3px solid #16A97A;font-size:11px;color:#1B5E20">'+
      '✅ <b>Formato LUKMAR:</b> Cobrador único mapeado como Asistente de Cobranzas.</div>'+
      '</div>';
    previewEl.style.display="block";
  }
};
window.recalcPrevLKM=window.recalcPrevLKM;

async function guardarImportacionCartera(){
  if(!_datosImportCartera){ showError("No hay datos para importar."); return; }
  const empId   = parseInt(document.getElementById("imp-empresa")?.value);
  const semana  = parseInt(document.getElementById("imp-semana")?.value);
  const anio    = parseInt(document.getElementById("imp-anio")?.value);
  const fecha   = document.getElementById("imp-fecha")?.value||null;
  if(!empId||!semana||!anio){ showError("Completa empresa, semana y año."); return; }

  try{
    const sg=_datosImportCartera.segmentos;
    const subPlan=parseFloat(sg.subtotal?.plan||0), subRec=parseFloat(sg.subtotal?.rec||0);
    const legPlan=parseFloat(sg.legal?.plan||0), legRec=parseFloat(sg.legal?.rec||0);
    const totPlan=parseFloat(sg.total?.plan||0), totRec=parseFloat(sg.total?.rec||0);
    const subEf=subPlan>0?subRec/subPlan:0;
    const legEf=legPlan>0?legRec/legPlan:0;
    const totEf=totPlan>0?totRec/totPlan:0;
    const semaforo=subEf>=0.80?"verde":subEf>=0.60?"amarillo":"rojo";

    const dataSemanal={
      id_empresa:empId, semana, anio, fecha_corte:fecha,
      corriente_planificado:sg.corriente?.plan||0, corriente_recuperado:sg.corriente?.rec||0,
      asist_planificado:sg.asistente?.plan||0, asist_recuperado:sg.asistente?.rec||0,
      gerente_com_plan:sg.gerente_com?.plan||0, gerente_com_rec:sg.gerente_com?.rec||0,
      lider_fin_plan:sg.lider_fin?.plan||0, lider_fin_rec:sg.lider_fin?.rec||0,
      gerente_gral_plan:sg.gerente_gral?.plan||0, gerente_gral_rec:sg.gerente_gral?.rec||0,
      subtotal_planificado:subPlan, subtotal_recuperado:subRec, subtotal_efectividad:subEf,
      legal_planificado:legPlan, legal_recuperado:legRec, legal_efectividad:legEf,
      total_planificado:totPlan, total_recuperado:totRec, efectividad_total:totEf,
      semaforo, importado_de:_datosImportCartera.archivo||""
    };

    // Upsert resumen semanal
    await sbUpsert("fin_cartera_semanal", dataSemanal, "id_empresa,semana,anio");
    const cSem=window._sbCache.fin_cartera_semanal=window._sbCache.fin_cartera_semanal||[];
    const si=cSem.findIndex(r=>r.id_empresa===empId&&parseInt(r.semana)===semana&&parseInt(r.anio)===anio);
    if(si>=0) cSem[si]={...cSem[si],...dataSemanal}; else cSem.unshift({...dataSemanal,id:Date.now()});

    // Insertar detalle de clientes (primero borrar los de esa semana/empresa/año)
    const detalle=_datosImportCartera.detalleClientes||[];
    if(detalle.length){
      // Borrar detalle anterior de esa semana
      const cDet=window._sbCache.fin_cartera_detalle=window._sbCache.fin_cartera_detalle||[];
      window._sbCache.fin_cartera_detalle=cDet.filter(d=>!(d.id_empresa===empId&&parseInt(d.semana)===semana&&parseInt(d.anio)===anio));
      // Insertar nuevos (en lotes de 50)
      for(let i=0;i<detalle.length;i+=50){
        const lote=detalle.slice(i,i+50).map(d=>({...d,id_empresa:empId,semana,anio}));
        const saved=await sbInsert("fin_cartera_detalle",lote);
        if(Array.isArray(saved)) window._sbCache.fin_cartera_detalle.push(...saved);
      }
    }

    _semanaSelFin=semana;
    cerrarImportadorCartera();
    showSuccess("✅ Semana "+semana+" importada: "+totEf.toFixed(1)+"% efectividad · "+detalle.length+" clientes");
    renderContent();
  }catch(e){
    showError("Error al guardar: "+e.message);
  }
}
window.guardarImportacionCartera=guardarImportacionCartera;

function initChartsEfectividad(){
  const cache=window._sbCache||{};
  const empObj=(cache.empresas||[]).find(e=>e.codigo===filtros.empresa);
  const anioF=filtroPeriodo.anio>0?filtroPeriodo.anio:2026;

  const semanas=(cache.fin_cartera_semanal||[])
    .filter(r=>r.id_empresa===empObj?.id&&parseInt(r.anio)===anioF)
    .sort((a,b)=>parseInt(a.semana)-parseInt(b.semana))
    .slice(-12); // últimas 12 semanas

  const ctx=document.getElementById("bar-efectividad");
  if(!ctx||!semanas.length) return;

  const labels=semanas.map(s=>"Sem "+s.semana);
  const dataEfSub=semanas.map(s=>parseFloat(s.subtotal_efectividad||0)*100);
  const dataEfTot=semanas.map(s=>parseFloat(s.efectividad_total||0)*100);
  const barColors=dataEfSub.map(v=>v>=80?"#16A97A":v>=60?"#D4A012":"#E05050");

  charts["bar-efectividad"]=new Chart(ctx,{
    type:"bar",
    data:{
      labels,
      datasets:[
        {label:"Efectividad Corriente",data:dataEfSub,backgroundColor:barColors,borderRadius:3,order:2},
        {label:"Efectividad Total",data:dataEfTot,type:"line",borderColor:"#6B87A8",borderWidth:2,
         borderDash:[5,4],pointRadius:3,fill:false,tension:0.3,order:1},
        {label:"Meta (80%)",data:Array(semanas.length).fill(80),type:"line",borderColor:"#16A97A",
         borderWidth:2,borderDash:[6,4],pointRadius:0,fill:false,order:0},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{position:"bottom",labels:{color:"#6B87A8",font:{family:"Open Sans",size:11},boxWidth:12,padding:16}},
        tooltip:{callbacks:{label:ctx2=>ctx2.dataset.label+": "+ctx2.raw.toFixed(1)+"%"}}
      },
      scales:{
        x:{ticks:{color:"#6B87A8",font:{size:10}},grid:{display:false}},
        y:{min:0,max:100,ticks:{color:"#6B87A8",callback:v=>v+"%"},grid:{color:"#E0E8F0"},
           title:{display:true,text:"Efectividad %",color:"#6B87A8",font:{size:10}}}
      }
    }
  });
}



function venCrearModal(){
  if(document.getElementById("ven-modal-cfg")) return;
  const div = document.createElement("div");

// CONFIG API — Multiempresa, guardada en Supabase (tabla empresa_api_config)
// Cada empresa tiene su propio proxy_url / api_key / tipo_erp
// Solo eq_admin y eq_lider pueden configurar
// ═══════════════════════════════════════════════════════════════

// Cache de config en memoria (se carga desde Supabase al abrir el tab)
let _venCFG = { apikey:"", token:"", proxy:"", id_empresa:null };

async function venCargarConfig(){
  // Obtener empresa activa del filtro global
  const cache = window._sbCache||{};
  const empObj = (cache.empresas||[]).find(e=>e.codigo===filtros.empresa);
  if(!empObj) return;

  // Buscar config en Supabase para esta empresa
  try {
    const rows = await sbQuery("empresa_api_config",
      `id_empresa=eq.${empObj.id}&tipo_erp=eq.contifico&activo=eq.true&limit=1`);
    if(Array.isArray(rows) && rows.length>0){
      const r = rows[0];
      _venCFG = {
        apikey:     r.api_key   || "",
        token:      r.token_pos || "",
        proxy:      r.proxy_url || "",
        id_empresa: empObj.id,
      };
    } else {
      _venCFG = { apikey:"", token:"", proxy:"", id_empresa:empObj.id };
    }
  } catch(e) {
    console.warn("venCargarConfig:", e.message);
    _venCFG = { apikey:"", token:"", proxy:"", id_empresa:empObj.id };
  }
}

async function venGuardarConfig(apikey, token, proxy){
  const cache = window._sbCache||{};
  const empObj = (cache.empresas||[]).find(e=>e.codigo===filtros.empresa);
  if(!empObj){ venShowToast("No se pudo identificar la empresa activa","err"); return false; }

  const payload = {
    id_empresa: empObj.id,
    tipo_erp:   "contifico",
    proxy_url:  proxy  || null,
    api_key:    apikey || null,
    token_pos:  token  || null,
    activo:     true,
    creado_por: sesion?.email || "admin",
    actualizado_en: new Date().toISOString(),
  };

  try {
    // Upsert: si ya existe config para esta empresa la actualiza, si no la crea
    const existing = await sbQuery("empresa_api_config",
      `id_empresa=eq.${empObj.id}&tipo_erp=eq.contifico&limit=1`);
    if(Array.isArray(existing) && existing.length>0){
      await sbUpdate("empresa_api_config", payload, "id_empresa,tipo_erp",
        `id_empresa=eq.${empObj.id}&tipo_erp=eq.contifico`);
    } else {
      await sbInsert("empresa_api_config", payload);
    }
    _venCFG = { apikey: apikey||"via-proxy", token, proxy, id_empresa: empObj.id };
    return true;
  } catch(e) {
    console.error("venGuardarConfig:", e);
    throw e;
  }
}

function venAbrirConfig(){
  venCrearModal();
  const cache = window._sbCache||{};
  const empObj = (cache.empresas||[]).find(e=>e.codigo===filtros.empresa);
  const empNombre = empObj?.nombre || filtros.empresa;
  const puedeConfig = sesion?.rol==="eq_admin" || sesion?.rol==="eq_lider";

  const m = document.getElementById("ven-modal-cfg");
  if(!m) return;

  // Actualizar título con empresa activa
  const titulo = m.querySelector("#ven-cfg-titulo");
  if(titulo) titulo.textContent = `⚙ Config API — ${empNombre}`;

  // Solo admins pueden editar
  const inputs = m.querySelectorAll("input");
  inputs.forEach(i=>i.disabled=!puedeConfig);
  const btnGuardar = m.querySelector("#ven-btn-guardar-cfg");
  if(btnGuardar) btnGuardar.style.display = puedeConfig?"block":"none";

  // Rellenar con valores actuales
  const apikeyEl = document.getElementById("ven-cfg-apikey");
  const tokenEl  = document.getElementById("ven-cfg-token");
  const proxyEl  = document.getElementById("ven-cfg-proxy");
  if(apikeyEl) apikeyEl.value = (_venCFG.apikey==="via-proxy"?"":_venCFG.apikey)||"";
  if(tokenEl)  tokenEl.value  = _venCFG.token||"";
  if(proxyEl)  proxyEl.value  = _venCFG.proxy||"";

  const resEl = document.getElementById("ven-cfg-result");
  if(resEl) resEl.style.display="none";
  m.style.display = "flex";
}

function venCerrarConfig(){
  const m = document.getElementById("ven-modal-cfg");
  if(m) m.style.display = "none";
}

async function venProbarConfig(){
  const apikey = document.getElementById("ven-cfg-apikey")?.value.trim()||"";
  const token  = document.getElementById("ven-cfg-token")?.value.trim()||"";
  const proxy  = document.getElementById("ven-cfg-proxy")?.value.trim()||"";

  if(!apikey && !proxy){
    venShowToast("Ingresa el Proxy URL (recomendado) o el API_KEY","err");
    return;
  }

  const resEl = document.getElementById("ven-cfg-result");
  if(resEl){ resEl.style.display="block"; resEl.style.background="#FFF8E1"; resEl.textContent="⏳ Probando conexión..."; }

  // Guardar temporalmente para poder probar
  const cfgTemp = { apikey: apikey||"via-proxy", token, proxy };
  const cfgOrig = {..._venCFG};
  _venCFG = cfgTemp;

  try {
    const docs = await venContificoGET("registro/documento/?tipo_registro=CLI&tipo=FAC&result_size=1&result_page=1");
    // Prueba OK — guardar en Supabase
    await venGuardarConfig(apikey, token, proxy);
    if(resEl){ resEl.style.background="#E8F5E9"; resEl.textContent="✅ Conexión exitosa · configuración guardada para "+((window._sbCache?.empresas||[]).find(e=>e.codigo===filtros.empresa)?.nombre||filtros.empresa); }
    venActualizarStatus("ok","Conectado · listo para sincronizar");
    venShowToast("✅ API configurada y guardada","ok");
  } catch(e) {
    _venCFG = cfgOrig; // revertir si falla
    if(resEl){ resEl.style.background="#FFEBEE"; resEl.textContent="❌ Error: "+e.message; }
    venActualizarStatus("err","Error de conexión");
  }
}

// ═══════════════════════════════════════════════════════════════
// CONTIFICO API — llamadas con soporte proxy (CORS)
// La API de Contifico no permite CORS desde el browser directamente.
// Si hay proxy configurado lo usa; si no, intenta directo.
// ═══════════════════════════════════════════════════════════════
async function venContificoGET(endpoint, params={}){
  if(!_venCFG.apikey && !_venCFG.proxy) throw new Error("API_KEY no configurado. Haz clic en ⚙ Configurar API.");

  // Si hay proxy (Edge Function de Supabase), úsalo — el API_KEY está guardado como secreto en Supabase
  if(_venCFG.proxy){
    const qs = new URLSearchParams({endpoint, ...params}).toString();
    const r = await fetch(_venCFG.proxy+"?"+qs, {
      headers:{
        "Authorization":"Bearer "+SUPA_KEY,
        "x-contifico-apikey": _venCFG.apikey,
        "x-contifico-token":  _venCFG.token||""
      }
    });
    if(!r.ok) throw new Error("Proxy error "+r.status+": "+await r.text());
    return r.json();
  }

  // Modo directo (requiere CORS en Contifico — generalmente no funciona desde browser)
  const base = "https://api.contifico.com/sistema/api/v1/";
  const qs   = new URLSearchParams(params).toString();
  const url  = base + endpoint + (qs?"&"+qs:"");
  const r = await fetch(url, {
    headers:{
      "Authorization": _venCFG.apikey,
      "Token":         _venCFG.token||""
    }
  });
  if(!r.ok) throw new Error("Contifico "+r.status+": "+await r.text());
  return r.json();
}

window._venVentas  = window._venVentas  || [];  // documentos sincronizados

// ═══════════════════════════════════════════════════════════════
// SINCRONIZACIÓN — jala facturas de Contifico y las guarda
// en Supabase (ven_documento + venwindow._venDetalle) y en memoria
// ═══════════════════════════════════════════════════════════════
// ── venSincronizar: legacy, descarga todo primero luego procesa ─
async function venSincronizar(){
  if(!_venCFG.proxy && !_venCFG.apikey){ venAbrirConfig(); return; }
  const inicio = document.getElementById("ven-f-ini")?.value;
  const fin    = document.getElementById("ven-f-fin")?.value;
  if(!inicio||!fin){ venShowToast("Selecciona rango de fechas","err"); return; }
  const btn  = document.getElementById("ven-btn-sync");
  const btnBd= document.getElementById("ven-btn-bd");
  if(btn)  { btn.disabled=true; btn.innerHTML="⏳ Consultando..."; }
  if(btnBd){ btnBd.disabled=true; }
  window._venCargando=true;
  venActualizarStatus("wait","Consultando Contifico...");
  try{
    let allDocs=[]; let page=1; const PAGE_SIZE=100;
    let seguir=true;
    while(seguir){
      venActualizarStatus("wait",`Descargando página ${page}...`);
      const qs=`tipo_registro=CLI&tipo=FAC&fecha_inicial=${formatFechaApi(inicio)}&fecha_final=${formatFechaApi(fin)}&result_size=${PAGE_SIZE}&result_page=${page}`;
      const docs=await venContificoGET("registro/documento/?"+qs);
      if(!Array.isArray(docs)||docs.length===0){ seguir=false; }
      else{ allDocs=allDocs.concat(docs); if(docs.length<PAGE_SIZE) seguir=false; else page++; }
    }
    window._venVentas=[]; window._venDetalle=[];
    for(const doc of allDocs){
      if(doc.anulado) continue;
      const cobrosDoc={};
      (doc.cobros||[]).forEach(cb=>{ const f=cb.forma_cobro||"OT"; cobrosDoc[f]=(cobrosDoc[f]||0)+parseFloat(cb.monto||0); });
      window._venVentas.push({
        id_externo:doc.id, numero_doc:doc.documento||"",
        fecha_emision:parseFechaContifico(doc.fecha_emision),
        cliente_nombre:doc.persona?.razon_social||doc.cliente?.razon_social||"Consumidor Final",
        cliente_id:doc.persona_id||"",
        subtotal_0:parseFloat(doc.subtotal_0||0), subtotal_12:parseFloat(doc.subtotal_12||0),
        iva:parseFloat(doc.iva||0), total:parseFloat(doc.total||0),
        estado:doc.estado||"P", anulado:false,

        cobros_tr:cobrosDoc["TR"]||0,

        local:doc.adicional1||"", vendedor_id:doc.vendedor_identificacion||"",

        descuento_total:(doc.detalles||[]).reduce((s,d)=>s+(parseFloat(d.precio||0)*parseFloat(d.cantidad||0)*parseFloat(d.porcentaje_descuento||0)/100),0),
      });
      for(const det of (doc.detalles||[])){
        const nombre=(det.producto_nombre||"").trim()||(det.descripcion||"").trim()||det.producto_id;
        window._venDetalle.push({
          id_documento:doc.id, fecha_emision:parseFechaContifico(doc.fecha_emision),
          producto_id:det.producto_id||"", nombre_producto:nombre,
          cantidad:parseFloat(det.cantidad||0), precio:parseFloat(det.precio||0),
          descuento:parseFloat(det.porcentaje_descuento||0),
          base_gravable:parseFloat(det.base_gravable||0),
          subtotal:parseFloat(det.cantidad||0)*parseFloat(det.precio||0),
        });
      }
    }
    await venGuardarEnSupabase(inicio,fin);
    window._venVentasMes=window._venVentas;
    window._venDetalleMes=window._venDetalle;
    venActualizarStatus("ok",`${window._venVentas.length} facturas sincronizadas`);
    venShowToast(`✅ ${window._venVentas.length} facturas sincronizadas`,"ok");
  } catch(e){
    console.error("venSincronizar:",e);
    venShowToast("Error: "+e.message,"err");

  } finally {
    window._venCargando=false;
    if(btn)  { btn.disabled=false; btn.innerHTML="🔄 Actualizar desde Contifico"; }
    if(btnBd){ btnBd.disabled=false; }
    renderVentasContifico();
    venRenderCharts();
  }
}

function fmtK(v){ return v>=1000?(v/1000).toFixed(1)+"K":parseFloat(v).toFixed(0); }
function fmtFechaLabel(s){ if(!s)return""; const[y,m,d]=s.split("-"); return d+"/"+m; }
function mediaMovil(arr,n){ return arr.map((_,i)=>{ const sl=arr.slice(Math.max(0,i-n+1),i+1); return sl.reduce((a,b)=>a+b,0)/sl.length; }); }
function parseFechaContifico(s){ if(!s)return""; const[d,m,y]=s.split("/"); return y+"-"+m+"-"+d; }

// ── Carga automática al abrir el tab ──────────────────────────
// KPIs: último día con datos · Gráficas: mes completo desde BD
async function venAutoCargar(){
  const hoy    = new Date();
  const ayer   = new Date(hoy); ayer.setDate(ayer.getDate()-1);
  const fmtD   = d => d.toISOString().slice(0,10);
  const fAyer  = fmtD(ayer);
  const fHoy   = fmtD(hoy);
  const fMesIni= fmtD(new Date(hoy.getFullYear(),hoy.getMonth(),1));

  window._venCargando   = true;
  window._venVentas     = [];
  window._venDetalle    = [];
  window._venVentasMes  = [];
  window._venDetalleMes = [];

  // Mostrar spinner inmediato
  const el = document.getElementById("ven-container");
  if(el){
    el.innerHTML = `
      <div style="padding:16px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--grisMed);font-weight:600">Período:</span>
          <input type="date" id="ven-f-ini" class="form-input" style="width:140px;font-size:12px" value="${fAyer}">
          <span style="font-size:11px;color:var(--grisMed)">al</span>
          <input type="date" id="ven-f-fin" class="form-input" style="width:140px;font-size:12px" value="${fAyer}">
          <button class="ven-sync-btn" id="ven-btn-main" onclick="venCargarOSincronizar()"
            style="background:var(--tq);min-width:160px;justify-content:center">
            <span id="ven-btn-icon">⏳</span>
            <span id="ven-btn-label">Cargando...</span>
          </button>
          <div class="ven-status" style="margin-left:auto">
            <span class="ven-sdot wait" id="ven-sdot"></span>
            <span id="ven-stxt" style="font-size:11px">Buscando datos...</span>
          </div>
        </div>
        <div class="ven-progress-wrap" style="margin-bottom:12px">
          <div class="ven-progress-bar indeterminate"></div>
        </div>
        <div class="ven-card" style="padding:48px;text-align:center">
          <div class="ven-spinner-ring" style="margin:0 auto 16px"></div>
          <div style="font-weight:700;color:var(--azul);font-size:15px;font-family:Raleway,sans-serif">Cargando datos de ventas...</div>
          <div style="font-size:12px;color:var(--grisMed);margin-top:8px">Consultando base de datos · ${fMesIni} al ${fHoy}</div>
        </div>
      </div>`;
  }

  try {
    const [docsM, detsM] = await Promise.all([
      sbQuery("ven_documento", `fecha_emision=gte.${fMesIni}&fecha_emision=lte.${fHoy}&order=fecha_emision.desc&limit=10000`),
      sbQuery("ven_detalle",   `fecha_emision=gte.${fMesIni}&fecha_emision=lte.${fHoy}&limit=50000`)
    ]);

    // Traer descendente para tener los más recientes, reordenar asc para gráficas
    const _rawDocs = Array.isArray(docsM) ? docsM : [];
    const _rawDets = Array.isArray(detsM)  ? detsM : [];
    window._venVentasMes  = _rawDocs.slice().sort((a,b)=>a.fecha_emision.localeCompare(b.fecha_emision));
    window._venDetalleMes = _rawDets.slice().sort((a,b)=>(a.fecha_emision||"").localeCompare(b.fecha_emision||""));

    // KPIs = último día con datos (ayer si hay, sino el más reciente en BD)
    const fechasDisp = [...new Set(window._venVentasMes.map(d=>d.fecha_emision))].sort();
    const ultimaFecha = fechasDisp[fechasDisp.length-1] || fAyer;
    const fechaKPI = fechasDisp.includes(fAyer) ? fAyer : ultimaFecha;

    window._venVentas  = window._venVentasMes.filter(d=>d.fecha_emision===fechaKPI);
    window._venDetalle = window._venDetalleMes.filter(d=>d.fecha_emision===fechaKPI);

    // Actualizar inputs con la fecha real (ayer o último día disponible)
    setTimeout(()=>{
      const iniEl=document.getElementById("ven-f-ini");
      const finEl=document.getElementById("ven-f-fin");
      if(iniEl) iniEl.value=fechaKPI;
      if(finEl) finEl.value=fechaKPI;
    },100);

    if(window._venVentasMes.length > 0){
      // Guardar en session el rango del mes completo disponible para que
      // los otros indicadores (006, 007, 008) puedan usarlo
      const primerDia = fechasDisp[0];
      sessionStorage.setItem("ven_fechas", JSON.stringify({ini:primerDia, fin:ultimaFecha}));
      sessionStorage.setItem("ven_fecha_kpi", fechaKPI); // solo para los KPIs de 005
      const dot=document.getElementById("ven-sdot"),txt=document.getElementById("ven-stxt");
      if(dot) dot.className="ven-sdot ok";
      if(txt) txt.textContent=window._venVentas.length+" facturas ("+fechaKPI+") · "+window._venVentasMes.length+" en el mes";
    } else {
      const dot=document.getElementById("ven-sdot"),txt=document.getElementById("ven-stxt");
      if(dot) dot.className="ven-sdot wait";
      if(txt) txt.textContent="Sin datos · presiona Ver ventas para sincronizar";
    }
  } catch(e) {
    console.error("venAutoCargar:", e);
    const dot=document.getElementById("ven-sdot"),txt=document.getElementById("ven-stxt");
    if(dot) dot.className="ven-sdot err";
    if(txt) txt.textContent="Error: "+e.message.slice(0,50);
  } finally {
    window._venCargando = false;
    renderVentasContifico();
    venRenderCharts();
  }
}
window.venAutoCargar = venAutoCargar;


// ── venCargarOSincronizar: BD primero, Contifico si no hay datos ─
async function venCargarOSincronizar(){
  const btn  = document.getElementById("ven-btn-main");
  const icon = document.getElementById("ven-btn-icon");
  const label= document.getElementById("ven-btn-label");
  const wrap = document.getElementById("ven-progress-wrap");
  const msg  = document.getElementById("ven-progress-msg");
  const hoyFb=new Date(); const ayerFb=new Date(hoyFb); ayerFb.setDate(ayerFb.getDate()-1);
  const fmtFb=d=>d.toISOString().slice(0,10);
  const inicio=document.getElementById("ven-f-ini")?.value||fmtFb(ayerFb);
  const fin   =document.getElementById("ven-f-fin")?.value||fmtFb(ayerFb);
  if(btn)  { btn.disabled=true; }
  if(icon)  icon.textContent="⏳";
  if(label) label.textContent="Cargando...";
  if(wrap)  wrap.style.display="block";
  if(msg)   { msg.style.display="block"; msg.textContent="Buscando datos en base de datos..."; }
  window._venCargando=true;
  venActualizarStatus("wait","Cargando...");
  try{
    // 1. Intentar cargar desde BD
    const qs=`fecha_emision=gte.${inicio}&fecha_emision=lte.${fin}&order=fecha_emision.asc&limit=5000`;
    const docs=await sbQuery("ven_documento",qs);
    const dets=await sbQuery("ven_detalle",`fecha_emision=gte.${inicio}&fecha_emision=lte.${fin}&limit=20000`);
    window._venVentas    =Array.isArray(docs)?docs:[];
    window._venDetalle   =Array.isArray(dets)?dets:[];
    window._venVentasMes =window._venVentas;
    window._venDetalleMes=window._venDetalle;
    if(window._venVentas.length>0){
      sessionStorage.setItem("ven_fechas",JSON.stringify({ini:inicio,fin:fin}));
      venActualizarStatus("ok",`${window._venVentas.length} facturas · ${inicio} al ${fin}`);
      if(msg) msg.textContent=`${window._venVentas.length} facturas cargadas desde base de datos`;
      if(icon)  icon.textContent="📂";
      if(label) label.textContent="Ver ventas";
    } else if(!_venCFG.proxy&&!_venCFG.apikey){
      venActualizarStatus("err","Sin datos y sin config API");
      venShowToast("No hay datos para "+inicio+" al "+fin+" en base de datos","err");
    } else {
      // 2. Sin datos en BD → descargar de Contifico página por página
      if(msg) msg.textContent="Sin datos locales · descargando desde Contifico...";
      if(icon)  icon.textContent="🔄";
      if(label) label.textContent="Descargando...";
      window._venProgreso="Conectando con Contifico...";
      let page=1; let hayMasPaginas=true; let totalGuardados=0;
      const PAGE_SIZE=100;
      while(hayMasPaginas){
        const progMsg=`Descargando página ${page}...`;
        if(msg) msg.textContent=progMsg;
        window._venProgreso=progMsg;
        const qs2=`tipo_registro=CLI&tipo=FAC&fecha_inicial=${formatFechaApi(inicio)}&fecha_final=${formatFechaApi(fin)}&result_size=${PAGE_SIZE}&result_page=${page}`;
        const pageDocs=await venContificoGET("registro/documento/?"+qs2);
        if(!Array.isArray(pageDocs)||pageDocs.length===0){ hayMasPaginas=false; break; }
        // Procesar esta página
        const pageVentas=[]; const pageDetalle=[];
        for(const doc of pageDocs){
          if(doc.anulado) continue;
          const cobrosDoc={};
          (doc.cobros||[]).forEach(cb=>{ const f=cb.forma_cobro||"OT"; cobrosDoc[f]=(cobrosDoc[f]||0)+parseFloat(cb.monto||0); });
          pageVentas.push({
            id_externo:doc.id, numero_doc:doc.documento||"",
            fecha_emision:parseFechaContifico(doc.fecha_emision),
            cliente_nombre:doc.persona?.razon_social||doc.cliente?.razon_social||"Consumidor Final",
            cliente_id:doc.persona_id||"",
            subtotal_0:parseFloat(doc.subtotal_0||0), subtotal_12:parseFloat(doc.subtotal_12||0),
            iva:parseFloat(doc.iva||0), total:parseFloat(doc.total||0),
            estado:doc.estado||"P", anulado:false,
            cobros_ef:cobrosDoc["EF"]||0, cobros_tc:cobrosDoc["TC"]||0,
            cobros_tr:cobrosDoc["TR"]||0,
            cobros_otros:Object.entries(cobrosDoc).filter(([k])=>!["EF","TC","TR"].includes(k)).reduce((s,[,v])=>s+v,0),
            local:doc.adicional1||"", vendedor_id:doc.vendedor_identificacion||"",
            vendedor_nombre:doc.vendedor?.razon_social||"",
            descuento_total:(doc.detalles||[]).reduce((s,d)=>s+(parseFloat(d.precio||0)*parseFloat(d.cantidad||0)*parseFloat(d.porcentaje_descuento||0)/100),0),
          });
          for(const det of (doc.detalles||[])){
            const nombre=(det.producto_nombre||"").trim()||(det.descripcion||"").trim()||det.producto_id;
            pageDetalle.push({
              id_documento:doc.id, fecha_emision:parseFechaContifico(doc.fecha_emision),
              producto_id:det.producto_id||"", nombre_producto:nombre,
              cantidad:parseFloat(det.cantidad||0), precio:parseFloat(det.precio||0),
              descuento:parseFloat(det.porcentaje_descuento||0),
              base_gravable:parseFloat(det.base_gravable||0),
              subtotal:parseFloat(det.cantidad||0)*parseFloat(det.precio||0),
            });
          }
        }
        // Guardar página en BD
        if(msg) msg.textContent=`Guardando página ${page} (${pageVentas.length} facturas)...`;
        try{
          const exist=await sbQuery("ven_documento",`id_externo=in.(${pageVentas.map(v=>`"${v.id_externo}"`).join(",")})&select=id_externo`).catch(()=>[]);
          const yaEnBD=new Set((Array.isArray(exist)?exist:[]).map(r=>r.id_externo));
          const nuevos=pageVentas.filter(v=>!yaEnBD.has(v.id_externo));
          if(nuevos.length>0) await sbInsert("ven_documento",nuevos);
          if(pageDetalle.length>0){
            for(let i2=0;i2<pageDetalle.length;i2+=50){
              await sbInsert("ven_detalle",pageDetalle.slice(i2,i2+50)).catch(e=>console.warn("det:",e.message));
            }
          }
        } catch(e){ console.warn(`Página ${page}:`,e.message); }
        window._venVentas =window._venVentas.concat(pageVentas);
        window._venDetalle=window._venDetalle.concat(pageDetalle);
        window._venVentasMes =window._venVentas;
        window._venDetalleMes=window._venDetalle;
        totalGuardados+=pageVentas.length;
        if(msg) msg.textContent=`${totalGuardados} facturas procesadas · ${window._venDetalle.length} líneas`;
        renderVentasContifico();
        if(pageDocs.length<PAGE_SIZE) hayMasPaginas=false;
        page++;
      }
      sessionStorage.setItem("ven_fechas",JSON.stringify({ini:inicio,fin:fin}));
      venActualizarStatus("ok",`${window._venVentas.length} facturas sincronizadas`);
      if(icon)  icon.textContent="📂";
      if(label) label.textContent="Ver ventas";
    }
  } catch(e){
    console.error("venCargarOSincronizar:",e);
    venShowToast("Error: "+e.message,"err");
    venActualizarStatus("err","Error: "+e.message.slice(0,40));
    if(icon)  icon.textContent="⚠";
    if(label) label.textContent="Reintentar";
  } finally {
    window._venCargando=false;
    if(btn)  btn.disabled=false;
    if(wrap) wrap.style.display="none";
    if(msg)  msg.style.display="none";
    renderVentasContifico();
    venRenderCharts();
  }
}
window.venCargarOSincronizar=venCargarOSincronizar;

async function venGuardarEnSupabase(inicio, fin){
  try {
    // ── PASO 1: Documentos — solo insertar los nuevos ─────────
    const existing = await sbQuery("ven_documento",
      `fecha_emision=gte.${inicio}&fecha_emision=lte.${fin}&select=id_externo`);
    const idsEnBD = new Set((Array.isArray(existing)?existing:[]).map(r=>r.id_externo));
    const nuevosVentas = (window._venVentas||[]).filter(v=>!idsEnBD.has(v.id_externo));

    if(nuevosVentas.length > 0){
      for(let i=0;i<nuevosVentas.length;i+=100){
        await sbInsert("ven_documento", nuevosVentas.slice(i,i+100));
      }
      console.log(`BD docs: ${nuevosVentas.length} nuevos, ${idsEnBD.size} existían`);
    }

    // ── PASO 2: Detalle — SIEMPRE intentar insertar todo ──────
    // Usa el UNIQUE constraint (id_documento, producto_id) para ignorar duplicados
    // Esto garantiza que ven_detalle se llene aunque los docs ya existieran
    const todoDetalle = window._venDetalle||[];
    if(todoDetalle.length > 0){
      // Verificar cuántos detalles hay en BD para este período
      const existDet = await sbQuery("ven_detalle",
        `fecha_emision=gte.${inicio}&fecha_emision=lte.${fin}&select=id&limit=1`);
      const detalleEnBD = Array.isArray(existDet) && existDet.length > 0;

      if(!detalleEnBD){
        // ven_detalle vacío para este período → insertar todo
        let insertados = 0;
        for(let i=0;i<todoDetalle.length;i+=100){
          try{
            await sbInsert("ven_detalle", todoDetalle.slice(i,i+100));
            insertados += Math.min(100, todoDetalle.length-i);
          }catch(e){
            console.warn(`Lote detalle ${i}: ${e.message}`);
          }
        }
        console.log(`BD detalle: ${insertados} líneas insertadas`);
        venShowToast(`💾 ${nuevosVentas.length} docs · ${insertados} líneas de detalle guardadas`, "ok");
      } else {
        console.log(`BD detalle: ya tiene datos para este período`);
        venShowToast(`✅ ${idsEnBD.size} docs existentes · detalle ya cargado`, "ok");
      }
    } else {
      venShowToast(`✅ ${idsEnBD.size} docs en BD · sin detalle de productos`, "ok");
    }
  } catch(e) {
    console.warn("venGuardarEnSupabase error:", e.message);
  }
}


async function guardarEstadoTicket(){

  try{
    await sbUpdate("solicitudes_tic",{estado:nuevoEstado,fecha_atencion:fechaAten,observacion:obs},"id",_modalTicketId);

// ── Render central de gráficas — reintenta hasta que el DOM esté listo ──
function venRenderCharts(intentos){
  intentos = intentos || 0;
  if(intentos > 20) return; // máximo 2 segundos de reintentos

  // Verificar que los elementos clave están en el DOM
  const canvasTend  = document.getElementById("ven-chart-tend");
  const canvasDonut = document.getElementById("ven-chart-donut");
  const tbodyMonto  = document.getElementById("ven-tbody-monto");

  if(!canvasTend || !tbodyMonto){
    // DOM aún no está listo — reintentar en 100ms
    setTimeout(()=>venRenderCharts(intentos+1), 100);
    return;
  }

  // DOM listo — destruir charts anteriores y renderizar
  ['tend','donut'].forEach(k=>{
    if(window._venCharts[k]){
      try{ window._venCharts[k].destroy(); }catch(e){}
      delete window._venCharts[k];
    }
  });

  venRenderTendencia();
  venRenderDOW();
  venRenderTopMonto();
  venRenderTopCant();
  if(canvasDonut) venRenderDonut();
  venRenderFacturas();
}
window.venRenderCharts = venRenderCharts;

function venRenderTendencia(){
  const ctx = document.getElementById("ven-chart-tend");
  if(!ctx) return;
  const porDia = {};
  // Usar mes completo para la tendencia
  const ventasTendencia = window._venVentasMes||window._venVentas||[];
  ventasTendencia.forEach(d=>{
    const k = d.fecha_emision||"";
    if(!k) return;
    porDia[k] = (porDia[k]||0) + parseFloat(d.total||0);
  });
  const dias   = Object.keys(porDia).sort();
  const montos = dias.map(d=>porDia[d]);
  if(!dias.length){
    const ctxDraw=ctx.getContext("2d");
    if(ctxDraw){ ctxDraw.clearRect(0,0,ctx.width,ctx.height); ctxDraw.fillStyle="#6B87A8"; ctxDraw.font="13px 'DM Sans',sans-serif"; ctxDraw.textAlign="center"; ctxDraw.fillText("Sin datos en el período",ctx.width/2||200,ctx.height/2||110); }
    return;
  }
  if(window._venCharts["tend"]) try{ window._venCharts["tend"].destroy(); }catch(e){}
  window._venCharts["tend"] = new Chart(ctx,{
    type:"bar",
    data:{
      labels:dias.map(d=>fmtFechaLabel(d)),
      datasets:[
        {label:"Ventas",data:montos,backgroundColor:"rgba(0,180,170,0.18)",borderColor:"#00B4AA",borderWidth:2,borderRadius:3,order:2},
        {label:"Tendencia",data:mediaMovil(montos,5),type:"line",borderColor:"#007A72",borderWidth:2,pointRadius:0,fill:false,tension:0.4,order:1}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"$"+parseFloat(c.raw||0).toFixed(2)}}},
      scales:{
        x:{ticks:{color:"#6B87A8",font:{size:9},maxRotation:45},grid:{display:false}},
        y:{ticks:{color:"#6B87A8",callback:v=>"$"+fmtK(v)},grid:{color:"#E8EEF5"}}
      }
    }
  });
}

function venRenderDOW(){
  const barsEl   = document.getElementById("ven-dow-bars");
  const labelsEl = document.getElementById("ven-dow-lbl");
  if(!barsEl) return;
  const DIAS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const sumDow=[0,0,0,0,0,0,0], cntDow=[0,0,0,0,0,0,0];
  const ventasDOW = window._venVentasMes||window._venVentas||[];
  ventasDOW.forEach(d=>{
    if(!d.fecha_emision) return;
    const dow=new Date(d.fecha_emision+"T12:00:00").getDay();
    sumDow[dow]+=parseFloat(d.total||0); cntDow[dow]++;
  });
  const avgDow=sumDow.map((s,i)=>cntDow[i]>0?s/cntDow[i]:0);
  const maxAvg=Math.max(...avgDow)||1;
  if(maxAvg<=0){ barsEl.innerHTML='<div style="color:var(--grisMed);font-size:12px;padding:20px;text-align:center">Sin datos suficientes</div>'; return; }
  barsEl.innerHTML="";
  if(labelsEl) labelsEl.innerHTML="";
  avgDow.forEach((v,i)=>{
    const pct=(v/maxAvg)*100;
    const cls=pct>=90?"max":pct>=60?"high":"med";
    const hpx=Math.max(Math.round(pct*1.2),4);
    const wrap=document.createElement("div");
    wrap.className="ven-dow-wrap";
    wrap.innerHTML=`<div style="flex:1;display:flex;align-items:flex-end;width:100%;min-height:120px"><div class="ven-dow-bar ${cls}" style="height:${hpx}px;width:100%"></div></div><div class="ven-dow-lbl">${DIAS[i]}</div><div class="ven-dow-val">${v>0?"$"+fmtK(v):"-"}</div>`;
    barsEl.appendChild(wrap);
  });
  const iMax=avgDow.indexOf(Math.max(...avgDow));
  if(labelsEl) labelsEl.innerHTML=`<div style="font-size:11px;color:var(--tq);font-weight:700;margin-top:8px">🏆 Mayor promedio: <b>${DIAS[iMax]}</b> — $${fmtK(avgDow[iMax])}/día</div>`;
}

function venRenderDonut(){
  const ctx2=document.getElementById("ven-chart-donut");
  if(!ctx2) return;
  const detalleMes=window._venDetalleMes||window._venDetalle||[];
  if(!detalleMes.length) return;
  const cats={};
  detalleMes.forEach(d=>{
    const nom=(d.nombre_producto||"").toLowerCase();
    let cat="Otros";
    if(nom.includes("ensalada")||nom.includes("bowl")) cat="Ensaladas & Bowls";
    else if(nom.includes("jugo")||nom.includes("bebida")||nom.includes("limonada")) cat="Bebidas";
    else if(nom.includes("wrap")||nom.includes("sándwich")) cat="Wraps & Sándwiches";
    else if(nom.includes("postre")||nom.includes("galleta")||nom.includes("brownie")) cat="Postres";
    else if(nom.includes("proteína")||nom.includes("pollo")||nom.includes("atún")) cat="Proteínas";
    cats[cat]=(cats[cat]||0)+parseFloat(d.subtotal||0);
  });
  const labels=Object.keys(cats), data=labels.map(k=>cats[k]);
  const COLORS=["#00B4AA","#16A97A","#007A72","#D4A012","#6B87A8","#E05050","#4DD4AE"];
  if(window._venCharts["donut"]) try{ window._venCharts["donut"].destroy(); }catch(e){}
  window._venCharts["donut"]=new Chart(ctx2,{
    type:"doughnut",
    data:{labels,datasets:[{data,backgroundColor:COLORS.slice(0,labels.length),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:"65%",
      plugins:{legend:{position:"right",labels:{color:"#6B87A8",font:{family:"DM Sans",size:11},padding:12,boxWidth:12,
            generateLabels:function(ch){
              const ds=ch.data.datasets[0];
              const tot=ds.data.reduce((a,b)=>a+b,0)||1;
              return ch.data.labels.map((lbl,i)=>({
                text:lbl+"  "+( ds.data[i]/tot*100).toFixed(1)+"%",
                fillStyle:ds.backgroundColor[i],strokeStyle:ds.backgroundColor[i],
                lineWidth:0,hidden:false,index:i
              }));
            }}},
        tooltip:{callbacks:{label:c2=>" $"+parseFloat(c2.raw||0).toFixed(2)+" ("+(parseFloat(c2.raw||0)/data.reduce((a,b)=>a+b,0)*100).toFixed(1)+"%)"}}}
    }
  });
}

    prodDesc[d.producto_id].veces+=1;
  });
  const topProd=Object.values(prodDesc).sort((a,b)=>b.total-a.total).slice(0,10);

    const k=v.fecha_emision||"";

  el.innerHTML=hdr+`

    <div class="ven-brand">
      <div class="ven-logo" style="background:#D4A012">🏷️</div>
      <div>
        <div class="ven-title">Descuentos — FIN-IND-007</div>
        <div class="ven-sub">FIN-IND-007 · Análisis de descuentos aplicados</div>
      </div>
    </div>
    <div class="ven-badge">SUPERHEALTHY S.A.S.</div>
  </div>

  <div class="ven-kpi-grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="ven-kpi-card" style="border-left-color:#D4A012">
      <div class="ven-kpi-label">Total Descontado</div>
      <div class="ven-kpi-val" style="font-size:22px">${fmtM(totalDesc)}</div>
      <div class="ven-kpi-sub">sobre ventas del período</div>
    </div>
    <div class="ven-kpi-card" style="border-left-color:#E03355">
      <div class="ven-kpi-label">% sobre Ventas</div>
      <div class="ven-kpi-val" style="font-size:22px;color:${pctDesc>5?"#E03355":"#16A97A"}">${pctDesc.toFixed(1)}%</div>
      <div class="ven-kpi-sub">${pctDesc>5?"⚠ Por encima del 5%":"✓ Dentro del rango"}</div>
    </div>
    <div class="ven-kpi-card" style="border-left-color:#00B4AA">
      <div class="ven-kpi-label">Docs con Descuento</div>
      <div class="ven-kpi-val" style="font-size:22px">${docsCond}</div>
      <div class="ven-kpi-sub">de ${ventas.length} facturas (${ventas.length>0?(docsCond/ventas.length*100).toFixed(0):0}%)</div>
    </div>
    <div class="ven-kpi-card" style="border-left-color:#6B87A8">
      <div class="ven-kpi-label">Desc. Promedio/Factura</div>
      <div class="ven-kpi-val" style="font-size:22px">${fmtM(docsCond>0?totalDesc/docsCond:0)}</div>
      <div class="ven-kpi-sub">en facturas con descuento</div>
    </div>
  </div>

  <div class="ven-charts-wide" style="margin-top:14px">
    <div class="ven-card">
      <div class="ven-card-title">📉 Descuento por día</div>
      <div class="ven-chart-wrap" style="height:220px"><canvas id="fin007-chart-dia"></canvas></div>
    </div>
    <div class="ven-card">
      <div class="ven-card-title">🏆 Top productos con más descuento</div>
      <div style="overflow:auto;max-height:240px">
        <table class="ven-tabla">
          <thead><tr><th>#</th><th>Producto</th><th style="text-align:right">Descuento</th><th style="text-align:right">Veces</th></tr></thead>
          <tbody>${topProd.length?topProd.map((p,i)=>`<tr>
            <td><span class="ven-rank ${i<3?"top3":""}">${i+1}</span></td>
            <td style="font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.nombre)}</td>
            <td class="ven-monto" style="text-align:right">${fmtM(p.total)}</td>
            <td style="text-align:right;color:var(--grisMed)">${p.veces}x</td>
          </tr>`).join(""):`<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--grisMed)">Sin descuentos en el período</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;

  if(dias.length){
    setTimeout(()=>{
      const ctx=document.getElementById("fin007-chart-dia");
      if(ctx && window._venCharts["fin007"]) try{window._venCharts["fin007"].destroy();}catch(e){}
      if(ctx) window._venCharts["fin007"]=new Chart(ctx,{
        type:"bar",
        data:{
          labels:dias.map(d=>{const[y,m,dd]=d.split("-");return dd+"/"+m;}),
          datasets:[{
            label:"Descuento",data:dias.map(d=>porDia[d].desc),
            backgroundColor:"rgba(212,160,18,0.7)",borderColor:"#D4A012",borderWidth:1,borderRadius:3
          },{
            label:"% sobre venta",data:dias.map(d=>porDia[d].venta>0?porDia[d].desc/(porDia[d].venta+porDia[d].desc)*100:0),
            type:"line",borderColor:"#E03355",borderWidth:2,pointRadius:3,fill:false,yAxisID:"y2"
          }]
        },
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{labels:{color:"#6B87A8",font:{size:10}}},
            tooltip:{callbacks:{label:ctx=>ctx.dataset.label+(ctx.dataset.yAxisID==="y2"?": "+ctx.raw.toFixed(1)+"%":" "+fmtM(ctx.raw))}}},
          scales:{
            x:{ticks:{color:"#6B87A8",font:{size:9}}},
            y:{ticks:{color:"#6B87A8",callback:v=>"$"+fmtK(v)},position:"left"},
            y2:{ticks:{color:"#E03355",callback:v=>v.toFixed(0)+"%"},position:"right",grid:{drawOnChartArea:false}}
          }
        }
      });
    },150);
  }
}
window.renderFin007=renderFin007;

// ═══════════════════════════════════════════════════════════════
// FIN-IND-008 — RENDIMIENTO POR LOCAL / VENDEDOR
// ═══════════════════════════════════════════════════════════════
function renderFin008(){
  const el=document.getElementById("fin008-container");
  if(!el) return;
  const hdr=buildPeriodoUI?buildPeriodoUI():"";
  const fmtM=v=>"$"+parseFloat(v||0).toLocaleString("es-EC",{minimumFractionDigits:2,maximumFractionDigits:2});
  const ventas=window._venVentasMes||window._venVentas||[];

  if(!ventas.length){
    el.innerHTML=hdr+`<div class="ven-card" style="padding:40px;text-align:center">
      <div style="font-size:36px">🏪</div>
      <div style="font-weight:800;color:var(--azul);font-size:15px;font-family:Raleway,sans-serif;margin-top:12px">FIN-IND-008 — Local/Vendedor</div>
      <div style="font-size:12px;color:var(--grisMed);margin-top:8px">Sincroniza FIN-IND-005 primero.</div>
    </div>`;
    return;
  }

  // Agrupar por local
  const porLocal={};
  ventas.forEach(v=>{
    const local=(v.local||"Sin Local").trim()||"Sin Local";
    if(!porLocal[local]) porLocal[local]={total:0,facturas:0,vendedores:{}};
    porLocal[local].total   +=parseFloat(v.total||0);
    porLocal[local].facturas+=1;
    if(v.vendedor_id){
      const vid=v.vendedor_id;
      if(!porLocal[local].vendedores[vid]) porLocal[local].vendedores[vid]={nombre:v.vendedor_nombre||vid,total:0,facturas:0};
      porLocal[local].vendedores[vid].total   +=parseFloat(v.total||0);
      porLocal[local].vendedores[vid].facturas+=1;
    }
  });

  // Agrupar por vendedor global
  const porVendedor={};
  ventas.forEach(v=>{
    if(!v.vendedor_id) return;
    const vid=v.vendedor_id;
    if(!porVendedor[vid]) porVendedor[vid]={nombre:v.vendedor_nombre||vid,total:0,facturas:0,local:v.local||""};
    porVendedor[vid].total   +=parseFloat(v.total||0);
    porVendedor[vid].facturas+=1;
  });

  const locales=Object.entries(porLocal).sort((a,b)=>b[1].total-a[1].total);
  const vendedores=Object.values(porVendedor).sort((a,b)=>b.total-a.total).slice(0,10);
  const totalGlobal=ventas.reduce((s,v)=>s+parseFloat(v.total||0),0);
  const maxLocal=locales[0]?.[1]?.total||1;
  const maxVend=vendedores[0]?.total||1;

  el.innerHTML=hdr+`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">
    <div class="ven-brand">
      <div class="ven-logo" style="background:#16A97A">🏪</div>
      <div>
        <div class="ven-title">Local/Vendedor — FIN-IND-008</div>
        <div class="ven-sub">FIN-IND-008 · Rendimiento por punto de venta y cajero</div>
      </div>
    </div>
    <div class="ven-badge">SUPERHEALTHY S.A.S.</div>
  </div>

  <div class="ven-charts-2">
    <div class="ven-card">
      <div class="ven-card-title">🏪 Ventas por Local <span>${locales.length} locales</span></div>
      <table class="ven-tabla">
        <thead><tr><th>Local</th><th style="text-align:right">Monto</th><th style="text-align:right">Fact.</th><th style="text-align:right">Ticket</th><th style="width:100px">Part.</th></tr></thead>
        <tbody>${locales.map(([local,d])=>`<tr>
          <td style="font-weight:600;font-size:12px">${esc(local)}</td>
          <td class="ven-monto" style="text-align:right">${fmtM(d.total)}</td>
          <td style="text-align:right;color:var(--grisMed)">${d.facturas}</td>
          <td style="text-align:right;color:var(--grisMed)">${fmtM(d.facturas>0?d.total/d.facturas:0)}</td>
          <td><div class="ven-bar-wrap"><div class="ven-bar-fill" style="width:${(d.total/maxLocal*100).toFixed(0)}%;background:var(--azul)"></div></div>
              <div style="font-size:9px;color:var(--grisMed)">${totalGlobal>0?(d.total/totalGlobal*100).toFixed(1):0}%</div></td>
        </tr>`).join("")||`<tr><td colspan="5" style="text-align:center;padding:16px;color:var(--grisMed)">Sin datos de local — re-sincroniza desde Contifico</td></tr>`}
        </tbody>
      </table>
    </div>
    <div class="ven-card">
      <div class="ven-card-title">👤 Top Vendedores/Cajeros <span>${vendedores.length} activos</span></div>
      <table class="ven-tabla">
        <thead><tr><th>#</th><th>Vendedor</th><th style="text-align:right">Monto</th><th style="text-align:right">Fact.</th><th style="width:80px">Part.</th></tr></thead>
        <tbody>${vendedores.length?vendedores.map((v,i)=>`<tr>
          <td><span class="ven-rank ${i<3?"top3":""}">${i+1}</span></td>
          <td style="font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.nombre||v.id)}</td>
          <td class="ven-monto" style="text-align:right">${fmtM(v.total)}</td>
          <td style="text-align:right;color:var(--grisMed)">${v.facturas}</td>
          <td><div class="ven-bar-wrap"><div class="ven-bar-fill" style="width:${(v.total/maxVend*100).toFixed(0)}%;background:var(--tq)"></div></div>
              <div style="font-size:9px;color:var(--grisMed)">${totalGlobal>0?(v.total/totalGlobal*100).toFixed(1):0}%</div></td>
        </tr>`).join(""):`<tr><td colspan="5" style="text-align:center;padding:16px;color:var(--grisMed)">Sin datos de vendedor — re-sincroniza desde Contifico</td></tr>`}
        </tbody>
      </table>
    </div>
  </div>

  ${locales.length?`<div class="ven-card" style="margin-top:14px">
    <div class="ven-card-title">📊 Ventas por Local — Comparativa</div>
    <div class="ven-chart-wrap" style="height:220px"><canvas id="fin008-chart"></canvas></div>
  </div>`:""}`;

  if(locales.length){
    setTimeout(()=>{
      const ctx=document.getElementById("fin008-chart");
      if(ctx && window._venCharts["fin008"]) try{window._venCharts["fin008"].destroy();}catch(e){}
      if(ctx) window._venCharts["fin008"]=new Chart(ctx,{
        type:"bar",
        data:{
          labels:locales.map(([l])=>l.length>20?l.slice(0,18)+"…":l),
          datasets:[{
            label:"Ventas",data:locales.map(([,d])=>d.total),
            backgroundColor:["#00B4AA","#16A97A","#1A3756","#D4A012","#E03355"].slice(0,locales.length),
            borderRadius:4
          }]
        },
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>" "+fmtM(ctx.raw)}}},
          scales:{x:{ticks:{color:"#6B87A8",font:{size:10}}},y:{ticks:{color:"#6B87A8",callback:v=>"$"+fmtK(v)}}}
        }
      });
    },150);
  }
}
window.renderFin008=renderFin008;
</script></body></html>
