<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Ejecutivo — EQSolutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --azul:#1A3756;--tq:#0684C6;--fondo:#F4F6F9;
      --blanco:#FFFFFF;--borde:#E0E8F0;--grisMed:#6B87A8;
      --grisLight:#EEF3F8;--verde:#16A97A;--amarillo:#D4A012;
      --rojo:#E03355;--tqGlow:rgba(6,132,198,0.12);
    }
    body{background:var(--fondo);font-family:'Open Sans',sans-serif;color:var(--azul)}
    @keyframes spin   {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes fadeIn {from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes loadBar{0%{width:0%}60%{width:80%}100%{width:100%}}
    @keyframes pulse  {0%,100%{opacity:1}50%{opacity:.4}}

    /* ── LOADING ── */
    #loading-screen{position:fixed;inset:0;background:var(--blanco);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px}
    .loading-bar{width:280px;height:3px;background:var(--grisLight);border-radius:2px;overflow:hidden}
    .loading-fill{height:100%;background:var(--tq);border-radius:2px;animation:loadBar 2s ease-in-out infinite}
    .loading-text{font-size:11px;color:var(--grisMed);letter-spacing:.1em;text-transform:uppercase}

    /* ── LOGIN ── */
    #login-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--azul) 0%,#0d2040 60%,#05142D 100%);display:flex;align-items:center;justify-content:center;z-index:999}
    .login-card{background:var(--blanco);border-radius:12px;padding:48px 44px;width:420px;box-shadow:0 24px 64px rgba(0,0,0,0.3);animation:slideUp .5s ease}
    .login-logo{text-align:center;margin-bottom:32px}
    .login-divider{height:1px;background:var(--borde);margin:0 -44px 28px}
    .login-title{font-family:'Raleway',sans-serif;font-size:15px;font-weight:700;color:var(--azul);margin-bottom:4px}
    .login-sub{font-size:11px;color:var(--grisMed);margin-bottom:24px}
    .form-group{margin-bottom:18px}
    .form-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--grisMed);margin-bottom:6px}
    .form-input{width:100%;padding:11px 14px;border:1.5px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;color:var(--azul);background:var(--blanco);outline:none;transition:border-color .2s}
    .form-input:focus{border-color:var(--tq)}
    .form-input.error{border-color:var(--rojo)}
    .form-select{width:100%;padding:11px 14px;border:1.5px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;color:var(--azul);background:var(--blanco);outline:none;cursor:pointer}
    .form-select:focus{border-color:var(--tq)}
    .login-btn{width:100%;padding:13px;background:var(--tq);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
    .login-btn:hover{background:var(--azul)}
    .login-btn:disabled{opacity:.6;cursor:not-allowed}
    .login-error{background:#FFF0F3;border:1px solid var(--rojo);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--rojo);margin-bottom:16px;display:none}
    .login-footer{text-align:center;margin-top:24px;font-size:10px;color:var(--grisMed)}
    .pw-wrap{position:relative}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:var(--grisMed)}

    /* ── HEADER ── */
    #header{background:var(--blanco);border-top:4px solid var(--tq);border-bottom:1px solid var(--borde);padding:0 36px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(26,55,86,0.08)}
    #header-top{display:flex;justify-content:space-between;align-items:center;height:68px}
    .logo-wrap{display:flex;align-items:center;gap:14px}
    .header-sep{width:1px;height:36px;background:var(--borde);margin:0 8px}
    #empresa-selector{display:flex;align-items:center;gap:8px;background:var(--grisLight);border:1px solid var(--borde);border-radius:6px;padding:6px 12px}
    #empresa-selector select{background:transparent;border:none;outline:none;font-family:'Open Sans',sans-serif;font-size:12px;color:var(--azul);font-weight:700;cursor:pointer}
    .empresa-dot{width:8px;height:8px;border-radius:50%;background:var(--tq)}
    .user-badge{display:flex;align-items:center;gap:10px;background:var(--grisLight);border:1px solid var(--borde);border-radius:6px;padding:6px 14px}
    .user-avatar{width:28px;height:28px;border-radius:50%;background:var(--tq);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
    .user-name{font-weight:700;color:var(--azul);font-size:12px}
    .user-rol{font-size:10px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.06em}
    .logout-btn{background:none;border:1px solid var(--borde);border-radius:4px;padding:4px 10px;font-size:11px;color:var(--grisMed);cursor:pointer;transition:all .2s}
    .logout-btn:hover{border-color:var(--rojo);color:var(--rojo)}

    /* ── NAV ── */
    #nav{display:flex}
    .nav-btn{padding:12px 18px;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--grisMed);font-family:'Open Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
    .nav-btn:hover{color:var(--azul)}
    .nav-btn.active{color:var(--tq);border-bottom-color:var(--tq);font-weight:700}
    .nav-btn.admin-tab{color:var(--grisMed)}
    .nav-btn.admin-tab.active{color:var(--azul);border-bottom-color:var(--azul)}

    /* ── BANNERS ── */
    .banner{padding:9px 36px;display:flex;align-items:center;gap:10px;font-size:12px}
    .banner-error{background:#FFF0F3;border-bottom:1px solid var(--rojo);color:var(--rojo);justify-content:space-between}
    .banner-error button{background:none;border:none;color:var(--rojo);cursor:pointer;font-size:15px}
    .banner-success{background:#F0FAF6;border-bottom:1px solid var(--verde);color:var(--verde)}

    /* ── CONTENT ── */
    #content{padding:26px 36px;animation:fadeIn .3s ease}

    /* ── CARDS ── */
    .card{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:22px 26px;box-shadow:0 1px 4px rgba(26,55,86,0.05)}

    /* ── METRICS ── */
    .metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
    .metric-card{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:20px 24px;border-left:4px solid var(--tq);box-shadow:0 1px 4px rgba(26,55,86,0.05)}
    .metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--grisMed);margin-bottom:8px}
    .metric-value{font-size:46px;font-weight:800;font-family:'Raleway',sans-serif;line-height:1}

    /* ── SALUD ── */
    .salud-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:2px}
    .salud-legend{display:flex;gap:24px;margin-top:10px;font-size:12px}

    /* ── AREAS ── */
    .areas-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
    .area-card{background:var(--blanco);border:1px solid var(--borde);border-top:3px solid var(--tq);border-radius:6px;padding:18px;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(26,55,86,0.05)}
    .area-card:hover{border-top-color:var(--azul);box-shadow:0 4px 16px rgba(26,55,86,0.12);transform:translateY(-2px)}
    .area-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .area-name{display:flex;align-items:center;gap:7px;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--azul)}
    .area-pct{font-family:'Raleway',sans-serif;font-size:22px;font-weight:800}
    .area-bars{display:flex;gap:3px;margin-bottom:10px}
    .area-bar{flex:1;height:4px;border-radius:2px}
    .area-stats{display:flex;gap:12px;font-size:10px}

    /* ── KPI ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .kpi-card{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:20px 22px;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(26,55,86,0.05);transition:all .25s}
    .kpi-card:hover{border-color:var(--tq);transform:translateY(-2px);box-shadow:0 6px 20px var(--tqGlow)}
    .kpi-stripe{position:absolute;top:0;left:0;width:100%;height:3px}
    .kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;padding-top:6px}
    .kpi-desc{font-size:9px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.07em;line-height:1.5;max-width:68%}
    .kpi-badge{font-size:8.5px;font-weight:700;padding:3px 9px;border-radius:3px;white-space:nowrap;letter-spacing:.05em}
    .kpi-nombre{font-size:14px;font-weight:700;color:var(--azul);margin-bottom:10px;font-family:'Raleway',sans-serif}
    .kpi-valor-row{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
    .kpi-valor{font-size:30px;font-weight:800;font-family:'Raleway',sans-serif;line-height:1}
    .kpi-meta{font-size:11px;color:var(--grisMed)}
    .kpi-bar-bg{height:4px;background:var(--grisLight);border-radius:2px;overflow:hidden}
    .kpi-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
    .kpi-pct{font-size:10px;color:var(--grisMed);margin-top:4px;margin-bottom:8px}
    .kpi-chart{height:48px}

    /* ── AREA VIEW ── */
    .area-view-header{display:flex;align-items:center;gap:16px;border-bottom:2px solid var(--tq);padding-bottom:16px;margin-bottom:22px}
    .area-icon-box{width:50px;height:50px;border:2px solid var(--tq);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--tqGlow)}
    .area-view-title{font-size:20px;font-weight:800;color:var(--azul);font-family:'Raleway',sans-serif}
    .area-view-sub{font-size:11px;color:var(--grisMed)}
    .area-counters{margin-left:auto;display:flex;gap:24px}
    .area-counter{text-align:center}
    .area-counter-val{font-size:28px;font-weight:800;font-family:'Raleway',sans-serif}
    .area-counter-lbl{font-size:9px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.1em}

    /* ── TABLA ── */
    .tabla-detalle{width:100%;border-collapse:collapse;font-size:12px;margin-top:16px}
    .tabla-detalle th{background:var(--grisLight);color:var(--azul);font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:10px;padding:10px 14px;text-align:left;border-bottom:2px solid var(--borde)}
    .tabla-detalle td{padding:10px 14px;border-bottom:1px solid var(--borde);color:var(--azul);vertical-align:middle}
    .tabla-detalle tr:hover td{background:var(--grisLight)}
    .estado-badge{display:inline-block;padding:3px 8px;border-radius:3px;font-size:10px;font-weight:700}
    .estado-ok  {background:#16A97A22;color:#16A97A}
    .estado-warn{background:#D4A01222;color:#D4A012}
    .estado-bad {background:#E0335522;color:#E03355}

    /* ── ADMIN PANEL ── */
    .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .admin-title{font-family:'Raleway',sans-serif;font-size:20px;font-weight:800;color:var(--azul)}
    .admin-sub{font-size:11px;color:var(--grisMed);margin-top:2px}
    .admin-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
    .admin-stat{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:16px 20px;text-align:center;box-shadow:0 1px 4px rgba(26,55,86,0.05)}
    .admin-stat-val{font-size:32px;font-weight:800;font-family:'Raleway',sans-serif}
    .admin-stat-lbl{font-size:10px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}

    /* Tabla usuarios */
    .user-row-active  td{background:var(--blanco)}
    .user-row-inactive td{background:#FFF8F8;color:#999}
    .rol-badge{display:inline-block;padding:3px 10px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.04em}
    .rol-admin {background:#1A375622;color:var(--azul)}
    .rol-lider {background:#0684C622;color:var(--tq)}
    .rol-cliente{background:#6ECE8E22;color:#16A97A}
    .action-btn{background:none;border:1px solid var(--borde);border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:'Open Sans',sans-serif;transition:all .15s;margin-right:4px}
    .action-btn:hover{background:var(--grisLight)}
    .action-btn.danger:hover{border-color:var(--rojo);color:var(--rojo)}
    .action-btn.primary{background:var(--tq);color:#fff;border-color:var(--tq)}
    .action-btn.primary:hover{background:var(--azul);border-color:var(--azul)}

    /* Log accesos */
    .log-accion{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700}
    .log-ok    {background:#16A97A18;color:var(--verde)}
    .log-fail  {background:#E0335518;color:var(--rojo)}
    .log-admin {background:#0684C618;color:var(--tq)}

    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(5,20,45,0.55);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
    .modal-box{background:var(--blanco);border-radius:10px;padding:36px 40px;width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.2);animation:slideUp .3s ease;position:relative}
    .modal-title{font-family:'Raleway',sans-serif;font-size:17px;font-weight:800;color:var(--azul);margin-bottom:4px}
    .modal-sub{font-size:11px;color:var(--grisMed);margin-bottom:24px}
    .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--grisMed);line-height:1}
    .modal-close:hover{color:var(--rojo)}
    .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:16px;border-top:1px solid var(--borde)}
    .btn-cancel{padding:10px 20px;background:none;border:1px solid var(--borde);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;cursor:pointer;color:var(--grisMed)}
    .btn-cancel:hover{border-color:var(--azul);color:var(--azul)}
    .btn-save{padding:10px 24px;background:var(--tq);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
    .btn-save:hover{background:var(--azul)}
    .btn-danger{padding:10px 24px;background:var(--rojo);color:#fff;border:none;border-radius:6px;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
    .form-hint{font-size:10px;color:var(--grisMed);margin-top:4px}
    .pwd-strength{height:3px;border-radius:2px;margin-top:6px;transition:all .3s}

    /* ── MISC ── */
    .chart-wrap{height:220px;position:relative}
    .section-title{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--grisMed);margin-bottom:14px;font-weight:600}
    .section-title span{color:var(--tq)}
    #footer{border-top:1px solid var(--borde);padding:12px 36px;display:flex;justify-content:space-between;align-items:center;background:var(--blanco);margin-top:12px}
    .footer-right{font-size:10px;color:var(--tq);font-weight:700;text-transform:uppercase;letter-spacing:.1em}
    .gap-18{margin-bottom:18px}
    .hidden{display:none!important}
    .spinning{animation:spin 1s linear infinite;display:inline-block}
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <img src="Manual%20de%20marca/Logo%20EQ%20Horizontal-Color.png" height="44" alt="EQ"/>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-text" id="loading-text">Iniciando...</div>
</div>

<!-- LOGIN -->
<div id="login-screen" class="hidden">
  <div class="login-card">
    <div class="login-logo"><img src="Manual%20de%20marca/Logo%20EQ%20Horizontal-Color.png" height="44" alt="EQSolutions"/></div>
    <div class="login-divider"></div>
    <div class="login-title">Acceso al Dashboard</div>
    <div class="login-sub">Ingresa tus credenciales para continuar</div>
    <div class="login-error" id="login-error"></div>
    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" id="login-email" class="form-input" placeholder="usuario@empresa.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <div class="pw-wrap">
        <input type="password" id="login-pwd" class="form-input" placeholder="••••••••"/>
        <button class="pw-toggle" type="button" id="pw-eye" onclick="togglePwd('login-pwd','pw-eye')">👁</button>
      </div>
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-footer">EQSolutions © 2025 · Acceso restringido<br><span style="color:var(--tq)">EQ Intelligence Platform</span></div>
  </div>
</div>

<!-- HEADER -->
<div id="header" class="hidden">
  <div id="header-top">
    <div class="logo-wrap">
      <img src="Manual%20de%20marca/Logo%20EQ%20Horizontal-Color.png" height="44" alt="EQ"/>
      <div class="header-sep"></div>
      <div style="font-size:9px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.2em">Dashboard Ejecutivo de Indicadores</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div id="empresa-selector" class="hidden">
        <div class="empresa-dot"></div>
        <span style="font-size:10px;color:var(--grisMed);text-transform:uppercase;letter-spacing:.08em">Cliente:</span>
        <select id="empresa-select" onchange="cambiarEmpresa(this.value)"></select>
      </div>
      <div id="user-badge-wrap"></div>
    </div>
  </div>
  <div id="nav"></div>
</div>

<!-- BANNERS -->
<div id="banner-error"   class="banner banner-error hidden"><span id="error-text"></span><button onclick="hideError()">✕</button></div>
<div id="banner-success" class="banner banner-success hidden"><span id="success-text"></span></div>

<!-- CONTENT -->
<div id="content" class="hidden"></div>

<!-- FOOTER -->
<div id="footer" class="hidden">
  <div style="display:flex;align-items:center;gap:10px">
    <img src="Manual%20de%20marca/Logo%20EQ%20Horizontal-Color.png" height="20" alt="EQ"/>
    <span style="font-size:10px;color:var(--grisMed)">© 2025 EQSolutions — Información confidencial</span>
  </div>
  <span class="footer-right" id="footer-right"></span>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-overlay" class="hidden"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG & ESTADO
// ═══════════════════════════════════════════
const GITHUB={owner:"oramirez-eq",repo:"dashboard-eqsoluciones",db:"data/eqsolutions_v2.db",branch:"main"};
let DB=null,SQL=null,sesion=null,empresaActual=null,areaActual="Gerencial",charts={};

const AREAS  =["Gerencial","TICs","Contabilidad","Finanzas","Abastecimiento","RRHH"];
const ICONOS ={TICs:"⚙️",Contabilidad:"📒",Finanzas:"💰",Abastecimiento:"📦",RRHH:"👥"};
const MESES  =["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const sc=s=>s==="verde"?"#16A97A":s==="amarillo"?"#D4A012":"#E03355";
const fv=(v,u)=>{if(v===null||v===undefined)return"—";if(u==="$")return"$"+(v>=1e6?(v/1e6).toFixed(1)+"M":(v/1e3).toFixed(0)+"K");if(u==="#")return""+Math.round(v);if(u==="d")return v.toFixed(1)+"d";return v.toFixed(1)+u};

// ═══════════════════════════════════════════
// DB
// ═══════════════════════════════════════════
async function cargarDB(){
  setLoading("Descargando base de datos...");
  try{
    const meta=await fetch(`https://api.github.com/repos/${GITHUB.owner}/${GITHUB.repo}/contents/${GITHUB.db}?ref=${GITHUB.branch}`).then(r=>r.json());
    if(!meta.download_url)throw new Error("Archivo no encontrado en GitHub");
    const buf=await fetch(meta.download_url).then(r=>r.arrayBuffer());
    setLoading("Inicializando motor SQL...");
    SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`});
    DB=new SQL.Database(new Uint8Array(buf));
    return true;
  }catch(e){showError("Error cargando BD: "+e.message);return false;}
}

function queryAll(sql,params=[]){
  if(!DB)return[];
  try{
    const res=DB.exec(sql,params);
    if(!res.length)return[];
    return res[0].values.map(row=>{const o={};res[0].columns.forEach((c,i)=>o[c]=row[i]);return o;});
  }catch(e){console.error("SQL:",e.message);return[];}
}

async function sha256(t){
  const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function togglePwd(inputId,btnId){
  const inp=document.getElementById(inputId),btn=document.getElementById(btnId);
  if(inp.type==="password"){inp.type="text";btn.textContent="🙈";}
  else{inp.type="password";btn.textContent="👁";}
}

async function doLogin(){
  const email=document.getElementById("login-email").value.trim().toLowerCase();
  const pwd  =document.getElementById("login-pwd").value;
  const errEl=document.getElementById("login-error");
  const btn  =document.getElementById("login-btn");
  errEl.style.display="none";
  if(!email||!pwd){errEl.textContent="Completa todos los campos.";errEl.style.display="block";return;}
  btn.disabled=true;btn.textContent="Verificando...";
  const hash=await sha256(pwd);
  const rows=queryAll("SELECT u.*,e.codigo AS empresa_codigo,e.nombre AS empresa_nombre FROM usuarios u LEFT JOIN empresas e ON e.id=u.id_empresa WHERE LOWER(u.email)=? AND u.password_hash=? AND u.activo=1",[email,hash]);
  if(!rows.length){
    errEl.textContent="Correo o contraseña incorrectos.";errEl.style.display="block";
    document.getElementById("login-pwd").classList.add("error");
    btn.disabled=false;btn.textContent="Ingresar";return;
  }
  const u=rows[0];
  sesion={email:u.email,nombre:u.nombre,rol:u.rol,id_empresa:u.id_empresa,id:u.id,empresa_codigo:u.empresa_codigo};
  empresaActual=u.rol==="cliente"?u.empresa_codigo:(queryAll("SELECT codigo FROM empresas WHERE codigo!='EQSOLUTIONS' AND activo=1 LIMIT 1")[0]?.codigo||"LUKMAR");
  mostrarApp();
}

function getKPIResumen(){
  const rows=queryAll(`SELECT a.codigo AS area_codigo,a.icono,i.codigo AS kpi_codigo,i.nombre,i.unidad,i.descripcion,i.tipo_meta,k.valor,k.meta,k.semaforo FROM kpi_mensual k JOIN empresas e ON e.id=k.id_empresa JOIN indicadores i ON i.id=k.id_indicador JOIN areas a ON a.id=i.id_area WHERE e.codigo=? GROUP BY i.codigo HAVING k.anio=MAX(k.anio) AND k.mes=MAX(k.mes) ORDER BY a.codigo,i.codigo`,[empresaActual]);
  const res={};
  rows.forEach(r=>{if(!res[r.area_codigo])res[r.area_codigo]=[];res[r.area_codigo].push({...r,trend:getTrend(r.kpi_codigo)});});
  return res;
}

function getTrend(kpiCodigo){
  return queryAll(`SELECT k.mes,k.valor FROM kpi_mensual k JOIN indicadores i ON i.id=k.id_indicador JOIN empresas e ON e.id=k.id_empresa WHERE i.codigo=? AND e.codigo=? ORDER BY k.anio ASC,k.mes ASC LIMIT 12`,[kpiCodigo,empresaActual]).map(r=>({label:MESES[r.mes],valor:r.valor}));
}

  <div class="card gap-18" style="margin-bottom:20px">
    <div class="section-title">Usuarios del Sistema</div>
    <div style="overflow-x:auto">
    <table class="tabla-detalle">
      <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Empresa</th><th>Último Acceso</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>
        ${usuarios.map(u=>`
        <tr class="${u.activo?"user-row-active":"user-row-inactive"}">
          <td><div style="display:flex;align-items:center;gap:10px">
            <div style="width:32px;height:32px;border-radius:50%;background:${u.activo?"var(--tq)":"#ccc"};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">${u.nombre.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase()}</div>
            <span style="font-weight:600">${u.nombre}</span>
          </div></td>
          <td style="color:var(--grisMed)">${u.email}</td>
          <td>${rolBadge(u.rol)}</td>
          <td>${u.empresa_nombre||`<span style="color:var(--grisMed);font-style:italic">EQ Internal</span>`}</td>
          <td style="color:var(--grisMed);font-size:11px">${u.ultimo_acceso?u.ultimo_acceso.replace("T"," ").slice(0,16):"Nunca"}</td>
          <td><span class="estado-badge ${u.activo?"estado-ok":"estado-bad"}">${u.activo?"Activo":"Inactivo"}</span></td>
          <td style="white-space:nowrap">
            <button class="action-btn" onclick="modalEditarUsuario(${u.id})">✏ Editar</button>
            <button class="action-btn" onclick="modalResetPwd(${u.id},'${u.email}')">🔑 Reset</button>
            <button class="action-btn danger" onclick="toggleUsuario(${u.id},${u.activo},'${u.nombre}')">${u.activo?"⊘ Desactivar":"✓ Activar"}</button>
          </td>
        </tr>`).join("")}
      </tbody>
    </table>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Log de Accesos — Últimos 30 eventos</div>
    <div style="overflow-x:auto">
    <table class="tabla-detalle">
      <thead><tr><th>Usuario</th><th>Acción</th><th>Detalle</th><th>IP</th><th>Fecha y Hora</th></tr></thead>
      <tbody>
        ${logs.map(l=>`<tr>
          <td style="font-weight:600">${l.email}</td>
          <td>${logBadge(l.accion)}</td>
          <td style="color:var(--grisMed);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.detalle||"—"}</td>
          <td style="color:var(--grisMed);font-family:monospace;font-size:11px">${l.ip||"—"}</td>
          <td style="color:var(--grisMed);font-size:11px">${l.creado_en?.replace("T"," ").slice(0,16)||"—"}</td>
        </tr>`).join("")||`<tr><td colspan="5" style="text-align:center;color:var(--grisMed);padding:20px">Sin registros</td></tr>`}
      </tbody>
    </table>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// MODALES ADMIN
// ═══════════════════════════════════════════
function getEmpresas(){return queryAll("SELECT id,codigo,nombre FROM empresas WHERE codigo!='EQSOLUTIONS' AND activo=1");}

function modalCrearUsuario(){
  const emps=getEmpresas();
  openModal(`<div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">＋ Nuevo Usuario</div>
    <div class="modal-sub">Completa los datos del nuevo usuario</div>
    <div class="form-group"><label class="form-label">Nombre completo</label><input type="text" id="m-nombre" class="form-input" placeholder="Ej: Juan Pérez"/></div>
    <div class="form-group"><label class="form-label">Correo electrónico</label><input type="email" id="m-email" class="form-input" placeholder="usuario@empresa.com"/></div>
    <div class="form-group"><label class="form-label">Rol</label>
      <select id="m-rol" class="form-select" onchange="onRolChange()">
        <option value="eq_admin">Administrador EQ</option>
        <option value="eq_lider">Líder EQ</option>
        <option value="cliente" selected>Cliente</option>
      </select>
    </div>
    <div class="form-group" id="m-empresa-group">
      <label class="form-label">Empresa cliente</label>
      <select id="m-empresa" class="form-select">
        ${emps.map(e=>`<option value="${e.id}">${e.nombre} (${e.codigo})</option>`).join("")}
      </select>
    </div>
    <div class="form-group"><label class="form-label">Contraseña temporal</label>
      <div class="pw-wrap">
        <input type="password" id="m-pwd" class="form-input" placeholder="Mín. 8 caracteres" oninput="checkPwdStrength('m-pwd','m-strength')"/>
        <button class="pw-toggle" type="button" onclick="togglePwd('m-pwd','m-pw-eye')" id="m-pw-eye">👁</button>
      </div>
      <div class="pwd-strength" id="m-strength" style="background:var(--grisLight)"></div>
      <div class="form-hint">El usuario deberá cambiarla en su primer ingreso</div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="guardarNuevoUsuario()">Crear Usuario</button>
    </div>
  </div>`);
}

function onRolChange(){
  const rol=document.getElementById("m-rol")?.value;
  const grp=document.getElementById("m-empresa-group");
  if(grp) grp.style.display=rol==="cliente"?"block":"none";
}

function checkPwdStrength(inputId,barId){
  const v=document.getElementById(inputId)?.value||"";
  const score=[v.length>=8,/[A-Z]/.test(v),/[0-9]/.test(v),/[^A-Za-z0-9]/.test(v)].filter(Boolean).length;
  const bar=document.getElementById(barId);if(!bar)return;
  const colors=["var(--rojo)","var(--rojo)","var(--amarillo)","var(--verde)","var(--verde)"];
  bar.style.width=(score*25)+"%";bar.style.background=colors[score];
}

async function guardarNuevoUsuario(){
  const nombre=document.getElementById("m-nombre")?.value.trim();
  const email =document.getElementById("m-email")?.value.trim().toLowerCase();
  const rol   =document.getElementById("m-rol")?.value;
  const pwd   =document.getElementById("m-pwd")?.value;
  const empId =rol==="cliente"?parseInt(document.getElementById("m-empresa")?.value):null;
  if(!nombre||!email||!pwd){showError("Completa todos los campos obligatorios.");return;}
  if(pwd.length<8){showError("La contraseña debe tener al menos 8 caracteres.");return;}
  const existe=queryAll("SELECT id FROM usuarios WHERE email=?",[email]);
  if(existe.length){showError("Ya existe un usuario con ese correo.");return;}
  const hash=await sha256(pwd);
  DB.run("INSERT INTO usuarios(nombre,email,rol,id_empresa,password_hash,activo,creado_por) VALUES(?,?,?,?,?,1,?)",[nombre,email,rol,empId,hash,sesion.email]);
  DB.run("INSERT INTO log_accesos(email,accion,detalle) VALUES(?,?,?)",[sesion.email,"user_created",`Creó usuario ${email}`]);
  closeModal();showSuccess(`✓ Usuario ${nombre} creado exitosamente`);renderContent();
}

function modalEditarUsuario(id){
  const u=queryAll("SELECT * FROM usuarios WHERE id=?",[id])[0];if(!u)return;
  const emps=getEmpresas();
  openModal(`<div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">✏ Editar Usuario</div>
    <div class="modal-sub">${u.email}</div>
    <div class="form-group"><label class="form-label">Nombre completo</label><input type="text" id="e-nombre" class="form-input" value="${u.nombre||""}"/></div>
    <div class="form-group"><label class="form-label">Rol</label>
      <select id="e-rol" class="form-select" onchange="onRolChangeEdit()">
        <option value="eq_admin" ${u.rol==="eq_admin"?"selected":""}>Administrador EQ</option>
        <option value="eq_lider" ${u.rol==="eq_lider"?"selected":""}>Líder EQ</option>
        <option value="cliente"  ${u.rol==="cliente"?"selected":""}>Cliente</option>
      </select>
    </div>
    <div class="form-group" id="e-empresa-group" style="display:${u.rol==="cliente"?"block":"none"}">
      <label class="form-label">Empresa cliente</label>
      <select id="e-empresa" class="form-select">
        ${emps.map(e=>`<option value="${e.id}" ${u.id_empresa===e.id?"selected":""}>${e.nombre} (${e.codigo})</option>`).join("")}
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="guardarEdicion(${id})">Guardar Cambios</button>
    </div>
  </div>`);
}

function onRolChangeEdit(){
  const rol=document.getElementById("e-rol")?.value;
  const grp=document.getElementById("e-empresa-group");
  if(grp) grp.style.display=rol==="cliente"?"block":"none";
}

function guardarEdicion(id){
  const nombre=document.getElementById("e-nombre")?.value.trim();
  const rol   =document.getElementById("e-rol")?.value;
  const empId =rol==="cliente"?parseInt(document.getElementById("e-empresa")?.value):null;
  if(!nombre){showError("El nombre es obligatorio.");return;}
  DB.run("UPDATE usuarios SET nombre=?,rol=?,id_empresa=? WHERE id=?",[nombre,rol,empId,id]);
  DB.run("INSERT INTO log_accesos(email,accion,detalle) VALUES(?,?,?)",[sesion.email,"user_edited",`Editó usuario id ${id}`]);
  closeModal();showSuccess("✓ Usuario actualizado correctamente");renderContent();
}

function modalResetPwd(id,email){
  openModal(`<div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">🔑 Restablecer Contraseña</div>
    <div class="modal-sub">${email}</div>
    <div class="form-group"><label class="form-label">Nueva contraseña</label>
      <div class="pw-wrap">
        <input type="password" id="r-pwd" class="form-input" placeholder="Mín. 8 caracteres" oninput="checkPwdStrength('r-pwd','r-strength')"/>
        <button class="pw-toggle" type="button" onclick="togglePwd('r-pwd','r-eye')" id="r-eye">👁</button>
      </div>
      <div class="pwd-strength" id="r-strength" style="background:var(--grisLight)"></div>
    </div>
    <div class="form-group"><label class="form-label">Confirmar contraseña</label>
      <input type="password" id="r-pwd2" class="form-input" placeholder="Repite la contraseña"/>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="guardarResetPwd(${id},'${email}')">Restablecer</button>
    </div>
  </div>`);
}

async function guardarResetPwd(id,email){
  const pwd =document.getElementById("r-pwd")?.value;
  const pwd2=document.getElementById("r-pwd2")?.value;
  if(!pwd||pwd.length<8){showError("La contraseña debe tener al menos 8 caracteres.");return;}
  if(pwd!==pwd2){showError("Las contraseñas no coinciden.");return;}
  const hash=await sha256(pwd);
  DB.run("UPDATE usuarios SET password_hash=? WHERE id=?",[hash,id]);
  DB.run("INSERT INTO log_accesos(email,accion,detalle) VALUES(?,?,?)",[sesion.email,"pwd_reset",`Reset pwd de ${email}`]);
  closeModal();showSuccess(`✓ Contraseña de ${email} restablecida`);
}

function toggleUsuario(id,activo,nombre){
  const accion=activo?"desactivar":"activar";
  openModal(`<div class="modal-box" style="width:400px">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">${activo?"⊘ Desactivar":"✓ Activar"} Usuario</div>
    <div class="modal-sub" style="margin-bottom:20px">¿Confirmas que deseas <strong>${accion}</strong> al usuario <strong>${nombre}</strong>?</div>
    ${activo?`<div style="background:#FFF0F3;border:1px solid var(--rojo);border-radius:6px;padding:12px;font-size:12px;color:var(--rojo);margin-bottom:4px">⚠ El usuario no podrá ingresar al sistema.</div>`:`<div style="background:#F0FAF6;border:1px solid var(--verde);border-radius:6px;padding:12px;font-size:12px;color:var(--verde);margin-bottom:4px">✓ El usuario podrá volver a ingresar al sistema.</div>`}
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="${activo?"btn-danger":"btn-save"}" onclick="confirmarToggle(${id},${activo},'${nombre}')">${activo?"Desactivar":"Activar"}</button>
    </div>
  </div>`);
}

function confirmarToggle(id,activo,nombre){
  const nuevo=activo?0:1;
  DB.run("UPDATE usuarios SET activo=? WHERE id=?",[nuevo,id]);
  DB.run("INSERT INTO log_accesos(email,accion,detalle) VALUES(?,?,?)",[sesion.email,nuevo?"user_edited":"user_edited",`${nuevo?"Activó":"Desactivó"} usuario: ${nombre}`]);
  closeModal();showSuccess(`✓ Usuario ${nombre} ${nuevo?"activado":"desactivado"}`);renderContent();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init(){
  const ok=await cargarDB();
  hideLoading();
  if(ok){
    document.getElementById("login-screen").classList.remove("hidden");
  }else{
    document.getElementById("login-screen").classList.remove("hidden");
    document.getElementById("login-error").textContent="⚠ Error al conectar con la base de datos.";
    document.getElementById("login-error").style.display="block";
  }
}
init();
</script>
